<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP relaxed to allow `blob:` in script-src so AudioWorklet.addModule()
      can load the inline PCM capture worklet (see
      runtime/openaiWhisperDictationAdapter.ts). Without it Chromium
      refuses the blob URL and the dictation adapter dies with an
      AbortError before the first chunk. `worker-src blob:` covers the
      Worker flavor some Chromium versions classify the worklet under.

      The loopback (http://localhost:* / http://127.0.0.1:*) allowances cover
      the ppt-master preview servers (confirm_ui / svg_editor Flask apps on
      http://localhost:5050, auto-advancing to 5051+), all local servers this
      app itself launches:
        - `frame-src`   — embed the confirm page <iframe> in the 「浏览器」tab.
        - `connect-src` — the 「幻灯片」tab fetches /api/slides + /api/slide
                          from svg_editor to render live preview natively.
        - `img-src`     — those SVGs reference images at <server>/images/*.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://localhost:* http://127.0.0.1:*; media-src 'self' blob:; connect-src 'self' blob: http://localhost:* http://127.0.0.1:*; frame-src http://localhost:* http://127.0.0.1:*;" />
    <title>Claude Desktop</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
