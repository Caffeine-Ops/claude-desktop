<!DOCTYPE html>
<html lang="zh-CN"__THEME_ATTR__>
<head>
<meta charset="UTF-8">
<title>Cowork</title>
<style>
/* ============================================================
 * 首次启动闪屏 — shell BrowserWindow 的常驻内容（splash.ts 经
 * ?raw import + data:URL 加载；原型见 docs/ui-prototype-splash.html）。
 *
 * 四条铁律（对应 2026-07-04 暗档白闪事故 + 2026-07-06 主题跟错档位）：
 *   1. 底色 = tokens.css 的 --background 原值（暗 #1a1917 / 亮
 *      #f5f5f7）；与窗口 backgroundColor 初值、studio 首帧底色三方
 *      一致，splash → studio 交接零跳变。
 *   2. 深浅色判定 = html[data-theme]（splash.ts 按用户上次选的
 *      themeMode 镜像注入，见其注释），不是单纯 prefers-color-scheme——
 *      后者只能跟系统，用户在 app 内手动选的主题与系统不一致时会先
 *      显示错档位、studio 首帧交接时再"跳变"回正确档位。
 *      :not([data-theme]) 的 media query 分支是占位符替换意外失败
 *      时的降级路径，见下方 CSS。
 *   3. 零请求：无字体、无 CDN、图标 base64 内嵌。data: URL 的
 *      opaque origin 对纯内联页面无碍（历史坑只咬第三方脚本/Cookie）。
 *   4. 身份色用品牌绿 --brand（不跟用户主题色走），与 chat 工具
 *      运行弧线同源。
 *
 * 对 main 的契约（executeJavaScript 调用，见 splash.ts）：
 *   window.__splash.stage(fraction, text) — 推启动里程碑
 *   window.__splash.finish()              — 进度冲满 + 「马上就好」
 * 版本 / 主题占位符（<html> 标签与 body 底部 .version 里）由 splash.ts
 * 在加载前替换——此注释刻意不写占位符字面量：曾因注释里的字面量抢走
 * String.replace 的第一个匹配，真占位符漏替换直接上屏（故所有替换都用
 * replaceAll）。
 * ============================================================ */

:root {
  --background: hsl(240 7% 97%);
  --foreground: hsl(240 3% 12%);
  --muted-foreground: hsl(240 4% 40%);
  --brand: hsl(142 76% 36%);
  --track: hsl(240 6% 88%);
  /* drop-shadow 而非 box-shadow：图标 PNG 四周有透明内边距（macOS 图标
   * 规范），box-shadow 会打在 img 矩形框上形成一圈「白卡」 */
  --logo-shadow: drop-shadow(0 14px 28px hsl(222 60% 20% / 0.28)) drop-shadow(0 3px 8px hsl(222 60% 20% / 0.14));
}

/* 深浅色判定：优先 html[data-theme]（splash.ts 按用户上次选的 themeMode
 * 镜像注入，见其调用点注释）；:not([data-theme]) 的 prefers-color-scheme
 * 分支是占位符替换意外失败时的降级路径，跟随系统主题而不是死板成某一档。 */
html[data-theme="dark"] {
  --background: hsl(40 6% 10%);
  --foreground: hsl(40 21% 89%);
  --muted-foreground: hsl(36 5% 58%);
  --brand: hsl(145 60% 52%);
  --track: hsl(40 6% 18%);
  --logo-shadow: drop-shadow(0 0 40px hsl(142 76% 55% / 0.22)) drop-shadow(0 14px 28px hsl(0 0% 0% / 0.55));
}

@media (prefers-color-scheme: dark) {
  html:not([data-theme]) {
    --background: hsl(40 6% 10%);
    --foreground: hsl(40 21% 89%);
    --muted-foreground: hsl(36 5% 58%);
    --brand: hsl(145 60% 52%);
    --track: hsl(40 6% 18%);
    --logo-shadow: drop-shadow(0 0 40px hsl(142 76% 55% / 0.22)) drop-shadow(0 14px 28px hsl(0 0% 0% / 0.55));
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background-color: var(--background);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display',
    'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB',
    'Microsoft YaHei', sans-serif;
  color: var(--foreground);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  /* 整页不可选中/不可拖拽——这是启动画面不是文档 */
  user-select: none;
  -webkit-user-select: none;
}

.core {
  display: flex;
  flex-direction: column;
  align-items: center;
  /* 视觉重心略高于几何中心 */
  transform: translateY(-4vh);
}

.logo {
  width: 108px; /* 补偿 PNG 内边距，可见图形约 88px */
  height: 108px;
  filter: var(--logo-shadow);
  opacity: 0;
  animation:
    enter 640ms cubic-bezier(0.22, 1, 0.36, 1) 80ms forwards,
    breathe 4.8s ease-in-out 1.2s infinite;
  -webkit-user-drag: none;
}

.name {
  margin-top: 24px;
  font-size: 17px;
  font-weight: 590;
  letter-spacing: 0.01em;
  opacity: 0;
  animation: enter 520ms cubic-bezier(0.22, 1, 0.36, 1) 260ms forwards;
}

.status {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  margin-top: 26px;
  opacity: 0;
  animation: enter 520ms cubic-bezier(0.22, 1, 0.36, 1) 420ms forwards;
}

.bar {
  width: 168px;
  height: 3px;
  border-radius: 999px;
  background: var(--track);
  overflow: hidden;
}
.bar .fill {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: var(--brand);
  transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
}

.stage-text {
  font-size: 13px;
  color: var(--muted-foreground);
  min-height: 18px;
  transition: opacity 240ms ease;
}
.stage-text.swapping { opacity: 0; }

.version {
  position: fixed;
  bottom: 24px;
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.02em;
  color: var(--muted-foreground);
  opacity: 0;
  animation: enter 520ms ease 640ms forwards;
}

@keyframes enter {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.02); }
}
@media (prefers-reduced-motion: reduce) {
  .logo { animation-name: enter; }
}
</style>
</head>

<div class="version">Cowork __APP_VERSION__</div>

<script>
(() => {
  const fill = document.getElementById('fill');
  const stageText = document.getElementById('stageText');

  /* 进度模型：main 推真实里程碑（stage），两次里程碑之间每 1.2s 微爬
   * 1.2%、封顶「当前档 +6%」——dev 下 Next 编译首页可能十几秒，进度条
   * 完全死住会显得卡死。假进度绝不自己走完：「走完」的权力属于
   * finish()（studio 首帧真实就绪，见 tabRegistry 的 promote）。 */
  let current = 0.12;
  let cap = 0.18;
  const render = () => { fill.style.width = (current * 100) + '%'; };

  const crawl = setInterval(() => {
    if (current < cap) { current = Math.min(cap, current + 0.012); render(); }
  }, 1200);

  const swapText = (text) => {
    if (stageText.textContent === text) return;
    stageText.classList.add('swapping');
    setTimeout(() => {
      stageText.textContent = text;
      stageText.classList.remove('swapping');
    }, 240);
  };

  window.__splash = {
    stage(fraction, text) {
      current = Math.max(current, fraction);
      cap = Math.min(0.92, fraction + 0.06);
      render();
      if (text) swapText(text);
    },
    finish() {
      clearInterval(crawl);
      current = 1; cap = 1;
      fill.style.transitionDuration = '240ms';
      render();
      swapText('马上就好');
    },
  };

  /* 首帧微延迟后再画初始进度，让 transition 吃到 0→12% 的入场 */
  requestAnimationFrame(() => requestAnimationFrame(render));
})();
</script>
