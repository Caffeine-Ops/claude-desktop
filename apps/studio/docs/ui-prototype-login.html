<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowork 登录页重设计 · 原型</title>
<style>
/* ============================================================
   Cowork 登录页重设计原型 · 2026-07-06
   设计语言：Apple 式克制（DESIGN.md）× Cowork 真实 token
   （packages/design-tokens/tokens.css 的 --brand / --background）
   三布局 × 明暗 × 双强调色，右下 Tweaks 切换
   ============================================================ */

:root {
  /* —— Cowork 亮档（tokens.css :root 实际值换算）—— */
  --bg: #f7f7f9;            /* hsl(240 7% 97%) */
  --surface: #ffffff;
  --ink: #1d1d1f;
  --ink-2: rgba(29, 29, 31, 0.64);
  --ink-3: rgba(29, 29, 31, 0.40);
  --line: rgba(0, 0, 0, 0.10);
  --input-bg: #ffffff;
  --wall-ink: rgba(29, 29, 31, 0.055);  /* 玻璃布局的背景大字 */
  --brand-panel: #101010;   /* 分屏左面（Apple 纯黑面） */
  --window-shadow: 0 24px 80px rgba(0,0,0,.28), 0 4px 16px rgba(0,0,0,.14);
  /* 强调色（默认品牌绿；Tweaks 可切 Apple Blue）*/
  --accent: #16a34a;        /* hsl(142 76% 36%) == --brand */
  --accent-fg: #ffffff;
  --accent-soft: rgba(22, 163, 74, 0.12);
  --error: #d93025;
  --easing: cubic-bezier(0.32, 0.72, 0, 1);
}

/* 暗档（tokens.css [data-theme='dark'] 实际值：暖黑系 + 提亮绿） */
.frame[data-theme="dark"] {
  --bg: #1b1a18;            /* hsl(40 6% 10%) */
  --surface: #222120;       /* hsl(30 3% 13%) */
  --ink: #f5f5f7;
  --ink-2: rgba(245, 245, 247, 0.62);
  --ink-3: rgba(245, 245, 247, 0.36);
  --line: rgba(255, 255, 255, 0.12);
  --input-bg: rgba(255, 255, 255, 0.055);
  --wall-ink: rgba(255, 255, 255, 0.045);
  --brand-panel: #121110;
  --window-shadow: 0 24px 80px rgba(0,0,0,.55), 0 4px 16px rgba(0,0,0,.4);
  --accent: #3bce78;        /* hsl(145 60% 52%)：暖黑底上的提亮绿 */
  --accent-fg: #1b1a18;
  --accent-soft: rgba(59, 206, 120, 0.14);
  --error: #f28b82;
}
/* Apple Blue 对照（Tweaks）：亮 #0071e3 / 暗 #2997ff */
.frame[data-accent="blue"] {
  --accent: #0071e3; --accent-fg: #ffffff; --accent-soft: rgba(0,113,227,.12);
}
.frame[data-theme="dark"][data-accent="blue"] {
  --accent: #2997ff; --accent-fg: #0b0b0c; --accent-soft: rgba(41,151,255,.16);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
               "PingFang SC", "Helvetica Neue", sans-serif;
  background: #35363a;  /* 展示画布：中性深灰，让窗口 frame 浮起 */
  display: grid;
  place-items: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============ mac 窗口 frame（展示语境） ============ */
.stage { position: relative; }
.frame {
  width: 1080px;
  height: 700px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg);
  box-shadow: var(--window-shadow);
  position: relative;
  transition: background .45s var(--easing);
}
/* 红绿灯（窗口 chrome 层，浮于一切布局之上） */
.traffic {
  position: absolute; top: 0; left: 0;
  height: 48px; padding-left: 20px;
  display: flex; align-items: center; gap: 8px;
  z-index: 40;
}
.traffic i {
  width: 12px; height: 12px; border-radius: 50%;
  box-shadow: inset 0 0 0 .5px rgba(0,0,0,.12);
}
.traffic i:nth-child(1) { background: #ff5f57; }
.traffic i:nth-child(2) { background: #febc2e; }
.traffic i:nth-child(3) { background: #28c840; }

/* ============ 共用：字标 ============ */
.mark {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 10px;
  background: var(--accent);
  color: var(--accent-fg);
  font-weight: 700;
  letter-spacing: -0.02em;
  user-select: none;
  transition: background .3s var(--easing);
}
.wordmark {
  font-weight: 600; letter-spacing: -0.02em; color: var(--ink);
  transition: color .45s var(--easing);
}

/* ============ 共用：表单组件 ============ */
.form { width: 336px; }

/* 浮动 label 输入框（Apple ID 登录的招牌交互）：
   聚焦或有值时 label 缩小上移，输入框високий 52px 容纳双层 */
.field { position: relative; margin-bottom: 12px; }
.field input {
  width: 100%; height: 52px;
  padding: 20px 14px 6px;
  font: inherit; font-size: 15px; letter-spacing: -0.2px;
  color: var(--ink);
  background: var(--input-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  outline: none;
  transition: border-color .2s var(--easing), box-shadow .2s var(--easing),
              background .45s var(--easing);
}
.field label {
  position: absolute; left: 15px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px; letter-spacing: -0.2px;
  color: var(--ink-3);
  pointer-events: none;
  transition: all .18s var(--easing);
}
.field input:focus + label,
.field input:not(:placeholder-shown) + label {
  top: 15px; font-size: 11px; letter-spacing: 0;
  color: var(--ink-2);
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3.5px var(--accent-soft);
}
/* 错误态（Tweaks 演示）：红边 + shake */
.frame[data-error="on"] .field.password input {
  border-color: var(--error);
  box-shadow: 0 0 0 3.5px color-mix(in srgb, var(--error) 14%, transparent);
}
.error-msg {
  display: none;
  font-size: 13px; letter-spacing: -0.1px;
  color: var(--error);
  margin: -4px 2px 12px;
}
.frame[data-error="on"] .error-msg { display: block; }
.frame[data-error="on"] .form-inner { animation: shake .4s var(--easing); }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-7px); }
  55% { transform: translateX(5px); }
  80% { transform: translateX(-2px); }
}

/* 主按钮：pill（Apple CTA 形）+ 品牌绿 */
.btn {
  width: 100%; height: 48px;
  border: none; border-radius: 980px;
  background: var(--accent); color: var(--accent-fg);
  font: inherit; font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .15s var(--easing), filter .2s var(--easing),
              background .3s var(--easing);
}
.btn:hover { filter: brightness(1.06); }
.btn:active { transform: scale(0.985); filter: brightness(0.96); }
.btn:focus-visible { outline: 2.5px solid var(--accent); outline-offset: 3px; }
.btn[data-busy] { pointer-events: none; }
.btn .spinner {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid color-mix(in srgb, var(--accent-fg) 35%, transparent);
  border-top-color: var(--accent-fg);
  animation: spin .7s linear infinite;
  display: none;
}
.btn[data-busy="loading"] .spinner { display: block; }
.btn[data-busy="loading"] .btn-label { display: none; }
.btn .check { display: none; font-size: 18px; }
.btn[data-busy="done"] .check { display: block; }
.btn[data-busy="done"] .btn-label { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 辅助链接行 */
.aux {
  margin-top: 18px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 13.5px; letter-spacing: -0.1px;
  color: var(--ink-3);
}
.aux a {
  color: var(--accent); text-decoration: none;
  transition: color .3s var(--easing);
}
.aux a:hover { text-decoration: underline; }

/* 表单标题区 */
.form-head { text-align: center; margin-bottom: 28px; }
.form-head .mark { width: 48px; height: 48px; font-size: 22px; margin-bottom: 20px; }
.form-head h1 {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
               "PingFang SC", sans-serif;
  font-size: 32px; font-weight: 600;
  line-height: 1.1; letter-spacing: -0.6px;
  color: var(--ink);
  transition: color .45s var(--easing);
}
.form-head p {
  margin-top: 10px;
  font-size: 15px; letter-spacing: -0.2px; line-height: 1.5;
  color: var(--ink-2);
  transition: color .45s var(--easing);
}

/* 入场 stagger（重播由 JS 摘/挂 .enter 类） */
.enter .stagger { animation: rise .6s var(--easing) both; }
.enter .stagger:nth-child(1) { animation-delay: .05s; }
.enter .stagger:nth-child(2) { animation-delay: .12s; }
.enter .stagger:nth-child(3) { animation-delay: .19s; }
.enter .stagger:nth-child(4) { animation-delay: .26s; }
.enter .stagger:nth-child(5) { animation-delay: .33s; }
@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  .enter .stagger { animation: none; }
  .frame[data-error="on"] .form-inner { animation: none; }
}

/* ============ 布局 A：居中极简 ============ */
.layout { position: absolute; inset: 0; display: none; }
.frame[data-layout="center"] .layout-center { display: flex; }
.layout-center {
  align-items: center; justify-content: center;
  background: var(--bg);
  transition: background .45s var(--easing);
}

/* ============ 布局 B：分屏品牌面 ============ */
.frame[data-layout="split"] .layout-split { display: flex; }
.layout-split .brand-pane {
  width: 42%; height: 100%;
  background: var(--brand-panel);
  color: #f5f5f7;
  display: flex; flex-direction: column;
  padding: 64px 52px 40px;
  position: relative;
  transition: background .45s var(--easing);
}
.brand-pane .pane-mark { display: flex; align-items: center; gap: 10px; }
.brand-pane .pane-mark .mark { width: 30px; height: 30px; font-size: 15px; border-radius: 8px; }
.brand-pane .pane-mark span {
  font-size: 16px; font-weight: 600; letter-spacing: -0.2px; color: #f5f5f7;
}
.brand-pane .slogan { margin-top: auto; }
.brand-pane .slogan h2 {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
               "PingFang SC", sans-serif;
  font-size: 42px; font-weight: 600;
  line-height: 1.14; letter-spacing: -0.8px;
}
.brand-pane .slogan h2 em {
  font-style: normal; color: var(--accent);
  transition: color .3s var(--easing);
}
.brand-pane .slogan p {
  margin-top: 16px;
  font-size: 15px; line-height: 1.55; letter-spacing: -0.2px;
  color: rgba(245,245,247,.55);
  max-width: 300px;
}
.brand-pane .legal {
  margin-top: 48px;
  font-size: 11px; letter-spacing: 0;
  color: rgba(245,245,247,.28);
}
.layout-split .form-pane {
  flex: 1; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  transition: background .45s var(--easing);
}
/* 分屏版表单头左对齐更工具感，字标已在左面出现故省略 */
.layout-split .form-head { text-align: left; }
.layout-split .form-head .mark { display: none; }
.layout-split .aux { justify-content: flex-start; }

/* ============ 布局 C：玻璃卡 ============ */
.frame[data-layout="glass"] .layout-glass { display: flex; }
.layout-glass {
  align-items: center; justify-content: center;
  background: var(--bg);
  overflow: hidden;
  transition: background .45s var(--easing);
}
/* 背景超大字标：文字即图形（部分被玻璃卡模糊，形成记忆点） */
.layout-glass .wall {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  font-size: 300px; font-weight: 700; letter-spacing: -0.04em;
  color: var(--wall-ink);
  user-select: none;
  transition: color .45s var(--easing);
  transform: translateY(-8px);
}
.layout-glass .glass-card {
  position: relative; z-index: 2;
  width: 400px;
  padding: 44px 32px 36px;
  border-radius: 20px;
  background: color-mix(in srgb, var(--surface) 72%, transparent);
  -webkit-backdrop-filter: saturate(180%) blur(28px);
  backdrop-filter: saturate(180%) blur(28px);
  border: 1px solid color-mix(in srgb, var(--ink) 9%, transparent);
  box-shadow: 0 20px 60px rgba(0,0,0,.14);
  transition: background .45s var(--easing);
}
.frame[data-theme="dark"] .layout-glass .glass-card {
  box-shadow: 0 20px 60px rgba(0,0,0,.45);
}
.layout-glass .form { width: 100%; }

/* ============ Tweaks 面板 ============ */
.tweaks-toggle {
  position: fixed; right: 20px; bottom: 20px; z-index: 90;
  width: 42px; height: 42px; border-radius: 50%;
  border: none; cursor: pointer;
  background: rgba(255,255,255,.92); color: #1d1d1f;
  font-size: 17px;
  box-shadow: 0 4px 18px rgba(0,0,0,.3);
  transition: transform .15s var(--easing);
}
.tweaks-toggle:hover { transform: scale(1.06); }
.tweaks {
  position: fixed; right: 20px; bottom: 72px; z-index: 90;
  width: 240px;
  background: rgba(28,28,30,.94);
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 14px;
  padding: 16px;
  color: #f5f5f7;
  display: none;
  font-size: 12.5px;
}
.tweaks.open { display: block; }
.tweaks h3 {
  font-size: 12px; font-weight: 600; letter-spacing: .4px;
  text-transform: uppercase; color: rgba(245,245,247,.5);
  margin-bottom: 12px;
}
.tweaks .row { margin-bottom: 12px; }
.tweaks .row-label { display: block; margin-bottom: 6px; color: rgba(245,245,247,.72); }
.seg { display: flex; background: rgba(255,255,255,.08); border-radius: 8px; padding: 2px; }
.seg button {
  flex: 1; border: none; background: transparent; cursor: pointer;
  color: rgba(245,245,247,.6); font: inherit; font-size: 12px;
  padding: 5px 0; border-radius: 6px;
  transition: background .15s ease, color .15s ease;
}
.seg button.on { background: rgba(255,255,255,.16); color: #fff; font-weight: 600; }
.tweaks .replay {
  width: 100%; margin-top: 2px;
  border: 1px solid rgba(255,255,255,.16); background: transparent;
  color: #f5f5f7; font: inherit; font-size: 12px;
  padding: 7px 0; border-radius: 8px; cursor: pointer;
}
.tweaks .replay:hover { background: rgba(255,255,255,.08); }
</style>
</head>
<body>

<div class="stage">
  <div class="frame enter" id="frame"
       data-layout="center" data-theme="light" data-accent="brand" data-error="off">
    <div class="traffic"><i></i><i></i><i></i></div>

    <!-- ═══ 布局 A：居中极简（无卡直落画布，Apple Store 登录风） ═══ -->
    <section class="layout layout-center">
      <div class="form form-inner">
        <div class="form-head">
          <span class="mark stagger">C</span>
          <h1 class="stagger">登录 Cowork</h1>
          <p class="stagger">登录账号后开始使用智能助手与工作画布</p>
        </div>
        <div class="stagger">
          <div class="field">
            <input type="email" placeholder=" " autocomplete="email">
            <label>邮箱</label>
          </div>
          <div class="field password">
            <input type="password" placeholder=" " autocomplete="current-password">
            <label>密码</label>
          </div>
          <p class="error-msg">密码不正确，请重试</p>
          <button class="btn js-login">
            <span class="btn-label">登录</span>
            <span class="spinner"></span><span class="check">✓</span>
          </button>
        </div>
        <div class="aux stagger">
          <a href="#">忘记密码？</a>
          <span>·</span>
          <span>没有账号？</span><a href="#">注册</a>
        </div>
      </div>
    </section>

    <!-- ═══ 布局 B：分屏品牌面（左黑面 slogan + 右表单） ═══ -->
    <section class="layout layout-split">
      <aside class="brand-pane">
        <div class="pane-mark">
          <span class="mark">C</span><span>Cowork</span>
        </div>
        <div class="slogan">
          <h2>把想法，<br>交给<em>智能助手</em><br>与工作画布。</h2>
          <p>对话即协作。写方案、做设计、跑任务，一个工作台完成。</p>
        </div>
        <p class="legal">Cowork · 版本 0.0.22</p>
      </aside>
      <div class="form-pane">
        <div class="form form-inner">
          <div class="form-head">
            <h1 class="stagger">欢迎回来</h1>
            <p class="stagger">使用你的账号登录</p>
          </div>
          <div class="stagger">
            <div class="field">
              <input type="email" placeholder=" " autocomplete="email">
              <label>邮箱</label>
            </div>
            <div class="field password">
              <input type="password" placeholder=" " autocomplete="current-password">
              <label>密码</label>
            </div>
            <p class="error-msg">密码不正确，请重试</p>
            <button class="btn js-login">
              <span class="btn-label">登录</span>
              <span class="spinner"></span><span class="check">✓</span>
            </button>
          </div>
          <div class="aux stagger">
            <a href="#">忘记密码？</a>
            <span>·</span>
            <span>没有账号？</span><a href="#">注册</a>
          </div>
        </div>
      </div>
    </section>

    <!-- ═══ 布局 C：玻璃卡（背景大字标 + backdrop-blur 浮卡） ═══ -->
    <section class="layout layout-glass">
      <div class="wall" aria-hidden="true">Cowork</div>
      <div class="glass-card form-inner">
        <div class="form">
          <div class="form-head">
            <span class="mark stagger">C</span>
            <h1 class="stagger">登录 Cowork</h1>
            <p class="stagger">你的 AI 工作台</p>
          </div>
          <div class="stagger">
            <div class="field">
              <input type="email" placeholder=" " autocomplete="email">
              <label>邮箱</label>
            </div>
            <div class="field password">
              <input type="password" placeholder=" " autocomplete="current-password">
              <label>密码</label>
            </div>
            <p class="error-msg">密码不正确，请重试</p>
            <button class="btn js-login">
              <span class="btn-label">登录</span>
              <span class="spinner"></span><span class="check">✓</span>
            </button>
          </div>
          <div class="aux stagger">
            <a href="#">忘记密码？</a>
            <span>·</span>
            <span>没有账号？</span><a href="#">注册</a>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- ═══ Tweaks ═══ -->
<button class="tweaks-toggle" id="tweaksToggle" aria-label="Tweaks">⚙</button>
<div class="tweaks" id="tweaksPanel">
  <h3>Tweaks</h3>
  <div class="row">
    <span class="row-label">布局</span>
    <div class="seg" data-attr="data-layout">
      <button data-val="center" class="on">居中</button>
      <button data-val="split">分屏</button>
      <button data-val="glass">玻璃卡</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">主题</span>
    <div class="seg" data-attr="data-theme">
      <button data-val="light" class="on">浅色</button>
      <button data-val="dark">深色</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">强调色</span>
    <div class="seg" data-attr="data-accent">
      <button data-val="brand" class="on">品牌绿</button>
      <button data-val="blue">Apple 蓝</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">错误态演示</span>
    <div class="seg" data-attr="data-error">
      <button data-val="off" class="on">关</button>
      <button data-val="on">开</button>
    </div>
  </div>
  <button class="replay" id="replayBtn">重播入场动画</button>
</div>

<script>
const frame = document.getElementById('frame');

/* Tweaks：seg 按钮 → frame 的 data-* 属性 */
document.querySelectorAll('.seg').forEach(seg => {
  const attr = seg.dataset.attr;
  seg.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      frame.setAttribute(attr, btn.dataset.val);
      if (attr === 'data-layout') replayEnter();  // 切布局重播入场
      if (attr === 'data-error' && btn.dataset.val === 'on') reshake();
    });
  });
});

/* Tweaks 开合 */
const panel = document.getElementById('tweaksPanel');
document.getElementById('tweaksToggle').addEventListener('click', () => {
  panel.classList.toggle('open');
});

/* 入场动画重播：摘掉 .enter 强制 reflow 再挂回 */
function replayEnter() {
  frame.classList.remove('enter');
  void frame.offsetWidth;
  frame.classList.add('enter');
}
document.getElementById('replayBtn').addEventListener('click', replayEnter);

/* 错误 shake 重触发（连续开两次也能抖） */
function reshake() {
  document.querySelectorAll('.form-inner').forEach(el => {
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  });
}

/* 登录按钮演示：loading 1.1s → 打勾 0.9s → 复位 */
document.querySelectorAll('.js-login').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.busy) return;
    btn.dataset.busy = 'loading';
    setTimeout(() => { btn.dataset.busy = 'done'; }, 1100);
    setTimeout(() => { delete btn.dataset.busy; }, 2000);
  });
});

/* 窗口 frame 自适应视口（小屏等比缩放，不破坏 1080×700 画布） */
function fit() {
  const stage = document.querySelector('.stage');
  const s = Math.min(1, (innerWidth - 48) / 1080, (innerHeight - 48) / 700);
  stage.style.transform = `scale(${s})`;
}
addEventListener('resize', fit);
fit();
</script>
</body>
