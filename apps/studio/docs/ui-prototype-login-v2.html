<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowork 登录页 v2 · 科技感</title>
<style>
/* ============================================================
   Cowork 登录页重设计 v2 · 科技感 · 2026-07-06
   深色基调 + 品牌绿霓虹光效 + 精密网格 + 玻璃拟态
   色纪律：品牌绿(#3bce78)是唯一发光主色，青色仅作邻近色
   第二光斑（oklch 派生），杜绝紫粉蓝 AI 渐变。
   三布局：极光玻璃 / HUD 分屏 / 终端风，右下 Tweaks 切换
   ============================================================ */

:root {
  --bg: #0a0c0b;                       /* 冷黑，带一丝绿相 */
  --ink: #f2f4f3;
  --ink-2: rgba(242, 244, 243, 0.60);
  --ink-3: rgba(242, 244, 243, 0.34);
  --green: #3bce78;                    /* tokens.css 暗档 --brand */
  --green-deep: #16a34a;               /* 亮档 --brand，按钮渐变深端 */
  --teal: #2dd4bf;                     /* oklch 邻近青，仅第二光斑/细节 */
  --line: rgba(242, 244, 243, 0.10);
  --input-bg: rgba(255, 255, 255, 0.04);
  --error: #ff6b6b;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --easing: cubic-bezier(0.32, 0.72, 0, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
               "PingFang SC", "Helvetica Neue", sans-serif;
  background: #1c1e20;                 /* 展示画布 */
  display: grid; place-items: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============ mac 窗口 frame ============ */
.stage { position: relative; }
.frame {
  width: 1080px; height: 700px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg);
  box-shadow: 0 32px 90px rgba(0,0,0,.6), 0 4px 18px rgba(0,0,0,.45);
  position: relative;
}
.traffic {
  position: absolute; top: 0; left: 0;
  height: 48px; padding-left: 20px;
  display: flex; align-items: center; gap: 8px;
  z-index: 50;
}
.traffic i { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.25); }
.traffic i:nth-child(1) { background: #ff5f57; }
.traffic i:nth-child(2) { background: #febc2e; }
.traffic i:nth-child(3) { background: #28c840; }

/* ============ 背景系统：网格 + 极光光晕 ============ */
/* 细网格：1px 绿线 4.5%，40px 格；mask 让它中下部隐现、边缘消失 */
.grid-layer {
  position: absolute; inset: 0; z-index: 1;
  background:
    linear-gradient(rgba(59,206,120,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,206,120,.045) 1px, transparent 1px);
  background-size: 40px 40px;
  -webkit-mask-image: radial-gradient(ellipse 90% 75% at 50% 62%, #000 20%, transparent 78%);
  mask-image: radial-gradient(ellipse 90% 75% at 50% 62%, #000 20%, transparent 78%);
  pointer-events: none;
}
.frame[data-grid="off"] .grid-layer { display: none; }

/* 极光光晕：底部品牌绿主光斑 + 右上青色副光斑，缓慢呼吸 */
.glow-layer { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.glow-layer::before {
  content: ''; position: absolute;
  left: 50%; bottom: -46%;
  width: 1000px; height: 640px;
  transform: translateX(-50%);
  background: radial-gradient(ellipse at center,
    rgba(59,206,120,.16) 0%, rgba(59,206,120,.05) 42%, transparent 70%);
  animation: breathe 8s ease-in-out infinite;
}
.glow-layer::after {
  content: ''; position: absolute;
  right: -18%; top: -30%;
  width: 660px; height: 520px;
  background: radial-gradient(ellipse at center,
    rgba(45,212,191,.07) 0%, transparent 65%);
  animation: breathe 11s ease-in-out infinite reverse;
}
@keyframes breathe {
  0%, 100% { opacity: .75; transform: translateX(-50%) scale(1); }
  50%      { opacity: 1;   transform: translateX(-50%) scale(1.06); }
}
.glow-layer::after { animation-name: breathe2; }
@keyframes breathe2 {
  0%, 100% { opacity: .7; transform: scale(1); }
  50%      { opacity: 1;  transform: scale(1.08); }
}
/* 光效强度（Tweaks）：boost 提亮、off 关闭 */
.frame[data-glow="boost"] .glow-layer { filter: brightness(1.6) saturate(1.15); }
.frame[data-glow="off"] .glow-layer { display: none; }

/* 漂浮微粒：5 个绿色小光点缓慢上浮（低速低透明度，克制） */
.motes { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.motes i {
  position: absolute; bottom: -8px;
  width: 3px; height: 3px; border-radius: 50%;
  background: rgba(59,206,120,.55);
  box-shadow: 0 0 8px rgba(59,206,120,.5);
  animation: float-up linear infinite;
  opacity: 0;
}
.motes i:nth-child(1) { left: 18%; animation-duration: 16s; animation-delay: 0s; }
.motes i:nth-child(2) { left: 36%; animation-duration: 21s; animation-delay: 4s; width: 2px; height: 2px; }
.motes i:nth-child(3) { left: 58%; animation-duration: 14s; animation-delay: 8s; }
.motes i:nth-child(4) { left: 74%; animation-duration: 24s; animation-delay: 2s; width: 2px; height: 2px; }
.motes i:nth-child(5) { left: 88%; animation-duration: 18s; animation-delay: 11s; }
@keyframes float-up {
  0%   { transform: translateY(0); opacity: 0; }
  8%   { opacity: .8; }
  85%  { opacity: .4; }
  100% { transform: translateY(-720px); opacity: 0; }
}
.frame[data-glow="off"] .motes { display: none; }

/* ============ 共用：字标（发光 C 标） ============ */
.mark {
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 12px;
  background: linear-gradient(160deg, var(--green) 0%, var(--green-deep) 100%);
  color: #06130b;
  font-weight: 700;
  box-shadow: 0 0 28px rgba(59,206,120,.4), 0 0 2px rgba(59,206,120,.6),
              inset 0 1px 0 rgba(255,255,255,.28);
  user-select: none;
}

/* mono overline 小标签（科技感惯用：大写 + 拉字距 + 等宽） */
.overline {
  font-family: var(--mono);
  font-size: 10.5px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(59,206,120,.85);
  display: inline-flex; align-items: center; gap: 8px;
}
.overline::before, .overline::after {
  content: ''; height: 1px; width: 22px;
  background: linear-gradient(90deg, transparent, rgba(59,206,120,.5));
}
.overline::after { background: linear-gradient(90deg, rgba(59,206,120,.5), transparent); }

/* ============ 共用：表单 ============ */
.form { width: 336px; }
.form-head { text-align: center; margin-bottom: 26px; }
.form-head .mark { width: 52px; height: 52px; font-size: 24px; margin-bottom: 18px; }
.form-head .overline { margin-bottom: 14px; }
.form-head h1 {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
  font-size: 30px; font-weight: 600;
  line-height: 1.12; letter-spacing: -0.5px;
  color: var(--ink);
}
.form-head p {
  margin-top: 10px;
  font-size: 14.5px; letter-spacing: -0.1px; line-height: 1.5;
  color: var(--ink-2);
}

/* 浮动 label 输入框：focus 绿色发光 ring */
.field { position: relative; margin-bottom: 12px; }
.field input {
  width: 100%; height: 52px;
  padding: 20px 14px 6px;
  font: inherit; font-size: 15px; letter-spacing: -0.1px;
  color: var(--ink);
  background: var(--input-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  outline: none;
  caret-color: var(--green);
  transition: border-color .2s var(--easing), box-shadow .25s var(--easing),
              background .2s var(--easing);
}
.field input:hover { border-color: rgba(242,244,243,.2); }
.field label {
  position: absolute; left: 15px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px; letter-spacing: -0.1px;
  color: var(--ink-3);
  pointer-events: none;
  transition: all .18s var(--easing);
}
.field input:focus + label,
.field input:not(:placeholder-shown) + label {
  top: 15px; font-size: 10.5px; letter-spacing: .4px;
  color: rgba(59,206,120,.9);
  font-family: var(--mono); text-transform: uppercase;
}
.field input:focus {
  border-color: rgba(59,206,120,.65);
  background: rgba(59,206,120,.045);
  box-shadow: 0 0 0 3px rgba(59,206,120,.14), 0 0 24px rgba(59,206,120,.12);
}

/* 错误态 */
.frame[data-error="on"] .field.password input {
  border-color: var(--error);
  box-shadow: 0 0 0 3px rgba(255,107,107,.14), 0 0 20px rgba(255,107,107,.1);
}
.error-msg {
  display: none;
  font-size: 12.5px; letter-spacing: 0;
  font-family: var(--mono);
  color: var(--error);
  margin: -2px 2px 12px;
}
.error-msg::before { content: '✕ '; }
.frame[data-error="on"] .error-msg { display: block; }
.frame[data-error="on"] .form-inner { animation: shake .4s var(--easing); }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-7px); }
  55% { transform: translateX(5px); }
  80% { transform: translateX(-2px); }
}

/* 主按钮：绿渐变 + 发光 + hover 扫光 */
.btn {
  position: relative;
  width: 100%; height: 48px;
  border: none; border-radius: 12px;
  background: linear-gradient(160deg, var(--green) 0%, var(--green-deep) 115%);
  color: #06130b;
  font: inherit; font-size: 15.5px; font-weight: 700; letter-spacing: -0.1px;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  overflow: hidden;
  box-shadow: 0 6px 26px rgba(59,206,120,.32), inset 0 1px 0 rgba(255,255,255,.3);
  transition: transform .15s var(--easing), box-shadow .25s var(--easing), filter .2s var(--easing);
}
.btn:hover {
  filter: brightness(1.07);
  box-shadow: 0 8px 34px rgba(59,206,120,.45), inset 0 1px 0 rgba(255,255,255,.3);
}
.btn:active { transform: scale(.985); filter: brightness(.97); }
.btn:focus-visible { outline: 2px solid var(--green); outline-offset: 3px; }
/* 扫光：hover 时一道斜白光划过 */
.btn::after {
  content: ''; position: absolute; top: 0; bottom: 0;
  left: -80%; width: 40%;
  background: linear-gradient(105deg, transparent, rgba(255,255,255,.38), transparent);
  transform: skewX(-18deg);
  transition: left .05s;
  pointer-events: none;
}
.btn:hover::after { left: 130%; transition: left .6s var(--easing); }
.btn[data-busy] { pointer-events: none; }
.btn .spinner {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(6,19,11,.3); border-top-color: #06130b;
  animation: spin .7s linear infinite;
  display: none;
}
.btn[data-busy="loading"] .spinner { display: block; }
.btn[data-busy="loading"] .btn-label { display: none; }
.btn .check { display: none; font-size: 17px; }
.btn[data-busy="done"] .check { display: block; }
.btn[data-busy="done"] .btn-label { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 辅助链接 */
.aux {
  margin-top: 18px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  font-size: 13px; letter-spacing: -0.1px;
  color: var(--ink-3);
}
.aux a { color: var(--green); text-decoration: none; }
.aux a:hover { text-shadow: 0 0 12px rgba(59,206,120,.6); }

/* 入场 stagger */
.enter .stagger { animation: rise .6s var(--easing) both; }
.enter .stagger:nth-child(1) { animation-delay: .05s; }
.enter .stagger:nth-child(2) { animation-delay: .12s; }
.enter .stagger:nth-child(3) { animation-delay: .19s; }
.enter .stagger:nth-child(4) { animation-delay: .26s; }
.enter .stagger:nth-child(5) { animation-delay: .33s; }
@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.enter .card-rise { animation: card-in .7s var(--easing) both; }
@keyframes card-in {
  from { opacity: 0; transform: translateY(18px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  .enter .stagger, .enter .card-rise,
  .glow-layer::before, .glow-layer::after, .motes i,
  .orbit .ring, .scanline { animation: none !important; }
}

/* ============ 布局 A：极光玻璃（居中） ============ */
.layout { position: absolute; inset: 0; display: none; z-index: 2; }
.frame[data-layout="aurora"] .layout-aurora { display: flex; }
.layout-aurora { align-items: center; justify-content: center; }
.glass-card {
  position: relative;
  width: 404px;
  padding: 40px 34px 34px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.035);
  -webkit-backdrop-filter: saturate(160%) blur(24px);
  backdrop-filter: saturate(160%) blur(24px);
  border: 1px solid rgba(59, 206, 120, 0.16);
  box-shadow: 0 24px 70px rgba(0,0,0,.4), 0 0 80px rgba(59,206,120,.06);
}
/* 卡顶 1px 渐变高光线：精密感点睛 */
.glass-card::before {
  content: ''; position: absolute; top: -1px; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(59,206,120,.75), transparent);
}
.glass-card .form { width: 100%; }

/* ============ 布局 B：HUD 分屏 ============ */
.frame[data-layout="hud"] .layout-hud { display: flex; }
.layout-hud .brand-pane {
  width: 44%; height: 100%;
  position: relative;
  display: flex; flex-direction: column;
  padding: 60px 48px 36px;
  border-right: 1px solid rgba(59,206,120,.12);
  background:
    radial-gradient(ellipse 80% 60% at 50% 46%, rgba(59,206,120,.07), transparent 70%),
    rgba(255,255,255,.012);
}
.brand-pane .pane-top {
  display: flex; align-items: center; gap: 10px;
}
.brand-pane .pane-top .mark { width: 30px; height: 30px; font-size: 15px; border-radius: 9px; }
.brand-pane .pane-top span { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); }

/* 轨道环：双圆环慢速反向旋转 + 中心发光核 */
.orbit {
  position: relative;
  width: 240px; height: 240px;
  margin: auto;
}
.orbit .ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(59,206,120,.22);
  animation: rotate 22s linear infinite;
}
.orbit .ring::before {
  content: ''; position: absolute; top: -3.5px; left: 50%;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 12px rgba(59,206,120,.9);
}
.orbit .ring.r2 {
  inset: 34px;
  border-color: rgba(45,212,191,.18);
  border-style: dashed;
  animation: rotate 30s linear infinite reverse;
}
.orbit .ring.r2::before {
  width: 5px; height: 5px; top: -3px;
  background: var(--teal);
  box-shadow: 0 0 10px rgba(45,212,191,.8);
}
.orbit .core {
  position: absolute; inset: 0; margin: auto;
  width: 96px; height: 96px;
  border-radius: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; font-weight: 700; color: #06130b;
  background: linear-gradient(160deg, var(--green) 0%, var(--green-deep) 100%);
  box-shadow: 0 0 60px rgba(59,206,120,.5), inset 0 2px 0 rgba(255,255,255,.3);
}
@keyframes rotate { to { transform: rotate(360deg); } }

.brand-pane .slogan { text-align: center; margin-bottom: auto; }
.brand-pane .slogan h2 {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
  font-size: 26px; font-weight: 600; letter-spacing: -0.4px; line-height: 1.3;
  color: var(--ink);
}
.brand-pane .slogan p {
  margin-top: 10px;
  font-size: 13.5px; line-height: 1.6; color: var(--ink-2);
}
/* mono 状态行：系统就绪脉冲点 */
.brand-pane .status {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono);
  font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--ink-3);
}
.brand-pane .status i {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px rgba(59,206,120,.8);
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

.layout-hud .form-pane {
  flex: 1; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.layout-hud .form-head { text-align: left; }
.layout-hud .form-head .mark { display: none; }
.layout-hud .form-head .overline::before { display: none; }
.layout-hud .form-head .overline { gap: 0; }
.layout-hud .form-head .overline::after { margin-left: 8px; }
.layout-hud .aux { justify-content: flex-start; }

/* ============ 布局 C：终端风 ============ */
.frame[data-layout="term"] .layout-term { display: flex; }
.layout-term { align-items: center; justify-content: center; }
/* 扫描线 overlay（极淡，terminal CRT 质感） */
.scanline {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, rgba(255,255,255,.016) 0px, rgba(255,255,255,.016) 1px,
    transparent 1px, transparent 3px);
}
.frame:not([data-layout="term"]) .scanline { display: none; }
/* 角括号容器：四角 L 形描边 */
.term-shell {
  position: relative;
  padding: 46px 42px 40px;
  width: 430px;
}
.term-shell .corner {
  position: absolute; width: 22px; height: 22px;
  border: 1.5px solid rgba(59,206,120,.7);
}
.term-shell .corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
.term-shell .corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
.term-shell .corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
.term-shell .corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }
/* 终端标题行：mono 路径 + 闪烁光标 */
.term-title {
  font-family: var(--mono);
  font-size: 12.5px; letter-spacing: .5px;
  color: var(--ink-2);
  margin-bottom: 26px;
  display: flex; align-items: center; gap: 8px;
}
.term-title .prompt { color: var(--green); }
.term-title .cursor {
  display: inline-block; width: 7px; height: 15px;
  background: var(--green);
  box-shadow: 0 0 8px rgba(59,206,120,.7);
  animation: blink 1.1s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.layout-term .form-head { text-align: left; margin-bottom: 22px; }
.layout-term .form-head .mark { display: none; }
.layout-term .form-head h1 { font-size: 26px; }
.layout-term .aux { justify-content: flex-start; }

/* ============ Tweaks ============ */
.tweaks-toggle {
  position: fixed; right: 20px; bottom: 20px; z-index: 90;
  width: 42px; height: 42px; border-radius: 50%;
  border: none; cursor: pointer;
  background: rgba(255,255,255,.92); color: #1d1d1f;
  font-size: 17px;
  box-shadow: 0 4px 18px rgba(0,0,0,.4);
  transition: transform .15s var(--easing);
}
.tweaks-toggle:hover { transform: scale(1.06); }
.tweaks {
  position: fixed; right: 20px; bottom: 72px; z-index: 90;
  width: 244px;
  background: rgba(24,26,25,.95);
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 14px;
  padding: 16px;
  color: #f2f4f3;
  display: none;
  font-size: 12.5px;
}
.tweaks.open { display: block; }
.tweaks h3 {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: rgba(242,244,243,.5);
  margin-bottom: 12px;
}
.tweaks .row { margin-bottom: 12px; }
.tweaks .row-label { display: block; margin-bottom: 6px; color: rgba(242,244,243,.72); }
.seg { display: flex; background: rgba(255,255,255,.08); border-radius: 8px; padding: 2px; }
.seg button {
  flex: 1; border: none; background: transparent; cursor: pointer;
  color: rgba(242,244,243,.6); font: inherit; font-size: 12px;
  padding: 5px 0; border-radius: 6px;
  transition: background .15s ease, color .15s ease;
}
.seg button.on { background: rgba(59,206,120,.22); color: #fff; font-weight: 600; }
.tweaks .replay {
  width: 100%; margin-top: 2px;
  border: 1px solid rgba(255,255,255,.16); background: transparent;
  color: #f2f4f3; font: inherit; font-size: 12px;
  padding: 7px 0; border-radius: 8px; cursor: pointer;
}
.tweaks .replay:hover { background: rgba(255,255,255,.08); }
</style>
</head>
<body>

<div class="stage">
  <div class="frame enter" id="frame"
       data-layout="aurora" data-glow="std" data-grid="on" data-error="off">
    <div class="glow-layer"></div>

<!-- ═══ Tweaks ═══ -->
<button class="tweaks-toggle" id="tweaksToggle" aria-label="Tweaks">⚙</button>
<div class="tweaks" id="tweaksPanel">
  <h3>Tweaks</h3>
  <div class="row">
    <span class="row-label">布局</span>
    <div class="seg" data-attr="data-layout">
      <button data-val="aurora" class="on">极光玻璃</button>
      <button data-val="hud">HUD 分屏</button>
      <button data-val="term">终端风</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">光效</span>
    <div class="seg" data-attr="data-glow">
      <button data-val="std" class="on">标准</button>
      <button data-val="boost">增强</button>
      <button data-val="off">关</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">网格</span>
    <div class="seg" data-attr="data-grid">
      <button data-val="on" class="on">开</button>
      <button data-val="off">关</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">错误态演示</span>
    <div class="seg" data-attr="data-error">
      <button data-val="off" class="on">关</button>
      <button data-val="on">开</button>
    </div>
  </div>
  <button class="replay" id="replayBtn">重播入场动画</button>
</div>

<script>
const frame = document.getElementById('frame');

document.querySelectorAll('.seg').forEach(seg => {
  const attr = seg.dataset.attr;
  seg.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      frame.setAttribute(attr, btn.dataset.val);
      if (attr === 'data-layout') replayEnter();
    });
  });
});

const panel = document.getElementById('tweaksPanel');
document.getElementById('tweaksToggle').addEventListener('click', () => {
  panel.classList.toggle('open');
});

function replayEnter() {
  frame.classList.remove('enter');
  void frame.offsetWidth;
  frame.classList.add('enter');
}
document.getElementById('replayBtn').addEventListener('click', replayEnter);

document.querySelectorAll('.js-login').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.busy) return;
    btn.dataset.busy = 'loading';
    setTimeout(() => { btn.dataset.busy = 'done'; }, 1100);
    setTimeout(() => { delete btn.dataset.busy; }, 2000);
  });
});

function fit() {
  const stage = document.querySelector('.stage');
  const s = Math.min(1, (innerWidth - 48) / 1080, (innerHeight - 48) / 700);
  stage.style.transform = `scale(${s})`;
}
addEventListener('resize', fit);
fit();
</script>
