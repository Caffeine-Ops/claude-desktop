<!doctype html>
<html lang="zh-CN" class="">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Open Design · 顶栏用户信息条（设计稿）</title>
<style>
  /* ============================================================
     设计 token —— 取自 packages/design-tokens/tokens.css
     ============================================================ */
  :root {
    --background: 240 7% 97%;
    --foreground: 240 3% 12%;
    --card: 0 0% 100%;
    --popover: 0 0% 100%;
    --primary: 211 100% 45%;
    --primary-foreground: 0 0% 100%;
    --muted: 240 5% 93%;
    --muted-foreground: 240 4% 40%;
    --border: 240 6% 84%;
    --input: 240 6% 86%;
    --ring: 211 100% 45%;
    --destructive: 0 72% 50%;
    --success: 142 64% 38%;

    --brand-accent-h: 14 65% 47%;
    --avatar-1: #2a2520;
    --avatar-2: #15110d;
    --avatar-cross: #db6a38;

    --r-sm: 8px;
    --r-md: 11px;
    --r-lg: 14px;

    --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display',
      'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    color-scheme: light;
  }
  html.dark {
    --background: 40 6% 10%;
    --foreground: 40 21% 89%;
    --card: 30 3% 13%;
    --popover: 30 3% 14%;
    --primary: 210 100% 58%;
    --muted: 36 6% 17%;
    --muted-foreground: 36 5% 58%;
    --border: 49 12% 18%;
    --input: 42 8% 25%;
    --ring: 210 100% 58%;
    --success: 142 52% 50%;
    --brand-accent-h: 16 70% 55%;
    --avatar-1: #2a2520;
    --avatar-2: #100e0c;
    color-scheme: dark;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    color: hsl(var(--foreground));
    background:
      radial-gradient(1200px 700px at 50% -10%, hsl(var(--background)) 0%, hsl(var(--background)) 60%),
      hsl(var(--background));
    display: flex; flex-direction: column; align-items: center;
    padding: 70px 24px 40px;
    gap: 30px;
  }
  html.dark body { background: hsl(var(--background)); }

  .stage-label { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: hsl(var(--muted-foreground)); font-weight: 600; }

  /* ============================================================
     仿真窗口 —— 还原 shell 顶栏（44px）
     ============================================================ */
  .window {
    width: 880px; max-width: 100%;
    border-radius: var(--r-lg);
    overflow: visible;
    background: hsl(var(--card));
    border: 1px solid hsl(var(--border));
    box-shadow: 0 30px 80px -40px rgba(0,0,0,.5), 0 8px 24px -16px rgba(0,0,0,.3);
  }
  .chrome {
    position: relative;
    display: flex; align-items: center; gap: 8px;
    height: 44px;
    padding: 8px 14px 8px 14px;
    border-bottom: 1px solid hsl(var(--border));
    border-radius: var(--r-lg) var(--r-lg) 0 0;
    background: hsl(var(--background));
  }
  .lights { display: flex; gap: 8px; padding-right: 10px; }
  .lights i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .lights .r { background: #ff5f57; } .lights .y { background: #febc2e; } .lights .g { background: #28c840; }

  .tabs { display: flex; gap: 4px; flex: 1; min-width: 0; }
  .tab {
    display: flex; align-items: center; gap: 7px; height: 28px; padding: 0 11px;
    border-radius: var(--r-md); font-size: 12.5px; color: hsl(var(--muted-foreground));
    max-width: 180px; white-space: nowrap; overflow: hidden;
  }
  .tab.active { background: hsl(var(--card)); color: hsl(var(--foreground)); box-shadow: inset 0 0 0 1px hsl(var(--border)); }
  .tab .dot { width: 6px; height: 6px; border-radius: 50%; background: hsl(var(--success)); flex: none; }
  .tab .x { margin-left: 2px; opacity: .5; }
  .tplus { width: 26px; height: 26px; border-radius: var(--r-sm); display: grid; place-items: center; color: hsl(var(--muted-foreground)); }

  .chrome-right { display: flex; align-items: center; gap: 6px; position: relative; }

  /* fake content under the bar so proportions read true */
  .body-hint { height: 120px; border-radius: 0 0 var(--r-lg) var(--r-lg); background:
    linear-gradient(180deg, hsl(var(--card)), hsl(var(--background)));
    display: grid; place-items: center; color: hsl(var(--muted-foreground)); font-size: 12px; }

  /* ============================================================
     品牌头像
     ============================================================ */
  .avatar { position: relative; border-radius: 50%; display: grid; place-items: center; flex: none;
    background: linear-gradient(150deg, var(--avatar-1), var(--avatar-2)); }
  .avatar.out { background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); }
  .avatar svg { display: block; }
  .avatar .status { position: absolute; right: -1px; bottom: -1px; width: 9px; height: 9px; border-radius: 50%;
    background: hsl(var(--success)); border: 2px solid hsl(var(--background)); }
  .avatar.in-menu .status { border-color: hsl(var(--popover)); }

  /* ============================================================
     用户芯片（三个变体）
     ============================================================ */
  .chip {
    display: flex; align-items: center; gap: 8px; height: 32px;
    padding: 3px 9px 3px 3px; border-radius: var(--r-md);
    background: transparent; cursor: pointer; user-select: none;
    transition: background-color .15s ease, box-shadow .15s ease;
    -webkit-app-region: no-drag;
  }
  .chip:hover { background: hsl(var(--foreground) / .06); }
  .chip.open { background: hsl(var(--foreground) / .08); }
  .chip .meta { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
  .chip .nm { font-size: 12.5px; font-weight: 600; color: hsl(var(--foreground)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .chip .sub { font-size: 10.5px; color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; letter-spacing: .01em; }
  .chip .caret { color: hsl(var(--muted-foreground)); transition: transform .2s ease; margin-left: 1px; }
  .chip.open .caret { transform: rotate(180deg); }

  /* 变体可见性由 body[data-variant] 控制 */
  body[data-variant="v1"] .chip .sub { display: none; }
  body[data-variant="v1"] .chip .nm { font-size: 13px; }
  body[data-variant="v1"] .avatar.status-host .status { display: none; }

  body[data-variant="v2"] .avatar.status-host .status { display: none; }

  body[data-variant="v3"] .chip .sub { display: none; }
  body[data-variant="v3"] .chip .nm { font-size: 13px; }
  /* v3 显示头像状态点 */

  /* 未登录态：隐藏 meta 双行，显示一个“登录”样式 */
  body[data-auth="out"] .chip .sub { color: hsl(var(--muted-foreground)); }

  /* ============================================================
     账户菜单
     ============================================================ */
  .menu {
    position: absolute; top: calc(100% + 8px); right: 0; z-index: 40;
    width: 256px; border-radius: var(--r-lg); overflow: hidden;
    background: hsl(var(--popover)); border: 1px solid hsl(var(--border));
    box-shadow: 0 18px 50px -20px rgba(0,0,0,.5), 0 6px 16px -10px rgba(0,0,0,.35);
    opacity: 0; transform: translateY(-6px) scale(.985); pointer-events: none;
    transition: opacity .16s ease, transform .16s cubic-bezier(.16,1,.3,1);
  }
  .menu.show { opacity: 1; transform: none; pointer-events: auto; }
  .menu-head { position: relative; display: flex; align-items: center; gap: 12px; padding: 15px 15px 14px; }
  .menu-head::before { content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120px 80px at 18% 0%, hsl(var(--brand-accent-h) / .10), transparent 70%); }
  .menu-head > * { position: relative; }
  .mh-text { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .mh-name { font-size: 14.5px; font-weight: 650; color: hsl(var(--foreground)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mh-phone { font-size: 12px; color: hsl(var(--muted-foreground)); font-variant-numeric: tabular-nums; }
  .badge { display: inline-flex; align-items: center; gap: 5px; align-self: flex-start; margin-top: 2px;
    padding: 2px 8px; border-radius: 980px; font-size: 10.5px; font-weight: 600;
    color: hsl(var(--success)); background: hsl(var(--success) / .12); }
  .badge i { width: 5px; height: 5px; border-radius: 50%; background: hsl(var(--success)); }
  .menu-sep { height: 1px; background: hsl(var(--border)); margin: 0 0; }
  .menu-list { padding: 6px; }
  .mi { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 9px; border: 0; background: transparent;
    border-radius: var(--r-sm); font-family: inherit; font-size: 13px; color: hsl(var(--foreground));
    cursor: pointer; text-align: left; transition: background-color .12s ease; }
  .mi:hover { background: hsl(var(--foreground) / .06); }
  .mi.danger { color: hsl(var(--destructive)); }
  .mi.danger:hover { background: hsl(var(--destructive) / .1); }
  .mi svg { flex: none; opacity: .75; }
  .mi.danger svg { opacity: .9; }
  .mi .kc { margin-left: auto; font-size: 10px; color: hsl(var(--muted-foreground)); font-family: var(--font-mono); }

  /* 未登录菜单头 */
  body[data-auth="out"] .menu-head::before { display: none; }

  /* ============================================================
     Tweaks
     ============================================================ */
  .tweaks { position: fixed; bottom: 18px; right: 18px; z-index: 90; display: flex; flex-direction: column; gap: 10px;
    padding: 12px; border-radius: var(--r-lg); border: 1px solid hsl(var(--border));
    background: hsl(var(--card) / .8); backdrop-filter: saturate(180%) blur(20px);
    box-shadow: 0 14px 40px -18px rgba(0,0,0,.5); width: 210px; }
  .tweaks h4 { margin: 0 0 2px; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }
  .seg { display: flex; gap: 4px; background: hsl(var(--muted)); border-radius: var(--r-sm); padding: 3px; }
  .seg button { flex: 1; height: 26px; border: 0; background: transparent; border-radius: 6px; font-family: inherit;
    font-size: 11.5px; font-weight: 600; color: hsl(var(--muted-foreground)); cursor: pointer; }
  .seg button.on { background: hsl(var(--card)); color: hsl(var(--foreground)); box-shadow: 0 1px 3px rgba(0,0,0,.15); }
  .row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: hsl(var(--foreground)); }
  .sw { width: 38px; height: 22px; border-radius: 980px; background: hsl(var(--muted)); border: 0; position: relative; cursor: pointer; transition: background-color .18s ease; }
  .sw.on { background: hsl(var(--primary)); }
  .sw::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .18s ease; }
  .sw.on::after { left: 18px; }
  .note { font-size: 10.5px; line-height: 1.5; color: hsl(var(--muted-foreground)); }
</style>
</head>
<body data-variant="v2" data-auth="in">

  <div class="stage-label">顶栏用户信息条 · 三个变体</div>

  <div class="window">
    <div class="chrome">
      <div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div>
      <div class="tabs">
        <div class="tab active"><span class="dot"></span>项目重构 · monorepo<span class="x">✕</span></div>
        <div class="tab">Open Design</div>
        <div class="tplus">+</div>
      </div>
      <div class="chrome-right" id="root">
        <!-- 用户芯片 -->
        <div class="chip" id="chip">
          <span class="avatar in status-host" style="width:26px;height:26px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--avatar-cross)" stroke-width="2.4" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              <line x1="7.05" y1="7.05" x2="16.95" y2="16.95"/><line x1="16.95" y1="7.05" x2="7.05" y2="16.95"/>
            </svg>
            <span class="status"></span>
          </span>
          <span class="meta">
            <span class="nm" id="chipName">Kika</span>
            <span class="sub" id="chipSub">138****8888</span>
          </span>
          <svg class="caret" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4.5 6 7.5 9 4.5"/></svg>
        </div>

        <!-- 账户菜单 -->
        <div class="menu" id="menu">
          <div class="menu-head">
            <span class="avatar in in-menu status-host" style="width:42px;height:42px;">
              <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="var(--avatar-cross)" stroke-width="2.2" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                <line x1="7.05" y1="7.05" x2="16.95" y2="16.95"/><line x1="16.95" y1="7.05" x2="7.05" y2="16.95"/>
              </svg>
              <span class="status"></span>
            </span>
            <div class="mh-text">
              <span class="mh-name" id="mName">Kika</span>
              <span class="mh-phone" id="mPhone">+86 138****8888</span>
              <span class="badge"><i></i> 已登录</span>
            </div>
          </div>
          <div class="menu-sep"></div>
          <div class="menu-list">
            <button class="mi">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              账户设置
            </button>
            <button class="mi danger">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
              退出登录
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="body-hint">应用内容区（示意）</div>
  </div>

  <div class="note" style="max-width:560px;text-align:center">
    切到右下角 <b>Tweaks</b> 对比 3 个变体、明暗、登录/未登录态。点芯片可展开账户菜单。<br/>
    昵称「Kika」为<b>占位</b>——后端暂无用户名字段，落地时可改成「可编辑昵称（默认手机号）」或接真实用户系统。
  </div>

  <!-- ============================================================ Tweaks ============================================================ -->
  <div class="tweaks">
    <h4>Tweaks</h4>
    <div>
      <div class="row" style="margin-bottom:6px"><span>变体</span></div>
      <div class="seg" id="segVariant">
        <button data-v="v1">V1 紧凑</button>
        <button data-v="v2" class="on">V2 双行</button>
        <button data-v="v3">V3 状态</button>
      </div>
    </div>
    <div class="row"><span>已登录</span><button class="sw on" id="swAuth"></button></div>
    <div class="row"><span>暗色</span><button class="sw" id="swDark"></button></div>
    <div class="note" id="vDesc"></div>
  </div>

<script>
  const body = document.body;
  const chip = document.getElementById('chip');
  const menu = document.getElementById('menu');
  const root = document.getElementById('root');

  // 变体
  const DESC = {
    v1: 'V1 紧凑：头像 + 昵称 + 箭头，最省横向空间，信息密度低。',
    v2: 'V2 双行：昵称（主）+ 脱敏手机号（次），一眼看到“是谁/什么号”，推荐。',
    v3: 'V3 状态：头像带在线状态点 + 昵称，单行但有“在线”信号。'
  };
  const segV = document.getElementById('segVariant');
  const vDesc = document.getElementById('vDesc');
  function setVariant(v){
    body.dataset.variant = v;
    [...segV.children].forEach(b => b.classList.toggle('on', b.dataset.v === v));
    vDesc.textContent = DESC[v];
  }
  segV.addEventListener('click', e => { const b = e.target.closest('button'); if(b) setVariant(b.dataset.v); });
  setVariant('v2');

  // 登录态
  const swAuth = document.getElementById('swAuth');
  const chipName = document.getElementById('chipName'), chipSub = document.getElementById('chipSub');
  const av = chip.querySelector('.avatar');
  function applyAuth(loggedIn){
    body.dataset.auth = loggedIn ? 'in' : 'out';
    swAuth.classList.toggle('on', loggedIn);
    if(loggedIn){
      chipName.textContent = 'Kika';
      chipSub.textContent = '138****8888';
      av.classList.remove('out'); av.classList.add('in');
      av.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--avatar-cross)" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/><line x1="7.05" y1="7.05" x2="16.95" y2="16.95"/><line x1="16.95" y1="7.05" x2="7.05" y2="16.95"/></svg><span class="status"></span>';
    } else {
      chipName.textContent = '登录';
      chipSub.textContent = '点击登录账户';
      av.classList.remove('in'); av.classList.add('out');
      av.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--muted-foreground))" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>';
    }
    menu.classList.remove('show'); chip.classList.remove('open');
  }
  swAuth.addEventListener('click', () => applyAuth(!swAuth.classList.contains('on')));

  // 暗色
  const swDark = document.getElementById('swDark');
  swDark.addEventListener('click', () => { swDark.classList.toggle('on'); document.documentElement.classList.toggle('dark', swDark.classList.contains('on')); });

  // 展开菜单
  chip.addEventListener('click', (e) => {
    e.stopPropagation();
    if(body.dataset.auth === 'out'){ // 未登录：示意去登录
      chip.animate([{transform:'scale(1)'},{transform:'scale(.97)'},{transform:'scale(1)'}],{duration:180});
      return;
    }
    const open = menu.classList.toggle('show'); chip.classList.toggle('open', open);
  });
  document.addEventListener('click', e => { if(!root.contains(e.target)){ menu.classList.remove('show'); chip.classList.remove('open'); } });
  window.addEventListener('keydown', e => { if(e.key === 'Escape'){ menu.classList.remove('show'); chip.classList.remove('open'); } });
</script>
</body>
</html>
