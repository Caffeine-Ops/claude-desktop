<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计系统 · 设置页重设计原型</title>
<link rel="icon" href="data:,">
<style>
/* ============================================================
   设计系统设置页 · 重设计原型
   数据：design-systems/ 全部 150 条真实条目（脚本提取自 DESIGN.md）
   token 来源：packages/design-tokens/tokens.css（Apple 灰底/白卡/
   品牌绿 hsl(142 76% 36%)/暖黑暗档），不引入体系外颜色。
   核心概念：卡片即预览 —— 每张卡片用该系统自己的色板渲染微型 UI。
   ============================================================ */
:root {
  color-scheme: light;
  --bg: #f5f5f7;
  --fg: #1d1d1f;
  --card: #ffffff;
  --muted-fg: #6e6e73;
  --faint-fg: #a1a1a6;
  --border: hsl(240 6% 84%);
  --hairline: hsl(240 6% 88%);
  --hover: hsl(240 6% 90%);
  --brand: hsl(142 76% 36%);
  --brand-fg: #ffffff;
  --brand-soft: color-mix(in srgb, var(--brand) 10%, transparent);
  --brand-border: color-mix(in srgb, var(--brand) 32%, transparent);
  --glass: rgba(245, 245, 247, 0.72);
  --glass-border: rgba(0, 0, 0, 0.07);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-card: 0 1px 2px rgba(0,0,0,.04), 0 10px 30px -18px rgba(0,0,0,.18);
  --shadow-lift: 0 2px 6px rgba(0,0,0,.06), 0 22px 44px -20px rgba(0,0,0,.28);
  --shadow-modal: 0 24px 80px -24px rgba(0,0,0,.35);
  --preview-inset: inset 0 0 0 1px rgba(0,0,0,.06);
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display',
    'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB',
    'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --radius-card: 14px;
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
}
html[data-theme="dark"] {
  color-scheme: dark;
  --bg: #1a1917;
  --fg: #e8e4dc;
  --card: #222120;
  --muted-fg: #9a9690;
  --faint-fg: #6f6b64;
  --border: #333128;
  --hairline: #2c2a26;
  --hover: #2e2c29;
  --glass: rgba(26, 25, 23, 0.72);
  --glass-border: rgba(255, 255, 255, 0.08);
  --shadow-card: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px -18px rgba(0,0,0,.6);
  --shadow-lift: 0 2px 6px rgba(0,0,0,.4), 0 22px 44px -18px rgba(0,0,0,.7);
  --shadow-modal: 0 24px 80px -24px rgba(0,0,0,.8);
  --preview-inset: inset 0 0 0 1px rgba(255,255,255,.07);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--fg);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-wrap: pretty;
}
button { font-family: inherit; font-size: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input { font-family: inherit; }
::selection { background: color-mix(in srgb, var(--brand) 24%, transparent); }

/* ── 整体骨架：左导航示意 + 右内容 ─────────────────────────── */
.shell { display: grid; grid-template-columns: 232px 1fr; height: 100vh; }
@media (max-width: 860px) { .shell { grid-template-columns: 1fr; } .rail { display: none; } }

/* ── 左侧设置导航（语境示意）──────────────────────────────── */
.rail {
  border-right: 1px solid var(--hairline);
  padding: 20px 12px;
  overflow-y: auto;
  background: color-mix(in srgb, var(--card) 34%, var(--bg));
}
.rail-back {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px; margin-bottom: 14px;
  color: var(--muted-fg); font-size: 13px;
  border-radius: 8px; width: 100%;
  transition: background .15s var(--ease), color .15s var(--ease);
}
.rail-back:hover { background: var(--hover); color: var(--fg); }
.rail-group { margin-bottom: 18px; }
.rail-group-label {
  font-size: 11px; font-weight: 600; color: var(--faint-fg);
  padding: 0 10px 6px; letter-spacing: .02em;
}
.rail-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 6.5px 10px; border-radius: 8px;
  font-size: 13px; color: var(--muted-fg); text-align: left;
  transition: background .15s var(--ease), color .15s var(--ease);
}
.rail-item:hover { background: var(--hover); color: var(--fg); }
.rail-item.active {
  background: var(--hover); color: var(--fg); font-weight: 600;
}
.rail-item .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: currentColor; opacity: .45; flex: none;
}
.rail-item.active .dot { opacity: 1; }

/* ── 内容区 ────────────────────────────────────────────────── */
.main { overflow-y: auto; scroll-padding-top: 120px; }
.page { max-width: 1180px; margin: 0 auto; padding: 44px 44px 96px; }
@media (max-width: 1024px) { .page { padding: 32px 24px 96px; } }

/* 页头 */
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 10px; }
.page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; }
.page-sub { margin-top: 8px; color: var(--muted-fg); font-size: 13.5px; max-width: 560px; }
.page-stats { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.stat-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted-fg);
  background: var(--card); border: 1px solid var(--hairline);
  padding: 4px 10px; border-radius: 999px; box-shadow: var(--shadow-sm);
}
.stat-chip strong { color: var(--fg); font-weight: 650; font-variant-numeric: tabular-nums; }
.stat-chip.hidden-chip { cursor: pointer; transition: border-color .15s var(--ease), color .15s var(--ease); }
.stat-chip.hidden-chip:hover { border-color: var(--brand-border); color: var(--brand); }
.stat-chip.hidden-chip.on { background: var(--brand-soft); border-color: var(--brand-border); color: var(--brand); }
.stat-chip.hidden-chip.on strong { color: var(--brand); }

.btn-primary {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--brand); color: var(--brand-fg);
  font-size: 13.5px; font-weight: 600;
  padding: 9px 16px; border-radius: 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,.12), 0 8px 20px -10px color-mix(in srgb, var(--brand) 55%, transparent);
  transition: transform .15s var(--ease), box-shadow .15s var(--ease), filter .15s var(--ease);
  white-space: nowrap; flex: none;
}
.btn-primary:hover { filter: brightness(1.06); box-shadow: 0 2px 4px rgba(0,0,0,.14), 0 12px 26px -10px color-mix(in srgb, var(--brand) 65%, transparent); }
.btn-primary:active { transform: scale(.97); }
.btn-primary svg { flex: none; }

/* ── sticky 毛玻璃工具栏 ───────────────────────────────────── */
.toolbar {
  position: sticky; top: 0; z-index: 20;
  margin: 22px -12px 6px; padding: 12px 12px;
  background: var(--glass);
  -webkit-backdrop-filter: blur(20px) saturate(1.7);
  backdrop-filter: blur(20px) saturate(1.7);
  border-bottom: 1px solid var(--glass-border);
}
.toolbar-row { display: flex; gap: 10px; align-items: center; }
.search-wrap { position: relative; flex: 1; max-width: 380px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; translate: 0 -50%; color: var(--faint-fg); pointer-events: none; }
.search-input {
  width: 100%; padding: 8.5px 30px 8.5px 33px;
  background: var(--card); color: var(--fg);
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 13.5px; outline: none; box-shadow: var(--shadow-sm);
  transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
}
.search-input::placeholder { color: var(--faint-fg); }
.search-input:focus {
  border-color: color-mix(in srgb, var(--brand) 55%, transparent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 14%, transparent);
}
.search-clear {
  position: absolute; right: 6px; top: 50%; translate: 0 -50%;
  width: 20px; height: 20px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  color: var(--muted-fg); background: var(--hover);
}
.search-clear.show { display: inline-flex; }

/* 分类 pills：横向滚动 + 两端渐隐 */
.cat-scroller { position: relative; margin-top: 10px; }
.cat-row {
  display: flex; gap: 6px; overflow-x: auto; padding: 2px;
  scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to right, transparent, #000 18px, #000 calc(100% - 26px), transparent);
          mask-image: linear-gradient(to right, transparent, #000 18px, #000 calc(100% - 26px), transparent);
}
.cat-row::-webkit-scrollbar { display: none; }
.cat-pill {
  flex: none; display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; padding: 5.5px 12px; border-radius: 999px;
  color: var(--muted-fg); background: var(--card);
  border: 1px solid var(--hairline); box-shadow: var(--shadow-sm);
  transition: color .15s var(--ease), border-color .15s var(--ease), background .15s var(--ease);
  white-space: nowrap;
}
.cat-pill:hover { color: var(--fg); border-color: var(--border); }
.cat-pill.active { background: var(--fg); color: var(--bg); border-color: var(--fg); font-weight: 600; }
.cat-pill .n { font-size: 11px; opacity: .55; font-variant-numeric: tabular-nums; }

/* ── 分组与网格 ────────────────────────────────────────────── */
.group { margin-top: 34px; }
.group-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.group-title { font-size: 17px; font-weight: 650; letter-spacing: -0.01em; }
.group-en { font-size: 10.5px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--faint-fg); }
.group-count { font-size: 12px; color: var(--faint-fg); font-variant-numeric: tabular-nums; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
.page[data-density="compact"] .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
.page[data-cardstyle="list"] .grid { grid-template-columns: 1fr; gap: 8px; }

/* ── 卡片（共通）──────────────────────────────────────────── */
.card {
  position: relative;
  background: var(--card);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: transform .22s var(--ease), box-shadow .22s var(--ease), border-color .22s var(--ease);
  animation: card-in .45s var(--ease) both;
  outline: none;
}
@keyframes card-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); border-color: var(--border); }
.card:focus-visible { box-shadow: var(--shadow-card), 0 0 0 3px color-mix(in srgb, var(--brand) 30%, transparent); }
.card.flash { animation: card-flash 1.4s var(--ease); }
@keyframes card-flash {
  0%, 60% { border-color: var(--brand); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 22%, transparent); }
  100% { border-color: var(--hairline); }
}
html[data-motion="off"] .card,
html[data-motion="off"] .card * { animation: none !important; transition: none !important; }

/* 关闭态：预览转灰 + 徽标 */
.card.off .preview, .card.off .strip, .card.off .list-dots { filter: grayscale(1) contrast(.9); opacity: .5; }
.card.off .card-title { color: var(--muted-fg); }
.card.off:hover { transform: none; box-shadow: var(--shadow-card); }
.off-badge {
  display: none; font-size: 10.5px; font-weight: 600; color: var(--muted-fg);
  background: var(--hover); border-radius: 999px; padding: 2px 8px; flex: none;
}
.card.off .off-badge { display: inline-block; }

/* ── 形态 A：微型预览（默认）─────────────────────────────── */
.preview {
  position: relative; height: 128px; margin: 8px 8px 0;
  border-radius: 9px; overflow: hidden;
  box-shadow: var(--preview-inset);
  transition: filter .2s var(--ease), opacity .2s var(--ease);
}
.page[data-density="compact"] .preview { height: 104px; }
.pv-nav { position: absolute; top: 10px; left: 12px; display: flex; gap: 4px; }
.pv-nav i { width: 5px; height: 5px; border-radius: 50%; display: block; }
.pv-chip { position: absolute; top: 8px; right: 12px; width: 26px; height: 9px; border-radius: 999px; }
.pv-panel {
  position: absolute; left: 12px; top: 28px; bottom: 12px; width: 58%;
  border-radius: 7px; padding: 10px 11px;
  display: flex; flex-direction: column; gap: 6px;
  transition: transform .25s var(--ease);
}
.pv-h { height: 8px; border-radius: 4px; width: 62%; }
.pv-l { height: 5px; border-radius: 3px; }
.pv-btnrow { margin-top: auto; display: flex; gap: 6px; align-items: center; }
.pv-btn { width: 38px; height: 13px; border-radius: 6.5px; transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
.pv-btn2 { width: 26px; height: 13px; border-radius: 6.5px; }
.pv-side {
  position: absolute; right: 12px; top: 34px; width: 26%; height: 58px;
  border-radius: 7px; padding: 8px;
  display: flex; flex-direction: column; gap: 5px;
  transition: transform .25s var(--ease);
}
.pv-side i { display: block; height: 4px; border-radius: 2px; }
.pv-side .pv-dot { width: 9px; height: 9px; border-radius: 3px; margin-bottom: 1px; }
.card:hover .pv-panel { transform: translateY(-2px); }
.card:hover .pv-side { transform: translateY(-3px); }
.card:hover .pv-btn { transform: scale(1.08); box-shadow: 0 0 10px var(--pv-glow, transparent); }

.card-meta { padding: 11px 13px 12px; display: flex; align-items: flex-start; gap: 10px; }
.card-text { flex: 1; min-width: 0; }
.card-title-row { display: flex; align-items: center; gap: 8px; }
.card-title { font-size: 14px; font-weight: 650; letter-spacing: -0.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-sum {
  margin-top: 3px; font-size: 12px; color: var(--muted-fg); line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.page[data-density="compact"] .card-sum { -webkit-line-clamp: 1; }

/* ── 形态 B：色板条 ───────────────────────────────────────── */
.strip { display: none; height: 54px; margin: 8px 8px 0; border-radius: 9px; overflow: hidden; box-shadow: var(--preview-inset); }
.strip { grid-auto-flow: column; grid-auto-columns: 1fr; }
.strip i { display: block; transition: flex .2s var(--ease); }
.page[data-cardstyle="strip"] .strip { display: grid; }
.page[data-cardstyle="strip"] .preview { display: none; }

/* ── 形态 C：紧凑列表 ─────────────────────────────────────── */
.page[data-cardstyle="list"] .preview, .page[data-cardstyle="list"] .strip { display: none; }
.page[data-cardstyle="list"] .card-meta { padding: 10px 14px; align-items: center; }
.page[data-cardstyle="list"] .card-sum { -webkit-line-clamp: 1; margin-top: 1px; }
.list-dots { display: none; gap: 4px; flex: none; margin-right: 2px; }
.list-dots i { width: 14px; height: 14px; border-radius: 5px; box-shadow: var(--preview-inset); }
.page[data-cardstyle="list"] .list-dots { display: flex; }

/* ── 开关 ─────────────────────────────────────────────────── */
.switch { position: relative; width: 36px; height: 21px; flex: none; cursor: pointer; }
.switch input { position: absolute; opacity: 0; inset: 0; margin: 0; cursor: pointer; }
.switch .track {
  position: absolute; inset: 0; border-radius: 999px;
  background: color-mix(in srgb, var(--fg) 16%, var(--bg));
  transition: background .2s var(--ease);
}
.switch input:checked + .track { background: var(--brand); }
.switch .thumb {
  position: absolute; top: 2px; left: 2px; width: 17px; height: 17px;
  border-radius: 50%; background: #fff;
  box-shadow: 0 1px 2px rgba(0,0,0,.25);
  transition: translate .2s var(--ease);
}
.switch input:checked ~ .thumb { translate: 15px 0; }
.switch input:focus-visible ~ .track { box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 25%, transparent); }

/* ── 空态 ─────────────────────────────────────────────────── */
.empty { text-align: center; padding: 90px 0 40px; color: var(--muted-fg); }
.empty .big { font-size: 15px; font-weight: 600; color: var(--fg); margin-bottom: 6px; }
.empty button { margin-top: 14px; color: var(--brand); font-weight: 600; font-size: 13px; }
.empty button:hover { text-decoration: underline; }

/* ── 模态（预览 / 添加）───────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,.42);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; padding: 32px;
}
.overlay.open { display: flex; animation: ov-in .2s ease both; }
@keyframes ov-in { from { opacity: 0; } }
.modal {
  width: 100%; max-width: 860px; max-height: calc(100vh - 64px);
  background: var(--card); border-radius: 18px;
  box-shadow: var(--shadow-modal);
  border: 1px solid var(--glass-border);
  display: flex; flex-direction: column; overflow: hidden;
  animation: md-in .24s var(--ease) both;
}
@keyframes md-in { from { opacity: 0; transform: scale(.965) translateY(8px); } }
html[data-motion="off"] .overlay.open, html[data-motion="off"] .modal { animation: none; }
.modal-head { display: flex; align-items: center; gap: 12px; padding: 18px 20px 14px; }
.modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.modal-cat {
  font-size: 11px; font-weight: 600; color: var(--muted-fg);
  border: 1px solid var(--hairline); border-radius: 999px; padding: 3px 9px;
}
.modal-close {
  margin-left: auto; width: 28px; height: 28px; border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--muted-fg); transition: background .15s var(--ease);
}
.modal-close:hover { background: var(--hover); color: var(--fg); }
.modal-body { overflow-y: auto; padding: 0 20px 20px; }

/* 大预览场景（用该系统色板渲染）*/
.stage {
  border-radius: 12px; overflow: hidden; box-shadow: var(--preview-inset);
  padding: 22px 26px 24px; position: relative;
}
.stage-nav { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
.stage-logo { width: 12px; height: 12px; border-radius: 4px; }
.stage-nav i { height: 6px; width: 34px; border-radius: 3px; display: block; }
.stage-nav .sp { flex: 1; }
.stage-pill { width: 54px; height: 20px; border-radius: 999px; }
.stage-cols { display: flex; gap: 26px; align-items: flex-start; }
.stage-hero { flex: 1.5; min-width: 0; }
.stage-kicker { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .65; margin-bottom: 10px; }
.stage-h1 { font-size: 34px; font-weight: 750; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 12px; overflow-wrap: anywhere; }
.stage-p { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }
.stage-p i { height: 6px; border-radius: 3px; display: block; }
.stage-cta { display: flex; gap: 10px; align-items: center; }
.stage-btn { font-size: 12.5px; font-weight: 650; padding: 8px 16px; border-radius: 8px; }
.stage-card { flex: 1; border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 9px; }
.stage-card .row { display: flex; align-items: center; gap: 8px; }
.stage-card .av { width: 18px; height: 18px; border-radius: 6px; flex: none; }
.stage-card i { height: 5px; border-radius: 2.5px; display: block; flex: 1; }
@media (max-width: 640px) { .stage-cols { flex-direction: column; } .stage-card { width: 100%; } }

/* 色板行（点击复制）*/
.palette { display: flex; gap: 8px; margin-top: 14px; }
.palette button {
  flex: 1; height: 58px; border-radius: 10px;
  box-shadow: var(--preview-inset);
  display: flex; align-items: flex-end; padding: 8px 10px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  transition: transform .15s var(--ease);
}
.palette button:hover { transform: translateY(-2px); }
.palette button:active { transform: scale(.98); }

.modal-info { display: flex; gap: 18px; margin-top: 16px; flex-wrap: wrap; }
.info-item { font-size: 12px; color: var(--muted-fg); }
.info-item b { display: block; font-size: 11px; font-weight: 600; color: var(--faint-fg); margin-bottom: 2px; }
.info-item code { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg); }
.modal-foot {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-top: 1px solid var(--hairline);
}
.modal-foot .hint { font-size: 12.5px; color: var(--muted-fg); }
.modal-foot .switch { margin-left: auto; }
.modal-foot .state { font-size: 12.5px; font-weight: 600; }

/* 添加设计系统 表单 */
.form-modal { max-width: 560px; }
.form-body { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 16px; }
.field-label { font-size: 12px; font-weight: 650; color: var(--muted-fg); margin-bottom: 7px; }
.seg { display: inline-flex; background: var(--hover); border-radius: 9px; padding: 3px; gap: 2px; }
.seg button {

/* ── toast ────────────────────────────────────────────────── */
.toast {

  font-size: 12.5px; font-weight: 600;
  padding: 9px 16px; border-radius: 999px;

}
.toast.show { opacity: 1; translate: -50% 0; }

/* ── Tweaks 面板 ──────────────────────────────────────────── */
.tweaks-fab {

.tweaks {

/* ── 色板工具 ── */
function hexRgb(h) {
  const n = parseInt(h.slice(1), 16);
  return [n >> 16 & 255, n >> 8 & 255, n & 255];
}
function lum(h) {
  const [r, g, b] = hexRgb(h).map((v) => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
function alpha(h, a) {
  const [r, g, b] = hexRgb(h);
  return `rgba(${r},${g},${b},${a})`;
}
function sat(h) {
  const [r, g, b] = hexRgb(h);
  return (Math.max(r, g, b) - Math.min(r, g, b)) / 255;
}
/* 每条数据推断出稳定的四色角色：底 / 面 / 墨 / 强调。
   原则：swatches[0]（各系统的 surface）永远当底——深色系统必须保持深色气质，
   不做「最浅色当底」的重排（HUD 那类 near-black + 荧光绿会被翻成刺眼绿底）。
   墨 = 其余颜色里与底对比最大者（不够就退中性色）；强调 = 其余里最饱和者。 */
function roles(sw) {
  const s = sw && sw.length ? [...new Set(sw)] : [];
  if (s.length === 0) {
    return { bg: '#e8e8ec', panel: 'rgba(0,0,0,.06)', ink: '#3a3a40', accent: '#6e6e78', panelSolid: null };
  }
  const bg = s[0];
  const rest = s.slice(1);
  // 先抢强调色（最饱和者）——否则唯一的品牌彩色会被墨色占走，强调只剩灰
  let accent = null, bestS = -1;
  for (const c of rest) {
    // 几乎与底同色的候选不要（白底配白强调等于隐形）
    if (sat(c) > bestS && (sat(c) > 0.12 || Math.abs(lum(c) - lum(bg)) > 0.12)) {
      bestS = sat(c); accent = c;
    }
  }
  const rem = rest.filter((c) => c !== accent);
  let ink = null, best = -1;
  for (const c of rem) {
    const d = Math.abs(lum(c) - lum(bg));
    if (d > best) { best = d; ink = c; }
  }
  if (best < 0.25) {
    // 深色系统优先沿用强调色当墨（HUD/终端类「荧光字」正是其身份）；浅色系统退中性
    if (lum(bg) < 0.5 && accent && Math.abs(lum(accent) - lum(bg)) > 0.3) ink = accent;
    else ink = lum(bg) > 0.5 ? '#1d1d1f' : '#f5f5f7';
  }
  if (!accent) accent = ink;
  const rem2 = rem.filter((c) => c !== ink);
  let panelSolid = rem2[0] ?? null;
  if (panelSolid && Math.abs(lum(panelSolid) - lum(bg)) < 0.03) panelSolid = null;
  return { bg, ink, accent, panel: panelSolid ?? alpha(ink, 0.07), panelSolid };
}
/* 面板内元素的墨色：实色面板相对面板亮度取黑/白，衍生半透明面板沿用整体墨色 */
function panelInk(r) {
  if (r.panelSolid) return lum(r.panelSolid) > 0.45 ? '#000000' : '#ffffff';
  return r.ink;
}
const DATA = RAW.map((d) => ({ ...d, roles: roles(d.swatches) }));

/* ── 状态 ── */
const disabled = new Set();       // 已关闭（隐藏）的 id
let search = '';
let activeCat = 'All';
let onlyHidden = false;
let previewId = null;

const $ = (id) => document.getElementById(id);
const content = $('content');

/* ── 渲染：统计 chips ── */
function renderStats() {
  const cats = new Set(DATA.map((d) => d.category)).size;
  const h = disabled.size;
  $('stats').innerHTML = `
    <span class="stat-chip">已安装 <strong>${DATA.length}</strong></span>
    <span class="stat-chip"><strong>${cats}</strong> 个分类</span>
    ${h > 0 ? `<span class="stat-chip hidden-chip${onlyHidden ? ' on' : ''}" id="hiddenChip" role="button" tabindex="0">已隐藏 <strong>${h}</strong>${onlyHidden ? ' · 正在只看这些' : ''}</span>` : ''}
  `;
  const chip = $('hiddenChip');
  if (chip) chip.addEventListener('click', () => {
    onlyHidden = !onlyHidden;
    if (onlyHidden) { search = ''; $('search').value = ''; activeCat = 'All'; renderCats(); }
    renderAll();
  });
}

/* ── 渲染：分类 pills ── */
function renderCats() {
  const counts = new Map();
  for (const d of DATA) counts.set(d.category, (counts.get(d.category) ?? 0) + 1);
  const cats = [...counts.keys()].sort(
    (a, b) => (CAT_ORDER.get(a) ?? 99) - (CAT_ORDER.get(b) ?? 99) || a.localeCompare(b),
  );
  const row = $('catRow');
  row.innerHTML = [
    `<button type="button" class="cat-pill${activeCat === 'All' ? ' active' : ''}" data-cat="All">全部 <span class="n">${DATA.length}</span></button>`,
    ...cats.map((c) =>
      `<button type="button" class="cat-pill${activeCat === c ? ' active' : ''}" data-cat="${c}">${CAT_ZH.get(c) ?? c} <span class="n">${counts.get(c)}</span></button>`),
  ].join('');
  row.querySelectorAll('.cat-pill').forEach((b) => b.addEventListener('click', () => {
    activeCat = b.dataset.cat;
    renderCats(); renderList();
  }));
}

/* ── 过滤 ── */
function filtered() {
  const q = search.toLowerCase();
  return DATA.filter((d) => {
    if (onlyHidden && !disabled.has(d.id)) return false;
    if (activeCat !== 'All' && d.category !== activeCat) return false;
    if (q && !d.title.toLowerCase().includes(q) && !d.summary.toLowerCase().includes(q)) return false;
    return true;
  });
}

/* ── 渲染：卡片列表 ── */
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

function cardHtml(d, i) {
  const r = d.roles;
  const pi = panelInk(r);
  const off = disabled.has(d.id);
  const delay = Math.min(i * 24, 360);
  const dots = (d.swatches.length ? d.swatches : [r.bg, r.panel, r.ink, r.accent])
    .map((c) => `<i style="background:${c}"></i>`).join('');
  return `
  <article class="card${off ? ' off' : ''}" data-id="${d.id}" tabindex="0" role="button"
           aria-label="${esc(d.title)}" style="animation-delay:${delay}ms; --pv-glow:${alpha(r.accent, 0.45)}">
    <div class="preview" style="background:${r.bg}">
      <div class="pv-nav">
        <i style="background:${alpha(r.ink, 0.3)}"></i><i style="background:${alpha(r.ink, 0.3)}"></i><i style="background:${alpha(r.ink, 0.3)}"></i>
      </div>
      <div class="pv-chip" style="background:${r.accent}"></div>
      <div class="pv-panel" style="background:${r.panel}; box-shadow: 0 4px 14px ${alpha('#000000', lum(r.bg) > 0.5 ? 0.07 : 0.3)}">
        <div class="pv-h" style="background:${alpha(pi, 0.85)}"></div>
        <div class="pv-l" style="background:${alpha(pi, 0.3)}; width:88%"></div>
        <div class="pv-l" style="background:${alpha(pi, 0.3)}; width:64%"></div>
        <div class="pv-btnrow">
          <div class="pv-btn" style="background:${r.accent}"></div>
          <div class="pv-btn2" style="background:${alpha(pi, 0.16)}"></div>
        </div>
      </div>
      <div class="pv-side" style="background:${alpha(r.ink, 0.09)}">
        <span class="pv-dot" style="background:${r.accent}"></span>
        <i style="background:${alpha(r.ink, 0.4)}; width:80%"></i>
        <i style="background:${alpha(r.ink, 0.22)}; width:55%"></i>
      </div>
    </div>
    <div class="strip">${dots}</div>
    <div class="card-meta">
      <span class="list-dots">${dots}</span>
      <div class="card-text">
        <div class="card-title-row">
          <span class="card-title">${esc(d.title)}</span>
          <span class="off-badge">已隐藏</span>
        </div>
        <div class="card-sum">${esc(d.summary)}</div>
      </div>
      <label class="switch" title="在主页画廊显示">
        <input type="checkbox" ${off ? '' : 'checked'} aria-label="在主页画廊显示 ${esc(d.title)}">
        <span class="track"></span><span class="thumb"></span>
      </label>
    </div>
  </article>`;
}

function renderList() {
  const items = filtered();
  if (items.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="big">没有匹配的设计系统</div>
        <div>换个关键词，或者清掉当前筛选试试。</div>
        <button type="button" id="clearFilters">清除全部筛选</button>
      </div>`;
    $('clearFilters').addEventListener('click', () => {
      search = ''; $('search').value = ''; activeCat = 'All'; onlyHidden = false;
      renderAll();
    });
    updateSearchClear();
    return;
  }
  // 按分类分组（保持 pills 同一顺序）
  const groups = new Map();
  for (const d of items) {
    if (!groups.has(d.category)) groups.set(d.category, []);
    groups.get(d.category).push(d);
  }
  const cats = [...groups.keys()].sort(
    (a, b) => (CAT_ORDER.get(a) ?? 99) - (CAT_ORDER.get(b) ?? 99) || a.localeCompare(b),
  );
  let idx = 0;
  content.innerHTML = cats.map((c) => {
    const list = groups.get(c);
    const head = activeCat === 'All'
      ? `<div class="group-head">
           <span class="group-title">${CAT_ZH.get(c) ?? c}</span>
           <span class="group-en">${esc(c)}</span>
           <span class="group-count">${list.length}</span>
         </div>`
      : '';
    return `<section class="group">${head}<div class="grid">${list.map((d) => cardHtml(d, idx++)).join('')}</div></section>`;
  }).join('');

  // 事件：开关（阻断冒泡）与打开预览
  content.querySelectorAll('.card').forEach((card) => {
    const id = card.dataset.id;
    const toggle = card.querySelector('.switch input');
    toggle.addEventListener('click', (e) => e.stopPropagation());
    toggle.addEventListener('change', () => setEnabled(id, toggle.checked));
    card.addEventListener('click', () => openPreview(id));
    card.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      if (e.target.closest('.switch')) return;
      e.preventDefault(); openPreview(id);
    });
  });
}

function setEnabled(id, enabled) {
  const wasOnlyHidden = onlyHidden;
  if (enabled) disabled.delete(id); else disabled.add(id);
  if (disabled.size === 0) onlyHidden = false;
  renderStats();
  const card = content.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
  if (card && !(wasOnlyHidden && enabled)) {
    card.classList.toggle('off', !enabled);
    // 预览模态里的开关也走这条路——卡片上的 checkbox 必须跟着写回，否则两处状态分家
    card.querySelector('.switch input').checked = enabled;
  } else {
    renderList(); // 「只看已隐藏」下重新打开 → 条目应离开列表
  }
  const d = DATA.find((x) => x.id === id);
  showToast(enabled ? `「${d.title}」已在主页画廊显示` : `已隐藏「${d.title}」`);
}

function renderAll() { renderStats(); renderCats(); renderList(); }

/* ── 搜索 ── */
function updateSearchClear() { $('searchClear').classList.toggle('show', search.length > 0); }
$('search').addEventListener('input', (e) => {
  search = e.target.value.trim();
  if (search && onlyHidden) { onlyHidden = false; renderStats(); }
  updateSearchClear(); renderList();
});
$('searchClear').addEventListener('click', () => {
  search = ''; $('search').value = ''; updateSearchClear(); renderList(); $('search').focus();
});

/* ── 预览模态 ── */

      <span class="stage-logo" style="background:${r.accent}"></span>

          <span class="stage-btn" style="background:${r.accent}; color:${lum(r.accent) > 0.45 ? '#111' : '#fff'}">主操作</span>

        </div>
      </div>
      <div class="stage-card" style="background:${r.panel}; box-shadow: 0 10px 30px ${alpha('#000000', lum(r.bg) > 0.5 ? 0.08 : 0.35)}">
        <div class="row"><span class="av" style="background:${r.accent}"></span><i style="background:${alpha(pi, 0.6)}"></i></div>
        <i style="background:${alpha(pi, 0.3)}"></i>
        <i style="background:${alpha(pi, 0.3)}; width:82%"></i>
        <i style="background:${alpha(pi, 0.18)}; width:60%"></i>
      </div>
    </div>`;
  $('pmPalette').innerHTML = (d.swatches.length ? d.swatches : [r.bg, r.panel, r.ink, r.accent])
    .map((c) => `<button type="button" style="background:${c}; color:${lum(c) > 0.45 ? 'rgba(0,0,0,.75)' : 'rgba(255,255,255,.9)'}" data-hex="${c}">${c}</button>`)
    .join('');
  $('pmPalette').querySelectorAll('button').forEach((b) => b.addEventListener('click', () => {
    navigator.clipboard?.writeText(b.dataset.hex).catch(() => {});
    showToast(`已复制 ${b.dataset.hex}`);
  }));
  $('pmInfo').innerHTML = `
    <span class="info-item"><b>分类</b>${esc(d.category)}</span>
    <span class="info-item"><b>标识</b><code>${esc(d.id)}</code></span>
    <span class="info-item"><b>来源</b>内置库</span>`;
  syncPreviewToggle();
  $('previewOverlay').classList.add('open');
}
function syncPreviewToggle() {
  const off = disabled.has(previewId);
  $('pmToggle').checked = !off;
  $('pmState').textContent = off ? '已隐藏' : '已显示';
  $('pmState').style.color = off ? 'var(--muted-fg)' : 'var(--brand)';
}
$('pmToggle').addEventListener('change', (e) => {
  setEnabled(previewId, e.target.checked);
  syncPreviewToggle();
});
$('pmClose').addEventListener('click', () => $('previewOverlay').classList.remove('open'));
$('previewOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) $('previewOverlay').classList.remove('open');
});

$('addBtn').addEventListener('click', () => $('addOverlay').classList.add('open'));
$('addClose').addEventListener('click', () => $('addOverlay').classList.remove('open'));
$('addOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) $('addOverlay').classList.remove('open');
});
function segBind(seg, onPick) {
  seg.querySelectorAll('button').forEach((b) => b.addEventListener('click', () => {
    seg.querySelectorAll('button').forEach((x) => x.classList.toggle('active', x === b));
    onPick(b);
  }));
}
segBind($('srcSeg'), (b) => {
  const gh = b.dataset.v === 'github';
  $('pathLabel').textContent = gh ? '仓库地址' : '项目路径';
  $('pathInput').placeholder = gh ? 'https://github.com/owner/repo' : '/path/to/project';
});
segBind($('modeSeg'), (b) => { $('modeHint').textContent = b.dataset.hint; });
$('pathInput').addEventListener('input', (e) => {
  $('importBtn').disabled = e.target.value.trim().length === 0;
  $('importNote').classList.remove('show');
});
$('importBtn').addEventListener('click', () => {
  const btn = $('importBtn');
  btn.disabled = true; btn.textContent = '解析中…';
  setTimeout(() => {
    btn.textContent = '导入'; btn.disabled = $('pathInput').value.trim().length === 0;
    $('importNote').classList.add('show');
  }, 900);
});

/* ── Tweaks ── */
$('tweaksFab').addEventListener('click', () => $('tweaksPanel').classList.toggle('open'));
document.querySelectorAll('.tweaks .seg').forEach((seg) => {
  segBind(seg, (b) => {
    const k = seg.dataset.tweak, v = b.dataset.v;
    if (k === 'theme') document.documentElement.dataset.theme = v;
    else if (k === 'motion') document.documentElement.dataset.motion = v;
    else $('page').dataset[k] = v;
  });
});

/* ── Esc 关闭最上层弹层 ── */
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  for (const id of ['previewOverlay', 'addOverlay']) {
    const el = $(id);
    if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  }
  $('tweaksPanel').classList.remove('open');
});

/* ── toast ── */
let toastTimer = 0;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

renderAll();
</script>
</body>
</html>
