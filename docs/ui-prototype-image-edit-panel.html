<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片编辑面板 · 交互原型</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   图片标记编辑面板 — 交互原型（对应 ImageEditPanel.tsx）
   色板 1:1 继承 packages/design-tokens/tokens.css（同 shell-refined 稿）：
     亮档底 #f5f5f7 / 墨 #1d1d1f / 品牌绿 hsl(142 76% 36%)
     暗档暖黑 #1a1917 / card #222120 / 提亮绿 hsl(145 60% 52%)
   交互（对齐 2026-07-09 用户给的 Gemini/Whisk 参照）：
     · 点图落编号标记 → 白胶囊浮条「描述改动」（Enter 确认 / Esc 删点）
     · 点已确认的圈重开编辑；图右侧 55% 之后浮条自动翻左
     · 底栏：+ 添加融合素材（真 file input）｜可选额外编辑｜计数｜发送
     · 发送 → 弹层预览将发出的协议（胶囊卡 + CLI 指令），验证数据契约
   Tweaks：主题 / 图片比例 / 标记配色 / 描述呈现（浮条 vs 侧列表）
   ═══════════════════════════════════════════════════════════════════ */

:root {
  color-scheme: light;
  --bg: #f5f5f7;
  --panel: #ffffff;
  --panel-soft: #fbfbfc;
  --ink: #1d1d1f;
  --ink-2: #6e6e73;
  --ink-3: #a1a1a6;
  --hairline: rgba(29, 29, 31, 0.08);
  --hairline-strong: rgba(29, 29, 31, 0.13);
  --brand: hsl(142 76% 36%);
  --brand-ink: hsl(142 72% 29%);
  --brand-tint: hsl(142 76% 36% / 0.09);
  --brand-ring: hsl(142 76% 36% / 0.18);
  --danger: #e5484d;
  --shadow-card: 0 0 0 0.5px var(--hairline), 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.05);
  --shadow-float: 0 2px 6px rgba(0,0,0,.10), 0 12px 32px rgba(0,0,0,.18);
  --shadow-pop: 0 2px 8px rgba(0,0,0,.08), 0 24px 64px rgba(0,0,0,.22);
  /* 标记配色（Tweaks 可切品牌绿） */
  --marker-bg: #111111;
  --marker-fg: #ffffff;
  /* 占位图的柔和底 */
  --ph-a: #e8e9ee;
  --ph-b: #dcdee6;
  --ph-grid: rgba(29,29,31,.045);
}
[data-theme="dark"] {
  color-scheme: dark;
  --bg: #1a1917;
  --panel: #222120;
  --panel-soft: #262524;
  --ink: #f3f2f0;
  --ink-2: #a8a6a1;
  --ink-3: #6f6d68;
  --hairline: rgba(243, 242, 240, 0.09);
  --hairline-strong: rgba(243, 242, 240, 0.16);
  --brand: hsl(145 60% 52%);
  --brand-ink: hsl(145 60% 52%);
  --brand-tint: hsl(145 60% 52% / 0.12);
  --brand-ring: hsl(145 60% 52% / 0.22);
  --shadow-card: 0 0 0 0.5px var(--hairline), 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  --shadow-float: 0 2px 6px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.5);
  --shadow-pop: 0 2px 8px rgba(0,0,0,.4), 0 24px 64px rgba(0,0,0,.6);
  --ph-a: #2c2b29;
  --ph-b: #252423;
  --ph-grid: rgba(243,242,240,.05);
}
[data-marker="brand"] {
  --marker-bg: var(--brand);
  --marker-fg: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: grid;
  place-items: center;
  padding: 32px 24px;
  transition: background .25s ease, color .25s ease;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────── 面板本体（模拟应用右栏） ─────────────── */
.panel {
  width: clamp(700px, 78vw, 1060px);
  height: min(86vh, 820px);
  background: var(--panel);
  border-radius: 12px;
  box-shadow: var(--shadow-card);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 顶栏 */
.panel-head {
  height: 48px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  border-bottom: 0.5px solid var(--hairline-strong);
}
.panel-head .fname {
  min-width: 0;
  flex: 1;
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.panel-head .hint {
  font-size: 12px;
  color: var(--ink-3);
  flex-shrink: 0;
}
.icon-btn {
  width: 28px; height: 28px;
  flex-shrink: 0;
  display: grid; place-items: center;
  border: none; background: transparent;
  border-radius: 8px;
  color: var(--ink-2);
  cursor: pointer;
  transition: background .12s ease, color .12s ease;
}
.icon-btn:hover { background: var(--hairline); color: var(--ink); }
.icon-btn:active { transform: scale(.94); }
.icon-btn svg { width: 15px; height: 15px; }

/* ─────────────── 图区 ─────────────── */
.stage-row {
  min-height: 0;
  flex: 1;
  display: flex;
}
.stage {
  min-width: 0;
  flex: 1;
  display: grid;
  place-items: center;
  padding: 28px;
  overflow: auto;
}

/* 图片容器：比例由 data-ratio 控制。占位图 = 柔和渐变 + 细网格 + 标签，
   诚实标注这里该是生成的图片（不画假照片）。 */
.canvas {
  position: relative;
  border-radius: 10px;
  cursor: crosshair;
  user-select: none;
  background:
    linear-gradient(0deg, var(--ph-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--ph-grid) 1px, transparent 1px),
    radial-gradient(120% 100% at 30% 20%, var(--ph-a), var(--ph-b));
  background-size: 28px 28px, 28px 28px, 100% 100%;
  box-shadow: inset 0 0 0 0.5px var(--hairline-strong);
  max-width: 100%;
  max-height: 100%;
}
[data-ratio="square"] .canvas { aspect-ratio: 1 / 1;  height: min(100%, 620px); }
[data-ratio="wide"]   .canvas { aspect-ratio: 3 / 2;  width: min(100%, 880px); }
[data-ratio="tall"]   .canvas { aspect-ratio: 9 / 16; height: min(100%, 640px); }

.canvas .ph-label {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
}
.canvas .ph-label span {
  font-size: 12.5px;
  letter-spacing: .02em;
  color: var(--ink-3);
  background: var(--panel);
  border: 0.5px solid var(--hairline-strong);
  border-radius: 999px;
  padding: 6px 14px;
  opacity: .92;
}

/* ─────────────── 标记 ─────────────── */
.marker {
  position: absolute;
  transform: translate(-50%, -50%);
  z-index: 3;
}
.marker .dot {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border: 2px solid #fff;
  border-radius: 50%;
  background: var(--marker-bg);
  color: var(--marker-fg);
  font-size: 11.5px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
  transition: transform .14s cubic-bezier(.34,1.56,.64,1);
}
.marker .dot:hover, .marker.active .dot { transform: scale(1.12); }
.marker.entering .dot { animation: dot-in .18s cubic-bezier(.34,1.56,.64,1); }
@keyframes dot-in { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* 浮条：白胶囊（暗档也保持白——它压在「照片」上，白色最稳，参考图同款） */
.note-pill {
  position: absolute;
  top: 50%;
  left: 22px;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 4px;
  width: 300px;
  background: #ffffff;
  border-radius: 999px;
  padding: 6px 6px 6px 16px;
  box-shadow: var(--shadow-float);
  animation: pill-in .16s ease-out;
  z-index: 4;
}
.marker.flip .note-pill { left: auto; right: 22px; }
@keyframes pill-in { from { opacity: 0; transform: translateY(-50%) scale(.96); } to { opacity: 1; transform: translateY(-50%) scale(1); } }
.note-pill input {
  min-width: 0;
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font: inherit;
  font-size: 13px;
  color: #1d1d1f;
}
.note-pill input::placeholder { color: #a1a1a6; }
.pill-btn {
  width: 26px; height: 26px;
  flex-shrink: 0;
  display: grid; place-items: center;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  background: #ececef;
  color: #57575c;
  transition: background .12s ease, transform .1s ease;
}
.pill-btn:hover { background: #e0e0e4; }
.pill-btn:active { transform: scale(.92); }
.pill-btn.ok { background: var(--brand); color: #fff; }
.pill-btn.ok:hover { filter: brightness(1.08); }
.pill-btn svg { width: 12px; height: 12px; }

/* 已确认标记的 hover 提示 */
.marker .tip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  max-width: 260px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: rgba(17,17,17,.92);
  color: #fff;
  font-size: 12px;
  border-radius: 8px;
  padding: 5px 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .12s ease;
}
.marker:not(.active):hover .tip { opacity: 1; }

/* ─────────────── 侧列表变体（Tweaks：描述呈现=列表） ─────────────── */
.notes-rail {
  display: none;
  width: 260px;
  flex-shrink: 0;
  border-left: 0.5px solid var(--hairline-strong);
  padding: 16px 14px;
  overflow-y: auto;
}
[data-notes="rail"] .notes-rail { display: block; }
.notes-rail h3 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 10px;
}
.note-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 10px;
  transition: background .12s ease;
}
.note-row:hover { background: var(--panel-soft); }
.note-row .n {
  width: 18px; height: 18px;
  flex-shrink: 0;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--marker-bg);
  color: var(--marker-fg);
  font-size: 10px;
  font-weight: 700;
  margin-top: 1px;
}
.note-row .txt { min-width: 0; flex: 1; font-size: 13px; line-height: 1.45; color: var(--ink); overflow-wrap: break-word; }
.note-row .txt.empty { color: var(--ink-3); font-style: italic; }
.note-row .del {
  width: 20px; height: 20px;
  flex-shrink: 0;
  display: grid; place-items: center;
  border: none; background: transparent;
  border-radius: 6px;
  color: var(--ink-3);
  cursor: pointer;
  opacity: 0;
  transition: opacity .12s ease, background .12s ease;
}
.note-row:hover .del { opacity: 1; }
.note-row .del:hover { background: var(--hairline); color: var(--danger); }
.note-row .del svg { width: 11px; height: 11px; }
.notes-rail .empty-hint { font-size: 12.5px; color: var(--ink-3); line-height: 1.6; padding: 4px 8px; }

/* ─────────────── 底栏 ─────────────── */
.panel-foot {
  flex-shrink: 0;
  border-top: 0.5px solid var(--hairline-strong);
  padding: 12px 16px;
}
.fusion-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}
.fusion-row:empty { display: none; }
.chip {
  display: flex;
  align-items: center;
  gap: 7px;
  border: 0.5px solid var(--hairline-strong);
  background: var(--panel-soft);
  border-radius: 10px;
  padding: 4px 8px 4px 4px;
  animation: pill-in .16s ease-out;
}
.chip img {
  width: 30px; height: 30px;
  border-radius: 7px;
  object-fit: cover;
  display: block;
}
.chip .cname { max-width: 130px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip .del {
  width: 18px; height: 18px;
  display: grid; place-items: center;
  border: none; background: transparent;
  border-radius: 50%;
  color: var(--ink-3);
  cursor: pointer;
}
.chip .del:hover { background: var(--hairline); color: var(--danger); }
.chip .del svg { width: 10px; height: 10px; }

.foot-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.add-btn {
  width: 36px; height: 36px;
  flex-shrink: 0;
  display: grid; place-items: center;
  border: 0.5px solid var(--hairline-strong);
  background: var(--panel);
  border-radius: 50%;
  color: var(--ink-2);
  cursor: pointer;
  transition: border-color .12s ease, color .12s ease, transform .1s ease;
}
.add-btn:hover { border-color: var(--brand); color: var(--brand-ink); }
.add-btn:active { transform: scale(.94); }
.add-btn svg { width: 15px; height: 15px; }
.extra-input {
  height: 36px;
  min-width: 0;
  flex: 1;
  border: 0.5px solid var(--hairline-strong);
  background: var(--panel);
  border-radius: 999px;
  padding: 0 16px;
  font: inherit;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color .14s ease, box-shadow .14s ease;
}
.extra-input::placeholder { color: var(--ink-3); }
.extra-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-ring); }
.count {
  flex-shrink: 0;
  font-size: 12px;
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.send-btn {
  height: 36px;
  flex-shrink: 0;
  border: none;
  border-radius: 999px;
  padding: 0 22px;
  background: var(--brand);
  color: #fff;
  font: inherit;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: filter .12s ease, transform .1s ease, opacity .15s ease;
}
.send-btn:hover:not(:disabled) { filter: brightness(1.07); }
.send-btn:active:not(:disabled) { transform: scale(.97); }
.send-btn:disabled { opacity: .38; cursor: default; }

/* ─────────────── 发送预览弹层 ─────────────── */
.modal-scrim {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  place-items: center;
  background: rgba(0,0,0,.35);
  padding: 40px;
}
.modal-scrim.open { display: grid; }
.modal {
  width: min(680px, 100%);
  max-height: 84vh;
  background: var(--panel);
  border-radius: 16px;
  box-shadow: var(--shadow-pop);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: modal-in .18s ease-out;
}
@keyframes modal-in { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: none; } }
.modal-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px;
  border-bottom: 0.5px solid var(--hairline-strong);
}
.modal-head b { flex: 1; font-size: 14px; letter-spacing: -0.01em; }
.modal-body { min-height: 0; overflow-y: auto; padding: 18px; }
.modal-body h4 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 0 0 10px;
}
.modal-body h4 + h4 { margin-top: 0; }
.bubble-card {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 0.5px solid var(--hairline-strong);
  background: var(--panel-soft);
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 13.5px;
  font-weight: 500;
  margin-bottom: 20px;
}
.bubble-card svg { width: 14px; height: 14px; color: var(--ink-2); }
.cli-pre {
  background: var(--panel-soft);
  border: 0.5px solid var(--hairline);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: "SF Mono", ui-monospace, Menlo, monospace;
  font-size: 12px;
  line-height: 1.65;
  color: var(--ink-2);
  white-space: pre-wrap;
  overflow-wrap: break-word;
}

/* ─────────────── Tweaks ─────────────── */
.tweaks-fab {
  position: fixed;
  right: 20px; bottom: 20px;
  z-index: 60;
  height: 34px;
  border: 0.5px solid var(--hairline-strong);
  background: var(--panel);
  color: var(--ink-2);
  border-radius: 999px;
  padding: 0 14px;
  font: inherit;
  font-size: 12.5px;
  cursor: pointer;
  box-shadow: var(--shadow-card);
}
.tweaks-fab:hover { color: var(--ink); }
.tweaks {
  position: fixed;
  right: 20px; bottom: 62px;
  z-index: 60;
  width: 240px;
  background: var(--panel);
  border-radius: 14px;
  box-shadow: var(--shadow-pop);
  padding: 14px;
  display: none;
}
.tweaks.open { display: block; }
.tweaks h3 { font-size: 12px; font-weight: 700; letter-spacing: .02em; margin-bottom: 12px; }
.tweak { margin-bottom: 12px; }
.tweak:last-child { margin-bottom: 0; }
.tweak label { display: block; font-size: 11px; color: var(--ink-3); margin-bottom: 6px; }
.seg {
  display: flex;
  background: var(--panel-soft);
  border: 0.5px solid var(--hairline);
  border-radius: 9px;
  padding: 2px;
  gap: 2px;
}
.seg button {
  flex: 1;
  border: none;
  background: transparent;
  border-radius: 7px;
  padding: 5px 0;
  font: inherit;
  font-size: 11.5px;
  color: var(--ink-2);
  cursor: pointer;
  transition: background .12s ease, color .12s ease;
}
.seg button.on { background: var(--panel); color: var(--ink); box-shadow: 0 0 0 0.5px var(--hairline-strong), 0 1px 2px rgba(0,0,0,.06); font-weight: 600; }
</style>
</head>
<body data-notes="pill">

<div class="panel" id="panel">
  <div class="panel-head">
    <span class="fname">jensen-huang-eating-20260709-102631.png</span>
    <span class="hint">点击图片添加标记</span>
    <button class="icon-btn" title="关闭" aria-label="关闭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="stage-row">
    <div class="stage" id="stage">
      <div class="canvas" id="canvas">
        <div class="ph-label"><span>[ 生成图片占位 · 1024 × 1024 ]</span></div>
        <!-- 标记由 JS 渲染 -->
      </div>
    </div>
    <aside class="notes-rail" id="notesRail">
      <h3>标记修改</h3>
      <div id="notesList"></div>
    </aside>
  </div>

  <div class="panel-foot">
    <div class="fusion-row" id="fusionRow"></div>
    <div class="foot-row">
      <input type="file" id="fusionInput" accept="image/png,image/jpeg,image/webp" multiple hidden>
      <button class="add-btn" id="addBtn" title="添加图片（与原图融合）" aria-label="添加融合图片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <input class="extra-input" id="extraInput" placeholder="（可选）添加额外编辑">
      <span class="count" id="countLabel">0 条标记</span>
      <button class="send-btn" id="sendBtn" disabled>发送</button>
    </div>
  </div>
</div>

<!-- 发送预览弹层 -->
<div class="modal-scrim" id="modalScrim">
  <div class="modal">
    <div class="modal-head">
      <b>将发送的编辑指令</b>
      <button class="icon-btn" id="modalClose" aria-label="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <h4>会话气泡（协议卡片）</h4>
      <div class="bubble-card">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><path d="M21 15l-5-5L5 21"/></svg>
        <span id="bubbleText">2 处图片修改</span>
      </div>
      <h4>CLI 指令文本（发给 agent，不上屏）</h4>
      <pre class="cli-pre" id="cliPre"></pre>
    </div>
  </div>
</div>

<!-- Tweaks -->
<button class="tweaks-fab" id="tweaksFab">Tweaks</button>
<div class="tweaks" id="tweaksPanel">
  <h3>Tweaks</h3>
  <div class="tweak">
    <label>主题</label>
    <div class="seg" data-key="theme">
      <button data-v="light" class="on">亮</button>
      <button data-v="dark">暗</button>
    </div>
  </div>
  <div class="tweak">
    <label>图片比例</label>
    <div class="seg" data-key="ratio">
      <button data-v="square" class="on">1:1</button>
      <button data-v="wide">3:2</button>
      <button data-v="tall">9:16</button>
    </div>
  </div>
  <div class="tweak">
    <label>标记配色</label>
    <div class="seg" data-key="marker">
      <button data-v="ink" class="on">墨黑</button>
      <button data-v="brand">品牌绿</button>
    </div>
  </div>
  <div class="tweak">
    <label>描述呈现</label>
    <div class="seg" data-key="notes">
      <button data-v="pill" class="on">图上浮条</button>
      <button data-v="rail">侧边列表</button>
    </div>
  </div>
</div>

<script>
/* ─────────────── 状态 ─────────────── */
const state = {
  markers: [],          // { id, x, y, note }  x/y 为 0~100 百分比
  activeId: null,       // 正在编辑的标记
  draft: '',
  fusion: [],           // { name, thumb }
  nextId: 1
};
const IMAGE_PATH = '/Users/andersenaxel/.cowork/imagegen/jensen-huang-eating-20260709-102631.png';

const canvas = document.getElementById('canvas');
const notesList = document.getElementById('notesList');
const fusionRow = document.getElementById('fusionRow');
const extraInput = document.getElementById('extraInput');
const countLabel = document.getElementById('countLabel');
const sendBtn = document.getElementById('sendBtn');

/* ─────────────── 标记渲染 ─────────────── */
function notedMarkers() {
  return state.markers.filter(m => m.note.trim() !== '');
}

function render() {
  // 清掉旧标记节点（保留占位标签）
  canvas.querySelectorAll('.marker').forEach(n => n.remove());

  state.markers.forEach((m, idx) => {
    const el = document.createElement('div');
    el.className = 'marker' + (m.id === state.activeId ? ' active' : '') + (m.x > 55 ? ' flip' : '');
    el.style.left = m.x + '%';
    el.style.top = m.y + '%';

    const dot = document.createElement('button');
    dot.className = 'dot';
    dot.type = 'button';
    dot.textContent = idx + 1;
    dot.addEventListener('click', e => { e.stopPropagation(); openMarker(m.id); });
    el.appendChild(dot);

    if (m.note && m.id !== state.activeId) {
      const tip = document.createElement('div');
      tip.className = 'tip';
      tip.textContent = m.note;
      el.appendChild(tip);
    }

    if (m.id === state.activeId) {
      const pill = document.createElement('div');
      pill.className = 'note-pill';
      pill.addEventListener('click', e => e.stopPropagation());

      const input = document.createElement('input');
      input.placeholder = '描述改动';
      input.value = state.draft;
      input.addEventListener('input', () => { state.draft = input.value; refreshFoot(); });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') commitDraft();
        if (e.key === 'Escape') removeMarker(m.id);
      });
      pill.appendChild(input);

      const ok = document.createElement('button');
      ok.className = 'pill-btn ok';
      ok.type = 'button';
      ok.title = '确认';
      ok.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
      ok.addEventListener('click', commitDraft);
      pill.appendChild(ok);

      const del = document.createElement('button');
      del.className = 'pill-btn';
      del.type = 'button';
      del.title = '删除标记';
      del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
      del.addEventListener('click', () => removeMarker(m.id));
      pill.appendChild(del);

      el.appendChild(pill);
      requestAnimationFrame(() => input.focus());
    }
    canvas.appendChild(el);
  });

  renderNotesRail();
  refreshFoot();
}

function renderNotesRail() {
  notesList.innerHTML = '';
  if (state.markers.length === 0) {
    const d = document.createElement('div');
    d.className = 'empty-hint';
    d.textContent = '在图上点击任意位置添加标记，逐点描述要改什么。';
    notesList.appendChild(d);
    return;
  }
  state.markers.forEach((m, idx) => {
    const row = document.createElement('div');
    row.className = 'note-row';
    const n = document.createElement('span');
    n.className = 'n';
    n.textContent = idx + 1;
    const txt = document.createElement('span');
    txt.className = 'txt' + (m.note ? '' : ' empty');
    txt.textContent = m.note || (m.id === state.activeId ? '输入中…' : '（未填写）');
    const del = document.createElement('button');
    del.className = 'del';
    del.type = 'button';
    del.title = '删除';
    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
    del.addEventListener('click', () => removeMarker(m.id));
    row.append(n, txt, del);
    row.addEventListener('click', e => {
      if (e.target.closest('.del')) return;
      openMarker(m.id);
    });
    notesList.appendChild(row);
  });
}

function refreshFoot() {
  const draftCounts = state.activeId !== null && state.draft.trim() !== '';
  const n = notedMarkers().length + (draftCounts ? 1 : 0);
  countLabel.textContent = n + ' 条标记';
  sendBtn.disabled = !(n > 0 || extraInput.value.trim() !== '' || state.fusion.length > 0);
}

/* ─────────────── 标记操作 ─────────────── */
function commitDraft() {
  if (state.activeId === null) return;
  const text = state.draft.trim();
  if (text) {
    const m = state.markers.find(x => x.id === state.activeId);
    if (m) m.note = text;
  } else {
    // 空文本视为点错了：只删「本来就没内容」的点，已有 note 的保留原文
    state.markers = state.markers.filter(x => x.id !== state.activeId || x.note !== '');
  }
  state.activeId = null;
  state.draft = '';
  render();
}

function openMarker(id) {
  commitDraft();
  const m = state.markers.find(x => x.id === id);
  if (!m) return;
  state.activeId = id;
  state.draft = m.note;
  render();
}

function removeMarker(id) {
  state.markers = state.markers.filter(m => m.id !== id);
  if (state.activeId === id) { state.activeId = null; state.draft = ''; }
  render();
}

canvas.addEventListener('click', e => {
  if (e.target.closest('.marker')) return;
  commitDraft();
  const rect = canvas.getBoundingClientRect();
  const x = Math.round(((e.clientX - rect.left) / rect.width) * 1000) / 10;
  const y = Math.round(((e.clientY - rect.top) / rect.height) * 1000) / 10;
  const id = state.nextId++;
  state.markers.push({ id, x, y, note: '' });
  state.activeId = id;
  state.draft = '';
  render();
  // 新落的圈做入场弹跳
  const last = canvas.querySelector('.marker:last-child');
  if (last) last.classList.add('entering');
});

/* ─────────────── 融合素材 ─────────────── */
const fusionInput = document.getElementById('fusionInput');
document.getElementById('addBtn').addEventListener('click', () => fusionInput.click());
fusionInput.addEventListener('change', () => {
  for (const file of fusionInput.files) {
    const reader = new FileReader();
    reader.onload = () => {
      if (state.fusion.some(f => f.name === file.name)) return;
      state.fusion.push({ name: file.name, thumb: reader.result });
      renderFusion();
      refreshFoot();
    };
    reader.readAsDataURL(file);
  }
  fusionInput.value = '';
});
function renderFusion() {
  fusionRow.innerHTML = '';
  state.fusion.forEach(f => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    const img = document.createElement('img');
    img.src = f.thumb;
    img.alt = f.name;
    const nm = document.createElement('span');
    nm.className = 'cname';
    nm.textContent = f.name;
    const del = document.createElement('button');
    del.className = 'del';
    del.type = 'button';
    del.title = '移除素材';
    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
    del.addEventListener('click', () => {
      state.fusion = state.fusion.filter(x => x.name !== f.name);
      renderFusion();
      refreshFoot();
    });
    chip.append(img, nm, del);
    fusionRow.appendChild(chip);
  });
}

extraInput.addEventListener('input', refreshFoot);
extraInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !sendBtn.disabled) openSendPreview();
});

/* ─────────────── 发送预览 ─────────────── */
const modalScrim = document.getElementById('modalScrim');
sendBtn.addEventListener('click', openSendPreview);
document.getElementById('modalClose').addEventListener('click', () => modalScrim.classList.remove('open'));
modalScrim.addEventListener('click', e => { if (e.target === modalScrim) modalScrim.classList.remove('open'); });
window.addEventListener('keydown', e => { if (e.key === 'Escape') modalScrim.classList.remove('open'); });

function openSendPreview() {
  commitDraft();
  const edits = notedMarkers();
  const extra = extraInput.value.trim();
  const editCount = edits.length + (extra ? 1 : 0);
  document.getElementById('bubbleText').textContent = editCount + ' 处图片修改';

  const lines = [
    '[[image-edit]]{"name":"jensen-huang-eating-….png", …}',
    '请用 imagegen 技能（skills/imagegen 的 edit 子命令）编辑这张图片，在原图基础上改，不要重新生成整图：',
    '原图：' + IMAGE_PATH
  ];
  if (edits.length) {
    lines.push('标记点修改（x/y 是图内百分比坐标，原点在左上角；请先辨认每个坐标落在画面中的什么物体/区域，再据此描述改动位置）：');
    edits.forEach((m, i) => lines.push(`${i + 1}. (x ${m.x}%, y ${m.y}%)：${m.note}`));
  }
  if (extra) lines.push('额外要求：' + extra);
  if (state.fusion.length) {
    lines.push('融合素材图（作为额外的 --image 输入与原图合成）：');
    state.fusion.forEach(f => lines.push('- /path/to/' + f.name));
  }
  lines.push('未标记区域尽量保持不变，人物身份与整体构图不得走样。完成后展示结果图片的保存路径。');
  document.getElementById('cliPre').textContent = lines.join('\n');
  modalScrim.classList.add('open');
}

/* ─────────────── Tweaks ─────────────── */
const tweaksPanel = document.getElementById('tweaksPanel');
document.getElementById('tweaksFab').addEventListener('click', () =>
  tweaksPanel.classList.toggle('open')
);
document.querySelectorAll('.seg').forEach(seg => {
  seg.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    seg.querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn));
    const key = seg.dataset.key, v = btn.dataset.v;
    if (key === 'theme')  document.documentElement.dataset.theme = v === 'dark' ? 'dark' : '';
    if (key === 'ratio')  document.getElementById('stage').parentElement.parentElement.dataset.ratio = v;
    if (key === 'marker') document.documentElement.dataset.marker = v === 'brand' ? 'brand' : '';
    if (key === 'notes')  document.body.dataset.notes = v;
    render();
  });
});
// 比例初始挂在 panel 上
document.getElementById('panel').dataset.ratio = 'square';

render();
</script>
</body>
</html>
