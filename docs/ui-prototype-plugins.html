<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>插件市场 · UI 原型</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   设计 token —— 1:1 取自 packages/design-tokens/tokens.css
   （HSL 三元组展开为完整色值，方便单文件原型使用）
   ═══════════════════════════════════════════════════════════════════ */
:root {
  color-scheme: light;
  --background: hsl(240 7% 97%);        /* #f5f5f7 Apple 浅灰底 */
  --foreground: hsl(240 3% 12%);        /* #1d1d1f 近黑 */
  --card: hsl(0 0% 100%);
  --card-foreground: hsl(240 3% 12%);
  --primary: hsl(211 100% 45%);         /* #0071e3 Apple 蓝，交互点位 */
  --secondary: hsl(240 6% 94%);
  --secondary-hover: hsl(240 5% 90%);
  --muted: hsl(240 5% 93%);
  --muted-foreground: hsl(240 4% 40%);
  --border: hsl(240 6% 84%);
  --input: hsl(240 6% 86%);
  --ring: hsl(211 100% 45%);
  --sidebar: hsl(240 7% 96%);
  --sidebar-foreground: hsl(240 4% 18%);
  --sidebar-accent: hsl(240 6% 90%);
  --sidebar-border: hsl(240 6% 84%);
  --brand: hsl(142 76% 36%);            /* #16a34a 品牌绿身份色 */
  --brand-foreground: hsl(0 0% 100%);
  --brand-tint: hsl(142 76% 36% / 0.1);
  --brand-tint-hover: hsl(142 76% 36% / 0.16);
  --destructive: hsl(0 72% 50%);
  --destructive-tint: hsl(0 72% 50% / 0.08);

  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display',
    'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB',
    'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
  --fw-medium: 500;
  --fw-strong: 650;

  --row-pad-y: 10px;                    /* 密度 Tweak 改这个 */
  --shadow-pop: 0 10px 40px hsl(240 3% 12% / 0.14), 0 2px 8px hsl(240 3% 12% / 0.06);
}
.dark {
  color-scheme: dark;
  --background: hsl(40 6% 10%);         /* #1a1917 暖黑 */
  --foreground: hsl(40 21% 89%);
  --card: hsl(30 3% 13%);
  --card-foreground: hsl(39 35% 92%);
  --primary: hsl(210 100% 58%);
  --secondary: hsl(30 5% 15%);
  --secondary-hover: hsl(30 5% 19%);
  --muted: hsl(36 6% 17%);
  --muted-foreground: hsl(36 5% 58%);
  --border: hsl(49 12% 18%);
  --input: hsl(42 8% 25%);
  --sidebar: hsl(40 6% 10%);
  --sidebar-foreground: hsl(40 21% 89%);
  --sidebar-accent: hsl(30 5% 15%);
  --sidebar-border: hsl(49 12% 18%);
  --brand: hsl(145 60% 52%);            /* 暗色提亮绿 */
  --brand-foreground: hsl(40 6% 10%);
  --brand-tint: hsl(145 60% 52% / 0.14);
  --brand-tint-hover: hsl(145 60% 52% / 0.22);
  --shadow-pop: 0 10px 40px hsl(0 0% 0% / 0.5), 0 2px 8px hsl(0 0% 0% / 0.3);
}

/* ── 基础 ─────────────────────────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--foreground);
  background: var(--background);
  -webkit-font-smoothing: antialiased;
  text-wrap: pretty;
  overflow: hidden;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input { font: inherit; color: inherit; }
::placeholder { color: var(--muted-foreground); opacity: 0.75; }

.app { display: flex; height: 100vh; }

/* ═══════════════════════════════════════════════════════════════════
   侧栏 —— 照搬现有系统结构
   ═══════════════════════════════════════════════════════════════════ */
.sidebar {
  width: 232px; flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--sidebar-border);
  display: flex; flex-direction: column;
  transition: margin-left 0.25s ease;
}
.sidebar.hidden { margin-left: -233px; }

.traffic-row { display: flex; align-items: center; height: 46px; padding: 0 14px; gap: 8px; }
.traffic { display: flex; gap: 8px; margin-right: auto; }
.traffic i { width: 12px; height: 12px; border-radius: 50%; display: block; }
.traffic i:nth-child(1) { background: #ff5f57; }
.traffic i:nth-child(2) { background: #febc2e; }
.traffic i:nth-child(3) { background: #28c840; }
.icon-btn {
  width: 28px; height: 28px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--muted-foreground);
  transition: background 0.15s ease, color 0.15s ease;
}
.icon-btn:hover { background: var(--sidebar-accent); color: var(--foreground); }
.icon-btn svg { width: 16px; height: 16px; }

.sidebar-body { padding: 4px 10px 0; display: flex; flex-direction: column; min-height: 0; flex: 1; }
.new-chat {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 9px;
  background: var(--brand-tint); color: var(--brand);
  font-weight: var(--fw-medium);
  transition: background 0.15s ease;
}
.new-chat:hover { background: var(--brand-tint-hover); }
.new-chat svg { width: 15px; height: 15px; }
.nav-item {
  display: flex; align-items: center; gap: 9px; width: 100%;
  padding: 7px 12px; margin-top: 2px; border-radius: 8px;
  color: var(--sidebar-foreground); text-align: left;
  transition: background 0.15s ease;
}
.nav-item:hover { background: var(--sidebar-accent); }
.nav-item.active { background: var(--brand-tint); color: var(--brand); font-weight: var(--fw-medium); }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.85; }
.sidebar-body > .nav-item:first-of-type { margin-top: 10px; }
.seg-pair {
  display: flex; gap: 4px; margin: 10px 0 4px;
  background: var(--sidebar-accent); border-radius: 9px; padding: 3px;
}
.seg-pair button {
  flex: 1; padding: 5px 0; border-radius: 7px; font-size: 12.5px;
  color: var(--muted-foreground);
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.15s ease, color 0.15s ease;
}
.seg-pair button svg { width: 13px; height: 13px; }
.seg-pair button.on { background: var(--card); color: var(--foreground); box-shadow: 0 1px 3px hsl(240 3% 12% / 0.08); }
.recents { flex: 1; overflow-y: auto; margin-top: 12px; padding-bottom: 8px; }
.recents-label { font-size: 11px; color: var(--muted-foreground); padding: 6px 12px 4px; }
.recent-item {
  display: block; width: 100%; text-align: left;
  padding: 6px 12px; border-radius: 8px;
  color: var(--sidebar-foreground); opacity: 0.72;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: background 0.15s ease, opacity 0.15s ease;
}
.recent-item:hover { background: var(--sidebar-accent); opacity: 1; }
.user-row { display: flex; align-items: center; gap: 9px; padding: 10px 12px; border-top: 1px solid var(--sidebar-border); }
.avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--brand-tint); color: var(--brand);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: var(--fw-strong);
}
.user-meta { flex: 1; min-width: 0; }
.user-name { font-weight: var(--fw-medium); font-size: 12.5px; }
.user-sub { font-size: 11px; color: var(--muted-foreground); display: flex; align-items: center; gap: 4px; }
.user-sub .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); display: inline-block; }

/* ═══════════════════════════════════════════════════════════════════
   主区
   ═══════════════════════════════════════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: 46px; flex-shrink: 0; display: flex; align-items: center; padding: 0 14px; gap: 8px; }
.tab-seg { display: flex; gap: 2px; background: var(--muted); border-radius: 9px; padding: 3px; }
.tab-seg button {
  padding: 4px 14px; border-radius: 7px; font-size: 12.5px;
  color: var(--muted-foreground); font-weight: var(--fw-medium);
  transition: background 0.15s ease, color 0.15s ease;
}
.tab-seg button.on { background: var(--card); color: var(--foreground); box-shadow: 0 1px 3px hsl(240 3% 12% / 0.1); }
.crumb { display: none; align-items: center; gap: 8px; font-size: 12.5px; }
.crumb button { color: var(--muted-foreground); padding: 4px 6px; border-radius: 6px; transition: color 0.15s ease, background 0.15s ease; }
.crumb button:hover { color: var(--foreground); background: var(--muted); }
.crumb .sep { color: var(--muted-foreground); opacity: 0.55; }
.crumb .cur { font-weight: var(--fw-medium); }
.topbar-spacer { flex: 1; }
.create-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 999px;
  background: var(--brand-tint); color: var(--brand);
  font-weight: var(--fw-medium);
  transition: background 0.15s ease;
}
.create-btn:hover { background: var(--brand-tint-hover); }
.create-btn svg { width: 12px; height: 12px; }

.scroll { flex: 1; overflow-y: auto; }
.page-col { max-width: 880px; margin: 0 auto; padding: 28px 40px 80px; }

/* ── Hero / 搜索 ─────────────────────────────────────────────────── */
.hero h1 { font-size: 30px; font-weight: var(--fw-strong); letter-spacing: -0.02em; }
.hero p { margin-top: 8px; font-size: 14px; color: var(--muted-foreground); }
.search-wrap { position: relative; margin-top: 24px; }
.search-wrap svg {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--muted-foreground); pointer-events: none;
}
.search-input {
  width: 100%; height: 40px; padding: 0 40px;
  border: 1px solid var(--input); border-radius: 11px;
  background: var(--card); outline: none; font-size: 13.5px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.search-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-tint); }
.search-kbd {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 11px; color: var(--muted-foreground);
  border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px;
  pointer-events: none;
}

/* ── 吸顶搜索 + 渐进模糊 ─────────────────────────────────────────
 * 搜索栏 sticky 钉在滚动容器顶部；其下挂一条 veil：底色渐变（淡出）
 * 叠 backdrop blur，再用 mask 让模糊强度从上到下衰减——滚过搜索栏
 * 的行先变糊变淡、再滑出，而不是被一条硬边切断。 */
.search-sticky {
  position: sticky; top: 0; z-index: 20;
  margin-top: 24px; padding: 10px 0;
  background: var(--background);
}
.search-sticky .search-wrap { margin-top: 0; }
.search-veil {
  position: absolute; left: -40px; right: -40px; top: 100%; height: 52px;
  pointer-events: none;
  background: linear-gradient(to bottom, var(--background) 8%, transparent);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  -webkit-mask-image: linear-gradient(to bottom, black 25%, transparent);
  mask-image: linear-gradient(to bottom, black 25%, transparent);
}

/* ── 已安装行（插件页）──────────────────────────────────────────── */
.installed-block { margin-top: 32px; }
.installed-head { display: flex; align-items: center; }
.installed-head h2 { font-size: 15px; font-weight: var(--fw-strong); }
.installed-head .icon-btn { margin-left: auto; }
.installed-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; min-height: 32px; }
.installed-row:empty::after {
  content: '还没有安装插件'; color: var(--muted-foreground); font-size: 12.5px; align-self: center;
}
.mini-tile {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: var(--fw-strong);
  animation: pop-in 0.25s cubic-bezier(0.2, 1.4, 0.5, 1);
  cursor: pointer;
  transition: transform 0.15s ease;
}
.mini-tile:hover { transform: translateY(-2px); }
@keyframes pop-in { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* ── scope chips（公开/个人 · 个人/系统/推荐）────────────────────── */
.scope-row { display: flex; align-items: center; gap: 4px; margin-top: 26px; }
.scope-row button.scope {
  padding: 5px 12px; border-radius: 999px; font-size: 12.5px;
  color: var(--muted-foreground);
  transition: background 0.15s ease, color 0.15s ease;
}
.scope-row button.scope:hover { background: var(--muted); }
.scope-row button.scope.on { background: var(--secondary); color: var(--foreground); font-weight: var(--fw-medium); }
.scope-row .icon-btn { margin-left: auto; }

/* ── 分区与插件/技能行 ──────────────────────────────────────────── */
.section { margin-top: 36px; }
.section > h2 {
  font-size: 15px; font-weight: var(--fw-strong);
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.plugin-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 28px; margin-top: 6px; }
@media (max-width: 860px) { .plugin-grid { grid-template-columns: 1fr; } }

.plugin-row {
  display: flex; align-items: center; gap: 12px;
  padding: var(--row-pad-y) 10px; margin: 2px -10px;
  border-radius: 10px; cursor: pointer;
  transition: background 0.15s ease;
}
.plugin-row:hover { background: var(--muted); }
.plugin-row:active { background: var(--secondary-hover); }

.tile {
  width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: var(--fw-strong);
  letter-spacing: -0.02em;
}
/* 占位色板 —— 接真实 logo 时整块替换为 <img> */
.c-blue   { background: #3b78e7; }
.c-red    { background: #de5246; }
.c-green  { background: #1e9e5a; }
.c-amber  { background: #d99114; }
.c-purple { background: #7b5bd6; }
.c-pink   { background: #d64f8e; }
.c-teal   { background: #0e9488; }
.c-orange { background: #e06a2b; }
.c-ink    { background: #2b2b30; }
.c-slate  { background: #5c6472; }
.dark .c-ink { background: #4a4a52; }

.plugin-meta { flex: 1; min-width: 0; }
.plugin-name { font-size: 13.5px; font-weight: var(--fw-medium); }
.plugin-desc {
  font-size: 12.5px; color: var(--muted-foreground); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* 技能行：立方体占位 tile + 右侧 ✓ */
.skill-tile {
  width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
  background: var(--card); box-shadow: inset 0 0 0 1px var(--border);
  display: flex; align-items: center; justify-content: center;
}
.skill-tile svg { width: 20px; height: 20px; }
.skill-check { width: 15px; height: 15px; color: var(--muted-foreground); flex-shrink: 0; opacity: 0.8; }

/* 安装按钮三态：安装 → 安装中 → 已安装（hover 变移除） */
.btn-install {
  flex-shrink: 0; min-width: 58px; height: 28px; padding: 0 14px;
  border-radius: 999px; font-size: 12.5px; font-weight: var(--fw-medium);
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  background: var(--secondary); color: var(--foreground);
  transition: background 0.15s ease, color 0.15s ease;
}
.btn-install:hover { background: var(--secondary-hover); }
[data-btnstyle="brand"] .btn-install { background: var(--brand-tint); color: var(--brand); }
[data-btnstyle="brand"] .btn-install:hover { background: var(--brand-tint-hover); }
[data-btnstyle="outline"] .btn-install { background: transparent; box-shadow: inset 0 0 0 1px var(--border); }
[data-btnstyle="outline"] .btn-install:hover { background: var(--muted); }
.btn-install.loading { pointer-events: none; color: var(--muted-foreground); background: var(--muted); }
.btn-install.loading::before {
  content: ''; width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--muted-foreground);
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-install.installed,
[data-btnstyle] .btn-install.installed { background: transparent; color: var(--brand); box-shadow: none; }
.btn-install.installed .label-remove { display: none; }
.btn-install.installed:hover { background: var(--destructive-tint); color: var(--destructive); }
.btn-install.installed:hover .label-installed { display: none; }
.btn-install.installed:hover .label-remove { display: inline; }
.check { width: 13px; height: 13px; }

/* 「查看更多」展开行 */
.more-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px; padding: 6px 10px; margin-left: -10px;
  border-radius: 8px; color: var(--muted-foreground); font-size: 12.5px;
  transition: background 0.15s ease, color 0.15s ease;
}
.more-row:hover { background: var(--muted); color: var(--foreground); }
.more-row .mini-tile { width: 20px; height: 20px; border-radius: 6px; font-size: 8px; animation: none; margin-left: -6px; }
.more-row .mini-tile:first-child { margin-left: 0; }
.more-row .mini-tile:hover { transform: none; }
.more-row .skill-tile { width: 20px; height: 20px; border-radius: 6px; margin-left: -6px; }
.more-row .skill-tile svg { width: 12px; height: 12px; }
.more-row .skill-tile:first-child { margin-left: 0; }
.hidden-extra { display: none; }
.expanded .hidden-extra { display: flex; }
.expanded .more-row { display: none; }

/* 空态 */
.empty-state {
  margin-top: 48px; padding: 48px 24px; text-align: center;
  border: 1px dashed var(--border); border-radius: 14px;
  color: var(--muted-foreground);
}
.empty-state .glyph {
  width: 44px; height: 44px; border-radius: 11px; margin: 0 auto 14px;
  background: var(--muted); display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--muted-foreground);
}
.empty-state h3 { font-size: 14px; font-weight: var(--fw-medium); color: var(--foreground); }
.empty-state p { margin-top: 6px; font-size: 12.5px; }
.empty-state .create-btn { margin-top: 18px; }

/* ═══════════════════════════════════════════════════════════════════
   插件详情页
   ═══════════════════════════════════════════════════════════════════ */
.detail-icon-wrap { margin-top: 10px; }
.detail-icon { width: 56px; height: 56px; border-radius: 13px; font-size: 20px; }
.detail-title-row { display: flex; align-items: flex-start; margin-top: 16px; gap: 12px; }
.detail-title h1 { font-size: 24px; font-weight: var(--fw-strong); letter-spacing: -0.02em; }
.detail-title p { margin-top: 5px; font-size: 13px; color: var(--muted-foreground); }
.detail-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.btn-try {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 14px; border-radius: 999px;
  background: var(--brand-tint); color: var(--brand); font-weight: var(--fw-medium);
  transition: background 0.15s ease;
}
.btn-try:hover { background: var(--brand-tint-hover); }
.btn-try svg { width: 14px; height: 14px; }

/* 示例 prompt 横幅 —— 品牌绿深色渐变（不跟主题走，两档一致） */
.detail-banner {
  margin-top: 24px; border-radius: 16px; padding: 30px 28px;
  display: flex; flex-direction: column; gap: 12px; align-items: center;
  background:
    radial-gradient(120% 160% at 15% 0%, hsl(150 45% 30% / 0.85) 0%, transparent 55%),
    radial-gradient(120% 160% at 90% 100%, hsl(200 45% 26% / 0.8) 0%, transparent 60%),
    hsl(165 35% 16%);
}
.prompt-pill {
  display: flex; align-items: center; gap: 10px;
  width: fit-content; max-width: 100%;
  background: hsl(0 0% 100% / 0.1); border: 1px solid hsl(0 0% 100% / 0.14);
  color: hsl(0 0% 100% / 0.92); border-radius: 14px; padding: 9px 9px 9px 14px;
  font-size: 12.5px; text-align: left;
  transition: background 0.15s ease;
}
.prompt-pill:hover { background: hsl(0 0% 100% / 0.17); }
.pp-name { font-weight: 600; display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; }
.pp-mini {
  width: 18px; height: 18px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff; font-size: 7.5px; font-weight: var(--fw-strong);
}
.pp-arrow {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  background: hsl(0 0% 100% / 0.12);
  display: inline-flex; align-items: center; justify-content: center;
}
.pp-arrow svg { width: 12px; height: 12px; }

.detail-about { margin-top: 26px; font-size: 13.5px; line-height: 1.75; }
.d-sec {
  margin-top: 34px; font-size: 15px; font-weight: var(--fw-strong);
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.d-sec .count { color: var(--muted-foreground); font-weight: 400; margin-left: 6px; font-size: 13px; }
.d-skill { display: flex; align-items: center; gap: 12px; padding: 14px 0; }
.d-skill .plugin-meta { flex: 1; }
.d-info > div { display: flex; align-items: center; padding: 9px 0; font-size: 12.5px; }
.d-info dt { width: 130px; color: var(--muted-foreground); flex-shrink: 0; }
.d-info dd { color: var(--foreground); }
.link-out { color: var(--muted-foreground); transition: color 0.15s ease; display: inline-flex; }
.link-out:hover { color: var(--foreground); }
.link-out svg { width: 14px; height: 14px; }

/* 开关（Tweaks 与技能启用共用） */
.switch { position: relative; width: 34px; height: 20px; border-radius: 999px; background: var(--secondary-hover); transition: background 0.18s ease; flex-shrink: 0; }
.switch::after {
  content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: #fff; box-shadow: 0 1px 3px hsl(240 3% 12% / 0.25);
  transition: transform 0.18s ease;
}
.switch.on { background: var(--brand); }
.switch.on::after { transform: translateX(14px); }

/* ═══════════════════════════════════════════════════════════════════
   技能详情弹层
   ═══════════════════════════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0; background: hsl(240 3% 12% / 0.32);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.18s ease; z-index: 50;
}
.modal-backdrop.open { opacity: 1; pointer-events: auto; }
.skill-modal {
  width: 620px; max-width: calc(100vw - 48px); max-height: 84vh; overflow-y: auto;
  background: var(--card); border-radius: 18px; box-shadow: var(--shadow-pop);
  padding: 22px 28px 24px;
  transform: translateY(10px) scale(0.98); transition: transform 0.18s ease;
}
.modal-backdrop.open .skill-modal { transform: none; }
.sm-toolbar { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
.sm-toolbar .switch { margin-right: 6px; }
.sm-icon {
  width: 54px; height: 54px; border-radius: 50%; margin-top: 4px;
  background: var(--background); box-shadow: inset 0 0 0 1px var(--border);
  display: flex; align-items: center; justify-content: center;
}
.sm-icon svg { width: 28px; height: 28px; }
.sm-title { margin-top: 14px; font-size: 20px; font-weight: var(--fw-strong); }
.sm-title .kind { color: var(--muted-foreground); font-weight: 400; font-size: 16px; margin-left: 8px; }
.sm-desc { margin-top: 12px; font-size: 13px; line-height: 1.75; }
.sm-readme {
  margin-top: 18px; background: var(--muted); border-radius: 12px;
  padding: 16px 18px; font-size: 12.5px; line-height: 1.8;
}
.sm-readme a { color: var(--primary); text-decoration: none; }
.sm-readme a:hover { text-decoration: underline; }
.sm-readme hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.sm-readme h4 { font-size: 12.5px; font-weight: var(--fw-strong); margin: 10px 0 4px; }
.sm-readme ul, .sm-readme ol { padding-left: 18px; margin: 6px 0; }
.sm-readme code {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--secondary-hover); border-radius: 5px; padding: 1px 6px;
}
.sm-readme blockquote {
  border-left: 2px solid var(--border); padding-left: 10px;
  color: var(--muted-foreground); margin-top: 8px;
}
.sm-footer { display: flex; align-items: center; margin-top: 22px; }
.btn-uninstall {
  height: 30px; padding: 0 14px; border-radius: 999px;
  background: var(--destructive-tint); color: var(--destructive); font-weight: var(--fw-medium);
  transition: filter 0.15s ease;
}
.btn-uninstall:hover { filter: brightness(0.95); }
.sm-footer .btn-try, .sm-footer .btn-install { margin-left: auto; }
.sm-footer .btn-install { height: 30px; min-width: 72px; }

/* ═══════════════════════════════════════════════════════════════════
   Tweaks 面板
   ═══════════════════════════════════════════════════════════════════ */
.tweaks-fab {
  position: fixed; right: 18px; bottom: 18px; z-index: 60;

  display: flex; align-items: center; justify-content: center;

}
.tweaks-fab:hover { color: var(--foreground); transform: rotate(30deg); }
.tweaks-fab svg { width: 17px; height: 17px; }
.tweaks-panel {
  position: fixed; right: 18px; bottom: 62px; z-index: 60;

.tweaks-panel.open { display: block; }

.tweak-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 12.5px; }
.tweak-row select {
  font: inherit; font-size: 12px; color: var(--foreground);

}

function setInstalled(id, val) {
  byId[id].installed = val;
  renderCatalog();
  renderInstalled();
  applySearch();

catalog.addEventListener('click', e => {
  const btn = e.target.closest('[data-act="toggle"]');
  if (btn) {
    e.stopPropagation();
    const p = byId[btn.dataset.id];
    if (p.installed) { setInstalled(p.id, false); return; }
    btn.classList.add('loading');
    btn.textContent = '安装中';
    setTimeout(() => setInstalled(p.id, true), 900);
    return;
  }
  const more = e.target.closest('[data-expand]');
  if (more) { more.closest('.section').classList.add('expanded'); return; }
  const row = e.target.closest('[data-open]');
  if (row) openDetail(row.dataset.open);
});
installedRow.addEventListener('click', e => {
  const t = e.target.closest('[data-open]');
  if (t) openDetail(t.dataset.open);
});

/* ── 插件搜索 ────────────────────────────────────────────────────── */
const searchInput = document.getElementById('searchInput');
function applySearch() {
  const q = searchInput.value.trim().toLowerCase();
  const searching = q.length > 0;
  let anyHit = false;
  document.querySelectorAll('#catalog .section').forEach(sec => {
    let secHit = false;
    sec.querySelectorAll('.plugin-row').forEach(row => {
      const p = byId[row.dataset.open];
      const hit = !searching || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
      row.style.display = hit ? '' : 'none';
      if (searching && hit) row.classList.remove('hidden-extra');
      if (!searching && p.extra && !sec.classList.contains('expanded')) row.classList.add('hidden-extra');
      if (hit) secHit = true;
    });
    const moreBtn = sec.querySelector('.more-row');
    if (moreBtn) moreBtn.style.display = searching ? 'none' : '';
    sec.style.display = secHit ? '' : 'none';
    if (secHit) anyHit = true;
  });
  searchEmpty.hidden = !searching || anyHit;
  document.getElementById('searchEmptyText').textContent = `没有和「${searchInput.value.trim()}」匹配的插件，换个关键词试试`;
}
searchInput.addEventListener('input', applySearch);

/* ── 公开 / 个人 ─────────────────────────────────────────────────── */

    const personal = btn.dataset.scope === 'personal';
    catalog.style.display = personal ? 'none' : '';
    personalEmpty.hidden = !personal;
    if (personal) searchEmpty.hidden = true; else applySearch();
  });
});

  tabSeg.style.display = ''; crumb.style.display = 'none'; crumbLink.style.display = 'none';
  const skillsTab = tabSeg.querySelector('[data-tab="skills"]').classList.contains('on');
  (skillsTab ? pageSkills : pagePlugins).hidden = false;
  scrollEl.scrollTop = listScrollTop;
}
document.getElementById('crumbBack').addEventListener('click', closeDetail);

/* ── 插件 / 技能 tab ─────────────────────────────────────────────── */
tabSeg.addEventListener('click', e => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  document.querySelectorAll('#tabSeg button').forEach(b => b.classList.toggle('on', b === btn));
  detailId = null; pageDetail.hidden = true;
  pagePlugins.hidden = btn.dataset.tab !== 'plugins';
  pageSkills.hidden = btn.dataset.tab !== 'skills';
  scrollEl.scrollTop = 0;
});

/* ═══════════════════════════════════════════════════════════════════
   技能页渲染
   ═══════════════════════════════════════════════════════════════════ */
const skillInstalledGrid = document.getElementById('skillInstalledGrid');
const skillInstalledSec = document.getElementById('skillInstalledSec');
const skillMore = document.getElementById('skillMore');
const skillList = document.getElementById('skillList');
const skillEmpty = document.getElementById('skillEmpty');
const skillSearch = document.getElementById('skillSearch');
let skillScope = 'system';
const INSTALLED_VISIBLE = 6;

function skillRowHTML(s, { extraHidden = false } = {}) {
  return `<div class="plugin-row${extraHidden ? ' hidden-extra' : ''}" data-skill="${s.id}">
    <div class="skill-tile">${CUBE_SVG}</div>
    <div class="plugin-meta">
      <div class="plugin-name">${s.name}</div>
      <div class="plugin-desc">${s.desc}</div>
    </div>
    ${s.installed ? CHECK_SVG : ''}
  </div>`;
}

function renderSkills() {
  const inst = SKILLS.filter(s => s.installed);
  skillInstalledGrid.innerHTML = inst
    .map((s, i) => skillRowHTML(s, { extraHidden: i >= INSTALLED_VISIBLE }))
    .join('');
  const rest = inst.slice(INSTALLED_VISIBLE);
  if (rest.length) {
    skillMore.style.display = '';
    skillMore.innerHTML = `<span class="skill-tile">${CUBE_SVG}</span><span class="skill-tile">${CUBE_SVG}</span>
      <span>查看 ${rest.slice(0, 2).map(s => s.name).join('、')}，另有 ${Math.max(rest.length - 2, 0)} 项</span>`;
  } else {
    skillMore.style.display = 'none';
  }
  const listItems = SKILLS.filter(s =>
    skillScope === 'personal' ? s.personal :
    skillScope === 'recommended' ? s.recommended :
    s.installed && !s.personal && !s.recommended);
  skillList.innerHTML = listItems.map(s => skillRowHTML(s)).join('');
  applySkillSearch();
}

function applySkillSearch() {
  const q = skillSearch.value.trim().toLowerCase();
  const searching = q.length > 0;
  let anyHit = false;
  [skillInstalledGrid, skillList].forEach(grid => {
    grid.querySelectorAll('.plugin-row').forEach(row => {
      const s = skillById[row.dataset.skill];
      const hit = !searching || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
      row.style.display = hit ? '' : 'none';
      if (searching && hit) row.classList.remove('hidden-extra');
      if (hit) anyHit = true;
    });
  });
  if (!searching && !skillInstalledSec.classList.contains('expanded')) {
    skillInstalledGrid.querySelectorAll('.plugin-row').forEach((row, i) => {
      if (i >= INSTALLED_VISIBLE) row.classList.add('hidden-extra');
    });
  }
  skillMore.style.display = searching || skillInstalledSec.classList.contains('expanded') ? 'none' : '';
  skillEmpty.hidden = !searching || anyHit;
  document.getElementById('skillEmptyText').textContent = `没有和「${skillSearch.value.trim()}」匹配的技能，换个关键词试试`;
}
skillSearch.addEventListener('input', applySkillSearch);
skillMore.addEventListener('click', () => { skillInstalledSec.classList.add('expanded'); applySkillSearch(); });
document.querySelectorAll('#skillScopeRow .scope').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#skillScopeRow .scope').forEach(b => b.classList.toggle('on', b === btn));
    skillScope = btn.dataset.sscope;
    renderSkills();
  });
});
renderSkills();

/* ═══════════════════════════════════════════════════════════════════
   技能详情弹层
   ═══════════════════════════════════════════════════════════════════ */
const skillBackdrop = document.getElementById('skillBackdrop');
const smSwitch = document.getElementById('smSwitch');
let skillModalId = null;

function genericReadme(s) {
  return `<p>${s.desc}。</p><hr><h4>使用说明</h4><p>README 内容占位——技能安装后从它的 SKILL.md 读取并渲染在这里，包含触发方式、依赖要求和使用步骤。</p>`;
}

function fillSkillModal(s) {
  document.getElementById('smIcon').innerHTML = CUBE_SVG;
  document.getElementById('smName').textContent = s.name;
  document.getElementById('smDesc').textContent = s.longDesc || s.desc;
  document.getElementById('smReadme').innerHTML = s.readme || genericReadme(s);
  smSwitch.classList.toggle('on', s.enabled);
  smSwitch.style.display = s.installed ? '' : 'none';
  const footer = document.getElementById('smFooter');
  footer.innerHTML = s.installed
    ? `<button class="btn-uninstall" id="smUninstall">卸载</button>
       <button class="btn-try"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a8 8 0 1 0-3.1 6.3L21 19l-.9-2.7A8 8 0 0 0 21 12Z"/></svg>立即试用</button>`
    : `<button class="btn-install" id="smInstall">安装</button>`;
  const un = document.getElementById('smUninstall');
  if (un) un.addEventListener('click', () => {
    s.installed = false;
    closeSkillModal();
    renderSkills();
  });
  const ins = document.getElementById('smInstall');
  if (ins) ins.addEventListener('click', () => {
    ins.classList.add('loading'); ins.textContent = '安装中';
    setTimeout(() => {
      s.installed = true;
      fillSkillModal(s);
      renderSkills();
    }, 900);
  });
}
function openSkillModal(id) {
  skillModalId = id;
  fillSkillModal(skillById[id]);
  skillBackdrop.classList.add('open');
}
function closeSkillModal() {
  skillModalId = null;
  skillBackdrop.classList.remove('open');
}
smSwitch.addEventListener('click', () => {
  const s = skillById[skillModalId];
  s.enabled = !s.enabled;
  smSwitch.classList.toggle('on', s.enabled);
});
document.getElementById('smClose').addEventListener('click', closeSkillModal);
skillBackdrop.addEventListener('click', e => { if (e.target === skillBackdrop) closeSkillModal(); });
pageSkills.addEventListener('click', e => {
  const row = e.target.closest('[data-skill]');
  if (row) openSkillModal(row.dataset.skill);
});

/* ── 全局快捷键 ─────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    if (!pageSkills.hidden) skillSearch.focus();
    else if (!pagePlugins.hidden) searchInput.focus();
  }
  if (e.key === 'Escape') {
    if (skillModalId !== null) closeSkillModal();
    else if (detailId !== null) closeDetail();
  }
});

/* ── Tweaks ─────────────────────────────────────────────────────── */
const panel = document.getElementById('tweaksPanel');
document.getElementById('tweaksFab').addEventListener('click', () => panel.classList.toggle('open'));
document.getElementById('twDark').addEventListener('click', e => {
  e.currentTarget.classList.toggle('on');
  document.documentElement.classList.toggle('dark');
});
document.getElementById('twSidebar').addEventListener('click', e => {
  e.currentTarget.classList.toggle('on');
  document.getElementById('sidebar').classList.toggle('hidden');
});
document.getElementById('twDensity').addEventListener('change', e => {
  document.documentElement.style.setProperty('--row-pad-y', e.target.value + 'px');
});
document.getElementById('twBtn').addEventListener('change', e => {
  if (e.target.value === 'gray') document.body.removeAttribute('data-btnstyle');
  else document.body.setAttribute('data-btnstyle', e.target.value);
});
</script>
</body>
</html>
