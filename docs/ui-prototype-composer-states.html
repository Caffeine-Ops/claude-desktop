<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composer 状态交互重设计 · 原型</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   Design tokens — 1:1 取自 packages/design-tokens/tokens.css（换算为
   完整色值，原型单文件自包含）。brand 绿 = 身份色，不跟用户主题。
   ═══════════════════════════════════════════════════════════════════ */
:root{
  --bg:            hsl(240 7% 97%);
  --fg:            hsl(240 3% 12%);
  --card:          hsl(0 0% 100%);
  --secondary:     hsl(240 6% 94%);
  --muted:         hsl(240 5% 93%);
  --muted-fg:      hsl(240 4% 40%);
  --border:        hsl(240 6% 84%);
  --ring:          rgba(0,0,0,.08);
  --brand:         hsl(142 76% 36%);
  --brand-fg:      hsl(0 0% 100%);
  --destructive:   hsl(0 72% 50%);
  --shadow-card:   0 1px 2px rgba(0,0,0,.04), 0 10px 28px -4px rgba(0,0,0,.07);
  --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue',
               Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
}
.dark{
  --bg:            hsl(40 6% 10%);
  --fg:            hsl(40 21% 89%);
  --card:          hsl(36 6% 15%);
  --secondary:     hsl(30 5% 15%);
  --muted:         hsl(36 6% 17%);
  --muted-fg:      hsl(36 5% 58%);
  --border:        hsl(49 12% 18%);
  --ring:          rgba(255,255,255,.08);
  --brand:         hsl(145 60% 52%);
  --brand-fg:      hsl(40 6% 10%);
  --destructive:   hsl(0 72% 55%);
  --shadow-card:   0 1px 2px rgba(0,0,0,.3), 0 10px 28px -4px rgba(0,0,0,.4);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--font-sans);
  background:var(--bg); color:var(--fg);
  font-size:13px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
  transition:background .25s, color .25s;
  overflow:hidden;
}
button{font-family:inherit; font-size:inherit; color:inherit; background:none; border:none; cursor:pointer}
button:focus-visible, [contenteditable]:focus-visible, input:focus-visible, textarea:focus-visible{
  outline:2px solid hsl(from var(--brand) h s l / .5); outline-offset:1px;
}
svg{display:block}

/* ── 舞台布局：顶部场景条 + 中央视口 ───────────────────────────── */
.stage{height:100%; display:flex; flex-direction:column; align-items:center}
.proto-chrome{
  width:100%; display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:20px 24px 4px;
}
.scenario-bar{
  display:flex; gap:2px; padding:3px;
  background:var(--card); border-radius:999px;
  box-shadow:0 0 0 1px var(--ring), 0 2px 8px rgba(0,0,0,.05);
}
.scenario-bar button{
  padding:6px 15px; border-radius:999px; font-size:12.5px; font-weight:500;
  color:var(--muted-fg); transition:all .18s; white-space:nowrap;
}
.scenario-bar button:hover{color:var(--fg)}
.scenario-bar button.on{background:var(--fg); color:var(--bg); font-weight:600}
.scenario-note{
  font-size:12px; color:var(--muted-fg); min-height:18px; text-align:center;
  max-width:640px;
}
.scenario-note b{color:var(--fg); font-weight:600}

.viewport{
  flex:1; width:min(760px, calc(100% - 48px));
  display:flex; flex-direction:column; min-height:0;
  padding-bottom:26px;
}

/* ── 消息流骨架：营造上下文，灰度占位不抢戏 ─────────────────────── */
.thread{flex:1; min-height:0; display:flex; flex-direction:column; justify-content:flex-end; gap:18px; padding:12px 4px 22px; overflow:hidden}
.bubble-user{align-self:flex-end; max-width:65%; display:flex; flex-direction:column; gap:6px}
.bubble-user .ln{height:12px; border-radius:6px; background:var(--muted)}
.bubble-user{background:var(--secondary); border-radius:16px 16px 4px 16px; padding:12px 14px}
.assistant-block{align-self:stretch; max-width:82%; display:flex; flex-direction:column; gap:9px}
.assistant-block .ln{height:11px; border-radius:6px; background:var(--muted)}
.assistant-block .ln.streaming{
  background:linear-gradient(90deg, var(--muted) 25%, hsl(from var(--brand) h s l / .22) 50%, var(--muted) 75%);
  background-size:200% 100%;
  animation:shimmer 1.6s linear infinite;
}
@keyframes shimmer{to{background-position:-200% 0}}
.thread[data-idle] .ln.streaming{animation:none; background:var(--muted)}

/* ═══════════════════════════════════════════════════════════════════
   COMPOSER 卡 — 单容器 + 固定锚位三层：
     ① 上下文层（队列 / 权限）   —— 可折叠，永远在输入之上
     ② 输入层（附件 · 正文）
     ③ 工具行（+ 技能 ··· 状态pill ··· 模型 麦 发送/停止）
   卡本体拥有唯一的圆角外框；段落是无框平面内容，hairline 分隔。
   ═══════════════════════════════════════════════════════════════════ */
.composer{
  position:relative;
  border-radius:22px;
  background:var(--card);
  box-shadow:0 0 0 1px var(--ring), var(--shadow-card);
  transition:box-shadow .2s;
}
.composer:focus-within{
  box-shadow:0 0 0 1.5px hsl(from var(--brand) h s l / .45), var(--shadow-card);
}
.composer-inner{border-radius:22px; overflow:hidden; display:flex; flex-direction:column}

/* 段落显隐：grid 0fr→1fr 高度过渡，内层裁切 */
.seg{display:grid; grid-template-rows:0fr; transition:grid-template-rows .32s cubic-bezier(.32,.72,0,1)}
.seg.open{grid-template-rows:1fr}
.seg-clip{overflow:hidden; min-height:0}
.seg.open>.seg-clip{border-bottom:1px solid hsl(from var(--border) h s l / .7)}
@media (prefers-reduced-motion: reduce){
  .seg{transition:none} *{animation-duration:.01ms !important}
}

/* ── ① 消息队列段 ────────────────────────────────────────────────── */
.queue-head{
  display:flex; align-items:center; gap:8px;
  padding:11px 16px 7px; font-size:12px; color:var(--muted-fg);
  user-select:none;
}
.queue-head .q-icon{color:var(--muted-fg); flex-shrink:0}
.queue-head .q-title{font-weight:600; color:var(--fg)}
.queue-count{
  min-width:20px; text-align:center; padding:1px 7px; border-radius:999px;
  background:var(--secondary); font-variant-numeric:tabular-nums; font-weight:600;
}
.queue-hint{opacity:.75}
/* 折叠态的「下一条」预览：占据说明位，与展开态互斥 */
.queue-next{
  display:none; min-width:0; flex:1; align-items:center; gap:6px; overflow:hidden;
}
.queue-next .nx-arrow{color:var(--brand); flex-shrink:0}
.queue-next .nx-text{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--fg)}
.queue-actions{margin-left:auto; display:flex; align-items:center; gap:2px}
.queue-clear{
  font-size:11.5px; color:var(--muted-fg); padding:3px 8px; border-radius:7px;
  opacity:0; transition:opacity .15s, background .15s;
}
.queue-head:hover .queue-clear{opacity:1}
.queue-clear:hover{background:var(--secondary); color:var(--destructive)}
.queue-toggle{
  width:24px; height:24px; display:grid; place-items:center; border-radius:7px;
  color:var(--muted-fg); transition:background .15s;
}
.queue-toggle:hover{background:var(--secondary); color:var(--fg)}
.queue-toggle svg{transition:transform .28s cubic-bezier(.32,.72,0,1)}

.seg-queue.collapsed .queue-hint{display:none}
.seg-queue.collapsed .queue-next{display:flex}
.seg-queue.collapsed .queue-toggle svg{transform:rotate(-180deg)}
.seg-queue.collapsed .queue-head{padding-bottom:11px; cursor:pointer}
.seg-queue.collapsed .queue-list-wrap{grid-template-rows:0fr}

.queue-list-wrap{display:grid; grid-template-rows:1fr; transition:grid-template-rows .32s cubic-bezier(.32,.72,0,1)}
.queue-list-clip{overflow:hidden; min-height:0}
.queue-list{
  list-style:none; display:flex; flex-direction:column; gap:1px;
  max-height:150px; overflow-y:auto; padding:0 8px 8px;
  /* 底部渐隐：暗示可滚动 */
  mask-image:linear-gradient(to bottom, black calc(100% - 14px), transparent);
}
.queue-list::-webkit-scrollbar{width:8px}
.queue-list::-webkit-scrollbar-thumb{background:hsl(from var(--muted-fg) h s l / .25); border-radius:4px; border:2px solid transparent; background-clip:content-box}

.q-row{
  display:flex; align-items:center; gap:9px;
  padding:6px 8px; border-radius:9px; font-size:13px;
  transition:background .13s;
}
.q-row:hover{background:hsl(from var(--secondary) h s l / .7)}
.q-row.flash{animation:rowFlash 1s ease-out}
@keyframes rowFlash{0%{background:hsl(from var(--brand) h s l / .16)} 100%{background:transparent}}
.q-idx{
  width:16px; flex-shrink:0; text-align:right;
  font-size:11px; color:var(--muted-fg); font-variant-numeric:tabular-nums; opacity:.7;
}
.q-text{min-width:0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.q-ops{display:flex; gap:1px; opacity:0; transition:opacity .13s; flex-shrink:0}
.q-row:hover .q-ops, .q-ops:focus-within{opacity:1}
.q-op{
  width:26px; height:26px; display:grid; place-items:center; border-radius:7px;
  color:var(--muted-fg); transition:all .13s;
}
.q-op:hover{background:var(--secondary); color:var(--fg)}
.q-op.danger:hover{color:var(--destructive)}
.q-edit{
  flex:1; min-width:0; height:26px; padding:0 9px;
  border:1px solid hsl(from var(--brand) h s l / .5); border-radius:8px;
  background:var(--card); color:var(--fg); font-size:12.5px; font-family:inherit;
}

/* ── 权限接管面板（与提问接管同形态：整卡替换，input 不出现）────── */
.perm-meta{margin-left:auto; font-size:11.5px; color:var(--muted-fg); display:flex; align-items:center; gap:5px; flex-shrink:0}
.perm-meta .tool-chip{
  font-family:var(--font-mono); font-size:10.5px; padding:1.5px 7px;
  background:var(--secondary); border-radius:6px;
}
.perm-subject{
  font-family:var(--font-mono); font-size:12px;
  background:var(--secondary); border-radius:9px; padding:8px 12px;
  margin-bottom:9px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  color:var(--fg);
}
.opt-list{display:flex; flex-direction:column; gap:2px}
.opt{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  padding:7.5px 10px; border-radius:11px; font-size:13px;
  transition:background .13s; position:relative;
}
.opt:hover{background:hsl(from var(--secondary) h s l / .7)}
.opt-no{
  width:20px; height:20px; flex-shrink:0; display:grid; place-items:center;
  border-radius:999px; font-size:11px; font-weight:600; font-variant-numeric:tabular-nums;
  background:var(--secondary); color:var(--muted-fg);
  transition:all .13s;
}
.opt-label{font-weight:600; white-space:nowrap}
.opt-desc{color:var(--muted-fg); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:400}
.opt-chip{
  font-family:var(--font-mono); font-size:10.5px; padding:1.5px 7px; flex-shrink:0;
  background:var(--secondary); border-radius:6px; color:var(--muted-fg);
}
kbd{
  font-family:var(--font-mono); font-size:10px; padding:1px 5px;
  background:var(--secondary); border-radius:5px;
  box-shadow:inset 0 -1px 0 hsl(from var(--border) h s l / .8);
  color:var(--muted-fg);
}

/* ── 状态横幅（变体 B：固定贴 input 上沿的细条）─────────────────── */
.banner{
  display:flex; align-items:center; gap:8px;
  padding:8px 16px; font-size:12.5px;
  background:hsl(from var(--brand) h s l / .07);
  color:var(--brand);
}
.banner .b-verb{font-weight:600}
.banner .b-time{margin-left:auto; font-family:var(--font-mono); font-size:11.5px; font-variant-numeric:tabular-nums; opacity:.8}

/* 旋转活性符 */
.spin-glyph{display:inline-block; animation:spin 2.4s linear infinite; transform-origin:center}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ② 输入层 ───────────────────────────────────────────────────── */
.input-area{padding:14px 20px 4px; max-height:200px; overflow-y:auto}
.input{
  min-height:44px; font-size:14px; font-weight:600; line-height:1.65;
  caret-color:var(--brand); word-break:break-word;
}
.input:focus{outline:none}
.input:empty::before{
  content:attr(data-placeholder);
  color:var(--muted-fg); font-weight:450; pointer-events:none;
}

/* ── ③ 工具行 ───────────────────────────────────────────────────── */
.toolbar{display:flex; align-items:center; gap:8px; padding:4px 12px 12px}
.tb-btn{
  width:36px; height:36px; flex-shrink:0; display:grid; place-items:center;
  border-radius:999px; color:hsl(from var(--muted-fg) h s l / .9);
  /* --ring 本身是带 alpha 的 rgba，直接用——relative color 会把 alpha 换掉 */
  box-shadow:0 0 0 1px var(--ring);
  transition:all .15s;
}
.tb-btn:hover{background:hsl(from var(--fg) h s l / .06); color:var(--fg)}
/* spacer 兼作状态 pill 的居中容器：pill 恒居中，不与右侧元素抢空间 */
.toolbar .spacer{flex:1; display:flex; justify-content:center; min-width:0}

/* 状态 pill（变体 A · 默认）：驻留工具行中央，永不漂移 */
.status-pill{
  display:none; align-items:center; gap:7px;
  padding:5px 13px; border-radius:999px;
  background:hsl(from var(--brand) h s l / .09);
  color:var(--brand); font-size:12px; font-weight:600;
  animation:pillIn .3s cubic-bezier(.32,.72,0,1);
  white-space:nowrap;
}
@keyframes pillIn{from{opacity:0; transform:scale(.92)}}
.status-pill .p-time{
  font-family:var(--font-mono); font-size:11px; font-weight:500;
  font-variant-numeric:tabular-nums; opacity:.75;
}
.status-pill .p-dot{opacity:.4}
/* verb 换词动画（inline-block 常驻——transform 对 inline 无效） */
.p-verb, .b-verb{display:inline-block}
.verb-in{animation:verbIn .32s cubic-bezier(.32,.72,0,1)}
@keyframes verbIn{from{opacity:0; transform:translateY(6px)}}

.model-chip{
  display:flex; align-items:center; gap:5px; padding:6px 10px; border-radius:999px;
  font-size:12.5px; color:var(--muted-fg); transition:background .15s;
}
.model-chip:hover{background:var(--secondary); color:var(--fg)}
.model-chip .m-star{color:var(--muted-fg); font-size:12px}

.btn-send{
  width:40px; height:40px; flex-shrink:0; display:grid; place-items:center;
  border-radius:999px; transition:all .18s;
  background:hsl(from var(--fg) h s l / .08); color:hsl(from var(--muted-fg) h s l / .5);
  cursor:not-allowed;
}
.btn-send.ready{
  background:var(--brand); color:var(--brand-fg); cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.1), 0 2px 8px -2px rgba(0,0,0,.18);
}
.btn-send.ready:hover{filter:brightness(1.08)}
.btn-send.ready:active{transform:scale(.95)}
/* running：黑盘停止钮；input 有内容时角标暗示「⏎ 排队」 */
.btn-send.stop{
  background:var(--fg); color:var(--bg); cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.1), 0 2px 8px -2px rgba(0,0,0,.15);
}
.btn-send.stop:hover{filter:brightness(1.15)}
.btn-send.stop:active{transform:scale(.95)}
.stop-square{width:11px; height:11px; border-radius:2.5px; background:var(--card)}
.dark .stop-square{background:var(--fg)}
.dark .btn-send.stop{background:hsl(40 21% 89%); color:hsl(40 6% 10%)}
.dark .btn-send.stop .stop-square{background:hsl(40 6% 10%)}

/* ⏎ 排队提示：running 且 input 非空时，浮在停止钮左侧 */
.enqueue-hint{
  display:none; align-items:center; gap:5px;
  font-size:11.5px; color:var(--muted-fg); white-space:nowrap;
  animation:pillIn .25s;
}
.enqueue-hint kbd{font-size:9.5px}

/* ── AskUserQuestion 接管面板（morph 替换输入卡内容）─────────────── */
.ask-panel{display:none; flex-direction:column; padding:16px 18px 14px; animation:askIn .34s cubic-bezier(.32,.72,0,1)}
@keyframes askIn{from{opacity:0; transform:translateY(10px)}}
.ask-head{display:flex; align-items:center; gap:10px; margin-bottom:12px}
.ask-title{font-size:14px; font-weight:650; flex:1; min-width:0}
.ask-pager{display:flex; align-items:center; gap:3px; font-size:11.5px; color:var(--muted-fg); font-variant-numeric:tabular-nums}
.pager-btn{
  width:24px; height:24px; display:grid; place-items:center; border-radius:7px;
  color:var(--muted-fg); transition:background .13s;
}
.pager-btn:hover:not(:disabled){background:var(--secondary); color:var(--fg)}
.pager-btn:disabled{opacity:.35; cursor:default}
.ask-close{
  width:24px; height:24px; display:grid; place-items:center; border-radius:7px;
  color:var(--muted-fg); transition:background .13s;
}
.ask-close:hover{background:var(--secondary); color:var(--fg)}
.ask-body{position:relative}
.ask-q{animation:askQIn .3s cubic-bezier(.32,.72,0,1)}
@keyframes askQIn{from{opacity:0; transform:translateX(14px)}}
.ask-q.back{animation:askQBack .3s cubic-bezier(.32,.72,0,1)}
@keyframes askQBack{from{opacity:0; transform:translateX(-14px)}}
.opt.picked .opt-no{background:var(--brand); color:var(--brand-fg)}
.opt.picked{background:hsl(from var(--brand) h s l / .09)}
.ask-foot{display:flex; align-items:center; gap:8px; margin-top:12px}
.ask-other{
  flex:1; display:flex; align-items:center; gap:8px;
  padding:8px 13px; border-radius:999px;
  box-shadow:0 0 0 1px var(--ring);
  color:var(--muted-fg); transition:box-shadow .15s;
}
.ask-other:focus-within{box-shadow:0 0 0 1.5px hsl(from var(--brand) h s l / .45)}
.ask-other input{
  flex:1; min-width:0; border:none; background:none; color:var(--fg);
  font-family:inherit; font-size:12.5px;
}
.ask-other input:focus{outline:none}
.ask-other input::placeholder{color:var(--muted-fg)}
.ask-skip{
  padding:8px 16px; border-radius:999px; font-size:12.5px; font-weight:500;
  box-shadow:0 0 0 1px var(--ring); color:var(--fg);
  transition:background .13s;
}
.ask-skip:hover{background:var(--secondary)}

/* 接管态隐藏常规内容（常驻不卸载——对齐 AskComposerSwap 语义）。
   提问 / 权限共用同一形态：整卡替换，输入区不出现。 */
.composer.asking .composer-body, .composer.perming .composer-body{display:none}
.composer.asking #askPanel{display:flex}
.composer.perming #permPanel{display:flex}

/* ── 卡下 chips 排（环境还原）───────────────────────────────────── */
.below-chips{display:flex; align-items:center; margin-top:9px; padding:0 6px}
.chip-cwd{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted-fg)}
.chip-mode{
  margin-left:auto; display:flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:999px; font-size:12px; color:var(--fg);
  background:var(--card); box-shadow:0 0 0 1px var(--ring);
  transition:filter .15s;
}
.chip-mode:hover{filter:brightness(.98)}
.mode-dot{width:8px; height:8px; border-radius:999px; background:hsl(350 90% 66%); box-shadow:0 0 0 3px hsl(350 90% 66% / .25)}

/* ── Tweaks 面板 ────────────────────────────────────────────────── */
.tweaks-fab{
  position:fixed; right:20px; bottom:20px; z-index:50;
  width:40px; height:40px; border-radius:999px; display:grid; place-items:center;
  background:var(--card); color:var(--muted-fg);
  box-shadow:0 0 0 1px var(--ring), 0 4px 16px rgba(0,0,0,.1);
  transition:all .2s;
}
.tweaks-fab:hover{color:var(--fg); transform:rotate(30deg)}
.tweaks{
  position:fixed; right:20px; bottom:68px; z-index:50; width:250px;
  background:var(--card); border-radius:16px; padding:14px 16px;
  box-shadow:0 0 0 1px var(--ring), 0 24px 64px rgba(0,0,0,.18);
  display:none; flex-direction:column; gap:12px;
}
.tweaks.open{display:flex; animation:pillIn .2s}
.tweaks h3{font-size:12px; font-weight:650; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-fg)}
.tw-row{display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:12.5px}
.tw-group{display:flex; flex-direction:column; gap:7px}
.tw-label{color:var(--fg)}
.tw-seg{display:flex; gap:2px; padding:2px; background:var(--secondary); border-radius:8px}
.tw-seg button{padding:3px 9px; border-radius:6px; font-size:11.5px; color:var(--muted-fg)}
.tw-seg button.on{background:var(--card); color:var(--fg); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tw-switch{
  position:relative; width:34px; height:20px; border-radius:999px;
  background:var(--secondary); transition:background .2s; flex-shrink:0;
}
.tw-switch::after{
  content:''; position:absolute; top:2px; left:2px; width:16px; height:16px;
  border-radius:999px; background:var(--card); box-shadow:0 1px 3px rgba(0,0,0,.2);
  transition:transform .2s cubic-bezier(.32,.72,0,1);
}
.tw-switch.on{background:var(--brand)}
.tw-switch.on::after{transform:translateX(14px)}
</style>
</head>
<body>
<div class="stage">
  <!-- 原型 chrome：场景切换（不属于设计本身） -->
  <div class="proto-chrome">
    <div class="scenario-bar" id="scenarioBar">
      <button data-sc="idle">空闲</button>
      <button data-sc="running">回复中</button>
      <button data-sc="queue">回复中 + 队列</button>
      <button data-sc="ask">提问接管</button>
      <button data-sc="permission">权限请求</button>
      <button data-sc="permqueue">权限 + 队列</button>
    </div>
    <div class="scenario-note" id="scenarioNote"></div>
  </div>

  <div class="viewport">
    <!-- 消息流骨架 -->
    <div class="thread" id="thread">
      <div class="bubble-user" style="width:42%">
        <div class="ln" style="width:100%"></div>
        <div class="ln" style="width:62%"></div>
      </div>
      <div class="assistant-block">
        <div class="ln" style="width:96%"></div>
        <div class="ln" style="width:88%"></div>
        <div class="ln" style="width:93%"></div>
        <div class="ln streaming" style="width:55%"></div>
      </div>
    </div>

    <!-- ═════════ COMPOSER ═════════ -->
    <div class="composer" id="composer">
      <div class="composer-inner">

        <!-- AskUserQuestion 接管面板 -->
        <div class="ask-panel" id="askPanel"></div>

        <!-- 权限接管面板：与提问同形态——权限到达时输入卡整卡变形为此面板，
             input 不出现；点选项即提交，底部自由输入 = 不同意并说明理由 -->
        <div class="ask-panel" id="permPanel">
          <div class="ask-head">
            <span class="ask-title">允许写入文件吗？</span>
            <span class="perm-meta">
              <span class="tool-chip">Write</span>
              <span id="permWait">等待 0s</span>
            </span>
          </div>
          <div class="perm-subject">~/Desktop/index312312321.html</div>
          <div class="opt-list" id="permOpts">
            <button class="opt" data-i="0">
              <span class="opt-no">1</span>
              <span class="opt-label">同意</span>
            </button>
            <button class="opt" data-i="1">
              <span class="opt-no">2</span>
              <span class="opt-label">同意，本次会话内不再问</span>
              <span class="opt-chip">writes in Desktop/</span>
            </button>
          </div>
          <div class="ask-foot">
            <label class="ask-other">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              <input id="permOther" placeholder="不同意——告诉它下一步怎么做" />
            </label>
            <button class="ask-skip" id="permSkip">跳过</button>
          </div>
        </div>

        <div class="composer-body" id="composerBody">
          <!-- ① 上下文层 · 消息队列 -->
          <section class="seg seg-queue" id="segQueue">
            <div class="seg-clip">
              <header class="queue-head" id="queueHead">
                <svg class="q-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 12H3M16 6H3M16 18H3M18 9v6M21 12h-6"/></svg>
                <span class="q-title">队列</span>
                <span class="queue-count" id="queueCount">0</span>
                <span class="queue-hint">回复完成后按顺序自动发送</span>
                <span class="queue-next">
                  <svg class="nx-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 10 5 5-5 5"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></svg>
                  <span class="nx-text" id="queueNextText"></span>
                </span>
                <span class="queue-actions">
                  <button class="queue-clear" id="queueClear" title="清空队列">清空</button>
                  <button class="queue-toggle" id="queueToggle" aria-label="折叠队列">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                  </button>
                </span>
              </header>
              <div class="queue-list-wrap">
                <div class="queue-list-clip">
                  <ul class="queue-list" id="queueList"></ul>
                </div>
              </div>
            </div>
          </section>

          <!-- 状态横幅（变体 B）：固定贴 input 上沿 -->
          <section class="seg seg-banner" id="segBanner">
            <div class="seg-clip">
              <div class="banner">
                <span class="spin-glyph" aria-hidden="true">✺</span>
                <span class="b-verb" id="bannerVerb">思考中…</span>
                <span class="b-time" id="bannerTime">0.0s</span>
              </div>
            </div>
          </section>

          <!-- ② 输入层 -->
          <div class="input-area">
            <div class="input" id="input" contenteditable="true"
                 data-placeholder="输入消息，@ 引用文件，/ 调用技能"></div>
          </div>

          <!-- ③ 工具行 -->
          <div class="toolbar">
            <button class="tb-btn" aria-label="添加附件">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <button class="tb-btn" aria-label="技能">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
            </button>

            <!-- spacer 兼作状态 pill 的居中容器（变体 A · 默认）：位置固定，永不漂移 -->
            <div class="spacer">
              <div class="status-pill" id="statusPill" role="status" aria-live="polite">
                <span class="spin-glyph" aria-hidden="true">✺</span>
                <span class="p-verb" id="pillVerb">思考中</span>
                <span class="p-dot">·</span>
                <span class="p-time" id="pillTime">0.0s</span>
              </div>
            </div>

            <span class="enqueue-hint" id="enqueueHint"><kbd>⏎</kbd> 加入队列</span>

            <button class="model-chip">
              <span class="m-star">✦</span> Haiku 4.5
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <button class="tb-btn" aria-label="语音输入" style="box-shadow:none">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></svg>
            </button>
            <button class="btn-send" id="btnSend" aria-label="发送">
              <svg id="sendIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m6 11 6-6 6 6"/></svg>
              <span class="stop-square" id="stopIcon" style="display:none"></span>
            </button>
          </div>
        </div><!-- /composer-body -->
      </div>
    </div>

    <!-- 卡下 chips（环境还原，静态） -->
    <div class="below-chips">
      <span class="chip-cwd">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        桌面
      </span>
      <button class="chip-mode">
        <span class="mode-dot"></span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M13 5.5 19.5 12 13 18.5v-13Z"/><path d="M4.5 5.5 11 12l-6.5 6.5v-13Z"/></svg>
        全自动
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Tweaks -->
<button class="tweaks-fab" id="tweaksFab" aria-label="Tweaks">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
<div class="tweaks" id="tweaksPanel">
  <h3>Tweaks</h3>
  <div class="tw-group">
    <div class="tw-row">
      <span class="tw-label">暗色模式</span>
      <button class="tw-switch" id="twDark" role="switch" aria-checked="false" aria-label="暗色模式"></button>
    </div>
    <div class="tw-row">
      <span class="tw-label">运行状态指示</span>
      <div class="tw-seg" id="twStatus">
        <button data-v="pill" class="on">工具行 pill</button>
        <button data-v="banner">顶部横幅</button>
      </div>
    </div>
    <div class="tw-row">
      <span class="tw-label">队列默认折叠</span>
      <button class="tw-switch" id="twCollapse" role="switch" aria-checked="false" aria-label="队列默认折叠"></button>
    </div>
    <div class="tw-row">
      <span class="tw-label">活动词自动轮换</span>
      <button class="tw-switch on" id="twVerbCycle" role="switch" aria-checked="true" aria-label="活动词自动轮换"></button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   状态机：scenario 决定 running / queue / permission / ask 的组合，
   渲染函数按固定锚位更新各段。所有交互（排队、队列增删改、权限键盘、
   提问分页）都真实可玩。
   ═══════════════════════════════════════════════════════════════════ */
const $ = (id) => document.getElementById(id);

const QUEUE_SEED = [
  '把首页 hero 标题换成「设计从对话开始」',
  '导航栏在滚动时加一层毛玻璃背景',
  '定价页的三张卡片改成月付/年付切换',
  '移动端断点下隐藏侧边栏，改成底部 tab',
  '导出当前页面为 PDF 给我',
  '页脚加上备案号和隐私政策链接',
  '按钮 hover 态加 0.15s 的缓动',
  '把品牌绿换成 #16a34a 并同步暗色档',
  '检查一下控制台里的 hydration 报错',
  '最后统一跑一遍 typecheck'
];

const ASK_QUESTIONS = [
  {
    title: '您想要处理什么类型的任务？',
    options: [
      { label: '代码开发/编辑', desc: '编写、修改或调试代码' },
      { label: '文档生成', desc: '创建 PPT、PDF、Word 等文档' },
      { label: '设计相关', desc: 'UI 设计、图片生成或视觉设计' },
      { label: '其他任务', desc: '请选此项后在备注中说明' }
    ]
  },
  {
    title: '希望以哪种方式交付结果？',
    options: [
      { label: '直接改动项目文件', desc: '在当前工作区内落地改动' },
      { label: '先出原型再确认', desc: 'HTML 原型确认后再写进项目' },
      { label: '只给方案说明', desc: '输出步骤与建议，不动代码' }
    ]
  }
];

const VERBS = ['思考中', '探索中', '查阅中', '编写中'];

const SCENARIOS = {
  idle:       { running: false, queue: 0,  perm: false, ask: false,
    note: '静息态：<b>空输入 = 灰盘禁用</b>，有内容才亮品牌绿 —— 状态差本身就是「可以发了」的信号。' },
  running:    { running: true,  queue: 0,  perm: false, ask: false,
    note: '运行状态改为<b>工具行常驻 pill</b>：位置固定、与停止按钮同排，不再是随队列漂移的横幅。输入随时可打字，<b>⏎ 加入队列</b>。' },
  queue:      { running: true,  queue: 10, perm: false, ask: false,
    note: '队列 = <b>紧凑行 + 4 行内滚 + 可折叠摘要</b>，不再把输入框顶出视野。hover 行浮现置顶 / 编辑 / 删除。' },
  ask:        { running: true,  queue: 0,  perm: false, ask: true,
    note: '提问 = 本轮唯一要的输入 → <b>输入卡整卡 morph 成问卷</b>；数字直选、‹ › 回看改答案、底部「其他」自由作答。' },
  permission: { running: true,  queue: 0,  perm: true,  ask: false,
    note: '权限与提问<b>同一套接管形态</b>：输入卡整卡变形为权限面板（input 不出现），数字直选 / 点选项即提交，底部自由输入 = 不同意并说明理由，Esc 跳过。' },
  permqueue:  { running: true,  queue: 4,  perm: true,  ask: false,
    note: '权限接管期间<b>队列随输入区一起隐藏</b>（数据不丢）——答完卡变回输入形态，队列原样恢复。' }
};

const state = {
  scenario: 'idle',
  queue: [],
  queueCollapsed: false,
  collapsePref: false,       // Tweak：队列默认折叠
  statusStyle: 'pill',       // pill | banner
  verbCycle: true,
  verbIdx: 0,
  stepStart: Date.now(),     // 当前活动的起点（换 verb 时重置 —— 计时=该活动自己的耗时）
  permStart: Date.now(),
  askIdx: 0,
  askAnswers: {},
  editingId: null,
  nextId: 1
};

/* ── 计时循环 ── */
setInterval(() => {
  const sc = SCENARIOS[state.scenario];
  if (sc.running && !sc.ask) {
    const s = ((Date.now() - state.stepStart) / 1000).toFixed(1) + 's';
    $('pillTime').textContent = s;
    $('bannerTime').textContent = s;
  }
  if (sc.perm) {
    $('permWait').textContent = '等待 ' + Math.floor((Date.now() - state.permStart) / 1000) + 's';
  }
}, 100);

/* verb 轮换（演示真实回合里 activity 会变）：换词时重置计时 —— 数字必须是
   当前活动自己的 elapsed，turn 总耗时配「编写中」读起来像谎话。 */
setInterval(() => {
  const sc = SCENARIOS[state.scenario];
  if (!sc.running || sc.ask || !state.verbCycle) return;
  state.verbIdx = (state.verbIdx + 1) % VERBS.length;
  state.stepStart = Date.now();
  for (const [el, suffix] of [[$('pillVerb'), ''], [$('bannerVerb'), '…']]) {
    el.textContent = VERBS[state.verbIdx] + suffix;
    el.classList.remove('verb-in'); void el.offsetWidth; el.classList.add('verb-in');
  }
}, 3600);

/* ── 场景切换 ── */
function applyScenario(id) {
  state.scenario = id;
  const sc = SCENARIOS[id];
  state.verbIdx = 0;
  state.stepStart = Date.now();
  state.permStart = Date.now();
  state.askIdx = 0;
  state.askAnswers = {};
  state.editingId = null;
  state.queue = QUEUE_SEED.slice(0, sc.queue).map((text) => ({ id: state.nextId++, text }));
  // 折叠规则：权限在场 → 强制折叠；否则跟 Tweak 偏好
  state.queueCollapsed = sc.perm ? true : state.collapsePref;
  $('pillVerb').textContent = VERBS[0];
  $('bannerVerb').textContent = VERBS[0] + '…';
  $('permOther').value = '';
  document.querySelectorAll('#permOpts .opt').forEach((el) => el.classList.remove('picked'));
  $('input').textContent = '';

  document.querySelectorAll('#scenarioBar button').forEach((b) =>
    b.classList.toggle('on', b.dataset.sc === id));
  $('scenarioNote').innerHTML = sc.note;
  $('thread').toggleAttribute('data-idle', !sc.running);
  $('composer').classList.toggle('asking', sc.ask);
  $('composer').classList.toggle('perming', sc.perm);
  if (sc.ask) renderAsk(1);
  renderAll();
}

/* ── 总渲染 ── */
function renderAll() {
  const sc = SCENARIOS[state.scenario];
  renderQueue();
  // 运行状态：pill / banner 二选一，位置各自固定
  const showStatus = sc.running && !sc.ask;
  $('statusPill').style.display = (showStatus && state.statusStyle === 'pill') ? 'flex' : 'none';
  $('segBanner').classList.toggle('open', showStatus && state.statusStyle === 'banner');
  // 输入 placeholder：running 时短句传达排队语义（长文案退役）
  $('input').dataset.placeholder = sc.running
    ? '回复中仍可输入，Enter 加入队列'
    : '输入消息，@ 引用文件，/ 调用技能';
  updateSendBtn();
}

/* ── 发送/停止按钮 + ⏎排队提示 ── */
function updateSendBtn() {
  const sc = SCENARIOS[state.scenario];
  const hasText = $('input').textContent.trim().length > 0;
  const btn = $('btnSend');
  btn.classList.toggle('stop', sc.running);
  btn.classList.toggle('ready', !sc.running && hasText);
  btn.style.cursor = sc.running || hasText ? 'pointer' : 'not-allowed';
  btn.setAttribute('aria-label', sc.running ? '停止生成' : '发送');
  $('sendIcon').style.display = sc.running ? 'none' : 'block';
  $('stopIcon').style.display = sc.running ? 'block' : 'none';
  $('enqueueHint').style.display = (sc.running && hasText && !sc.ask) ? 'flex' : 'none';
}

/* ── 队列 ── */
function renderQueue() {
  const seg = $('segQueue');
  const has = state.queue.length > 0;
  seg.classList.toggle('open', has);
  seg.classList.toggle('collapsed', state.queueCollapsed);
  $('queueCount').textContent = state.queue.length;
  $('queueNextText').textContent = state.queue[0] ? '下一条：' + state.queue[0].text : '';

  const ul = $('queueList');
  ul.innerHTML = '';
  state.queue.forEach((item, idx) => {
    const li = document.createElement('li');
    li.className = 'q-row';
    li.dataset.id = item.id;

    const no = document.createElement('span');
    no.className = 'q-idx'; no.textContent = idx + 1;
    li.appendChild(no);

    if (state.editingId === item.id) {
      const inp = document.createElement('input');
      inp.className = 'q-edit'; inp.value = item.text; inp.maxLength = 4000;
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); commitEdit(item.id, inp.value); }
        if (e.key === 'Escape') { e.preventDefault(); state.editingId = null; renderQueue(); }
      });
      inp.addEventListener('blur', () => commitEdit(item.id, inp.value));
      li.appendChild(inp);
      requestAnimationFrame(() => { inp.focus(); inp.select(); });
    } else {
      const tx = document.createElement('span');
      tx.className = 'q-text'; tx.textContent = item.text; tx.title = item.text;
      li.appendChild(tx);

      const ops = document.createElement('span');
      ops.className = 'q-ops';
      const mk = (svg, label, fn, danger) => {
        const b = document.createElement('button');
        b.className = 'q-op' + (danger ? ' danger' : '');
        b.title = label; b.setAttribute('aria-label', label);
        b.innerHTML = svg;
        b.addEventListener('click', (e) => { e.stopPropagation(); fn(); });
        return b;
      };
      const I = (d) => `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
      if (idx > 0) ops.appendChild(mk(I('<path d="M5 3h14"/><path d="m18 13-6-6-6 6"/><path d="M12 7v14"/>'), '移到最前',
        () => { state.queue = [item, ...state.queue.filter((q) => q.id !== item.id)]; renderQueue(); flashRow(item.id); }));
      ops.appendChild(mk(I('<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>'), '编辑',
        () => { state.editingId = item.id; renderQueue(); }));
      ops.appendChild(mk(I('<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>'), '删除',
        () => { state.queue = state.queue.filter((q) => q.id !== item.id); renderQueue(); }, true));
      li.appendChild(ops);
    }
    ul.appendChild(li);
  });
}
function commitEdit(id, value) {
  if (state.editingId !== id) return;
  state.editingId = null;
  const text = value.trim();
  if (!text) state.queue = state.queue.filter((q) => q.id !== id);   // 空文本 = 删除
  else { const it = state.queue.find((q) => q.id === id); if (it) it.text = text; }
  renderQueue();
}
function flashRow(id) {
  const row = document.querySelector(`.q-row[data-id="${id}"]`);
  if (row) { row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash'); }
}
function enqueue(text) {
  const item = { id: state.nextId++, text };
  state.queue.push(item);
  renderQueue();
  if (!state.queueCollapsed) {
    const ul = $('queueList');
    ul.scrollTop = ul.scrollHeight;          // 露出新行（不用 scrollIntoView）
  }
  flashRow(item.id);
}

$('queueToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  state.queueCollapsed = !state.queueCollapsed;
  renderQueue();
});
$('queueHead').addEventListener('click', () => {   // 折叠态整行可点开
  if (state.queueCollapsed) { state.queueCollapsed = false; renderQueue(); }
});
$('queueClear').addEventListener('click', (e) => {
  e.stopPropagation();
  state.queue = []; renderQueue();
});

/* ── 输入 & 发送/排队 ── */
const input = $('input');
input.addEventListener('input', updateSendBtn);
input.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' || e.shiftKey || e.isComposing) return;
  e.preventDefault();
  const text = input.textContent.trim();
  if (!text) return;
  const sc = SCENARIOS[state.scenario];
  input.textContent = '';
  if (sc.running) enqueue(text);
  updateSendBtn();
});
$('btnSend').addEventListener('click', () => {
  const sc = SCENARIOS[state.scenario];
  if (sc.running) { applyScenario('idle'); return; }   // 停止 → demo 回空闲
  const text = input.textContent.trim();
  if (text) { input.textContent = ''; updateSendBtn(); }
});

/* ── 权限段（与提问同构：点选项即提交，一拍选中反馈；数字直选；
      「不同意」= 底部自由输入行，Enter 带理由拒绝；Esc/跳过 = deny）── */
function pickPermOption(i) {
  const el = document.querySelectorAll('#permOpts .opt')[i];
  if (!el) return;
  el.classList.add('picked');
  setTimeout(resolvePerm, 240);
}
document.querySelectorAll('#permOpts .opt').forEach((el, i) => {
  el.addEventListener('click', () => pickPermOption(i));
});
function resolvePerm() {
  // demo：提交/跳过后回到同场景的无权限形态
  applyScenario(state.scenario === 'permqueue' ? 'queue' : 'running');
}
$('permSkip').addEventListener('click', resolvePerm);
$('permOther').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && $('permOther').value.trim()) { e.preventDefault(); resolvePerm(); }
  if (e.key === 'Escape') { e.preventDefault(); resolvePerm(); }
  e.stopPropagation();
});

/* 权限键盘：数字直选（即选即提交，同提问），Esc 跳过。
   焦点在输入/编辑框时不劫持。 */
document.addEventListener('keydown', (e) => {
  const sc = SCENARIOS[state.scenario];
  if (!sc.perm) return;
  const tag = document.activeElement?.tagName;
  const editing = tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable;
  if (editing) return;
  if (e.key === '1' || e.key === '2') { pickPermOption(+e.key - 1); e.preventDefault(); }
  else if (e.key === 'Escape') { resolvePerm(); e.preventDefault(); }
});

/* ── AskUserQuestion 面板 ── */
function renderAsk(dir) {
  const q = ASK_QUESTIONS[state.askIdx];
  const total = ASK_QUESTIONS.length;
  const picked = state.askAnswers[state.askIdx];
  const panel = $('askPanel');
  panel.innerHTML = `
    <div class="ask-head">
      <span class="ask-title">${q.title}</span>
      <span class="ask-pager">
        <button class="pager-btn" id="askPrev" ${state.askIdx === 0 ? 'disabled' : ''} aria-label="上一题">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span>${state.askIdx + 1} / ${total}</span>
        <button class="pager-btn" id="askNext" ${state.askIdx >= total - 1 ? 'disabled' : ''} aria-label="下一题">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </span>
      <button class="ask-close" id="askClose" aria-label="取消提问">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="ask-body">
      <div class="ask-q ${dir < 0 ? 'back' : ''}">
        <div class="opt-list">
          ${q.options.map((o, i) => `
            <button class="opt ${picked === i ? 'picked' : ''}" data-i="${i}">
              <span class="opt-no">${i + 1}</span>
              <span class="opt-label">${o.label}</span>
              <span class="opt-desc">${o.desc}</span>
            </button>`).join('')}
        </div>
      </div>
    </div>
    <div class="ask-foot">
      <label class="ask-other">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        <input id="askOther" placeholder="其他——用自己的话回答" />
      </label>
      <button class="ask-skip" id="askSkip">跳过</button>
    </div>`;

  panel.querySelectorAll('.opt').forEach((el) => {
    el.addEventListener('click', () => {
      state.askAnswers[state.askIdx] = +el.dataset.i;
      el.classList.add('picked');
      setTimeout(askAdvance, 240);   // 一拍选中反馈后前进
    });
  });
  $('askPrev').addEventListener('click', () => { if (state.askIdx > 0) { state.askIdx--; renderAsk(-1); } });
  $('askNext').addEventListener('click', () => { if (state.askIdx < total - 1) { state.askIdx++; renderAsk(1); } });
  $('askClose').addEventListener('click', () => applyScenario('running'));
  $('askSkip').addEventListener('click', askAdvance);
  $('askOther').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && $('askOther').value.trim()) { e.preventDefault(); askAdvance(); }
    e.stopPropagation();
  });
}
function askAdvance() {
  if (state.askIdx < ASK_QUESTIONS.length - 1) { state.askIdx++; renderAsk(1); }
  else applyScenario('running');   // 全部处理完 → 提交，卡变回输入形态
}
/* ask 态数字直选 */
document.addEventListener('keydown', (e) => {
  const sc = SCENARIOS[state.scenario];
  if (!sc.ask) return;
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const q = ASK_QUESTIONS[state.askIdx];
  const n = +e.key;
  if (n >= 1 && n <= q.options.length) {
    state.askAnswers[state.askIdx] = n - 1;
    renderAsk(1);
    setTimeout(askAdvance, 240);
    e.preventDefault();
  } else if (e.key === 'Escape') { applyScenario('running'); e.preventDefault(); }
});

/* ── 场景条 ── */
document.querySelectorAll('#scenarioBar button').forEach((b) =>
  b.addEventListener('click', () => applyScenario(b.dataset.sc)));

/* ── Tweaks ── */
$('tweaksFab').addEventListener('click', () => $('tweaksPanel').classList.toggle('open'));
$('twDark').addEventListener('click', () => {
  const on = document.documentElement.classList.toggle('dark');
  $('twDark').classList.toggle('on', on);
  $('twDark').setAttribute('aria-checked', on);
});
document.querySelectorAll('#twStatus button').forEach((b) =>
  b.addEventListener('click', () => {
    state.statusStyle = b.dataset.v;
    document.querySelectorAll('#twStatus button').forEach((x) => x.classList.toggle('on', x === b));
    renderAll();
  }));
$('twCollapse').addEventListener('click', () => {
  state.collapsePref = !state.collapsePref;
  $('twCollapse').classList.toggle('on', state.collapsePref);
  $('twCollapse').setAttribute('aria-checked', state.collapsePref);
  if (!SCENARIOS[state.scenario].perm) { state.queueCollapsed = state.collapsePref; renderQueue(); }
});
$('twVerbCycle').addEventListener('click', () => {
  state.verbCycle = !state.verbCycle;
  $('twVerbCycle').classList.toggle('on', state.verbCycle);
  $('twVerbCycle').setAttribute('aria-checked', state.verbCycle);
});

applyScenario('queue');   // 初始落在信息量最大的场景
</script>
</body>
</html>
