<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>附件样式原型 · Composer Attachments</title>
<style>
  /* ============================================================
     Composer 附件区设计方案 —— 现状对照 + 6 种方案
       · token 与 packages/design-tokens/tokens.css 1:1 对齐
         （浅色 Apple 灰底/白卡/#0071e3 蓝/#16a34a 品牌绿；
           深色暖黑 #1a1917 / #222120 / #2997ff / 提亮绿）
       · 文件图标直接嵌 FileTypeIcon.tsx 的 Icons8 彩色 path 表，
         与 app 内渲染完全一致（见 <script> 里 ICONS）
       · 每个方案都放在还原的 composer 壳里看上下文效果
       · 右下角 Tweaks：明暗切换 + 附件数量（4 / 8）
     ============================================================ */
  :root {
    color-scheme: light;
    --bg-app: #f5f5f7;          /* --background 240 7% 97% */
    --bg-card: #ffffff;         /* --card */
    --bg-muted: #ebebee;        /* --muted 240 5% 93% */
    --bg-secondary: #eeeef1;    /* --secondary 240 6% 94% */

    --text: #1d1d1f;            /* --foreground */
    --text-soft: #62626b;       /* --muted-foreground 240 4% 40% */
    --text-faint: #9b9ba2;

    --border: #d4d4da;          /* --border 240 6% 84% */
    --border-strong: #c9c9d1;

    --primary: #0071e3;         /* Apple Blue */
    --brand: #16a34a;           /* 品牌绿（发送钮/进度条身份色） */
    --brand-fg: #ffffff;
    --destructive: #d92d2d;

    --radius-composer: 24px;
    --radius-chip: 10px;

    --shadow-composer: 0 1px 2px rgba(0,0,0,.03), 0 8px 30px rgba(0,0,0,.06);
    --shadow-pop: 0 4px 14px rgba(0,0,0,.10);

    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
            "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    color-scheme: dark;
    --bg-app: #1a1917;          /* dark --background 40 6% 10% */
    --bg-card: #222120;         /* dark --card */
    --bg-muted: #2e2c29;        /* dark --muted */
    --bg-secondary: #272523;

    --text: #e8e4dc;            /* 暖白 */
    --text-soft: #9a9690;
    --text-faint: #6e6b65;

    --border: #333128;
    --border-strong: #46433c;

    --primary: #2997ff;
    --brand: #3bd47f;           /* 提亮绿 145 60% 52% */
    --brand-fg: #1a1917;
    --destructive: #e35b5b;

    --shadow-composer: 0 1px 2px rgba(0,0,0,.4), 0 10px 34px rgba(0,0,0,.38);
    --shadow-pop: 0 4px 16px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg-app);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding: 56px 24px 120px;
    transition: background .25s, color .25s;
  }
  .page { max-width: 860px; margin: 0 auto; }

  /* ===== 页头 ===== */
  .page-head { margin-bottom: 48px; }
  .page-head h1 { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
  .page-head p { margin-top: 10px; font-size: 14px; color: var(--text-soft); line-height: 1.7; }
  .page-head .kbd {
    display: inline-block; padding: 1px 7px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg-card); font-size: 12px; color: var(--text-soft);
  }

  /* ===== 方案区块 ===== */
  section { margin-bottom: 64px; }
  .sec-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
  .sec-tag {
    font-size: 11px; font-weight: 700; letter-spacing: .06em;
    padding: 3px 9px; border-radius: 999px;
    background: var(--bg-muted); color: var(--text-soft);
  }
  .sec-tag.hot { background: color-mix(in srgb, var(--brand) 14%, transparent); color: var(--brand); }
  .sec-head h2 { font-size: 17px; font-weight: 650; letter-spacing: -.01em; }
  .sec-desc { font-size: 13px; color: var(--text-soft); margin-bottom: 18px; line-height: 1.7; }
  .sec-note { font-size: 12px; color: var(--text-faint); margin-top: 12px; line-height: 1.8; }

  /* ===== Composer 壳（各方案共用，只有附件区不同）===== */
  .composer {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-composer);
    box-shadow: var(--shadow-composer);
    padding: 14px 16px 12px;
    transition: background .25s, border-color .25s;
  }
  .attach-zone { margin-bottom: 4px; }
  .field-row {
    display: flex; align-items: baseline; gap: 14px;
    padding: 8px 6px 14px; font-size: 15px;
  }
  .field-row .ph { color: var(--text-soft); }
  .field-row .hints { font-size: 13px; color: var(--text-faint); }
  .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
  .tb-left, .tb-right { display: flex; align-items: center; gap: 10px; }
  .tb-circle {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg-card);
    display: grid; place-items: center; color: var(--text-soft); cursor: pointer;
  }
  .tb-circle:hover { background: var(--bg-muted); }
  .tb-pill {
    height: 34px; padding: 0 12px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--bg-card);
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text); cursor: pointer;
  }
  .tb-pill:hover { background: var(--bg-muted); }
  .model { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-soft); }
  .tb-mic { border: 0; background: none; color: var(--text-soft); cursor: pointer; display: grid; place-items: center; }
  .send {
    width: 38px; height: 38px; border-radius: 50%; border: 0; cursor: pointer;
    background: var(--brand); color: var(--brand-fg);
    display: grid; place-items: center;
    transition: transform .16s, filter .16s;
  }
  .send:hover { filter: brightness(1.06); }
  .send:active { transform: scale(.94); }

  /* 移除钮通用底座（各方案再各自定位） */
  .chip-x {
    border: 0; cursor: pointer; display: grid; place-items: center;
    font-size: 12px; line-height: 1; border-radius: 50%;
    color: var(--text-soft); background: var(--bg-muted);
    transition: opacity .16s, background .16s, color .16s, transform .16s;
  }
  .chip-x:hover { background: var(--bg-secondary); color: var(--text); }

  /* ===== 方案 0 · 现状还原 ===== */
  .v0-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .v0-chip {
    position: relative; display: flex; align-items: center; gap: 8px;
    padding: 6px 24px 6px 6px;
    border: 1px solid var(--border); border-radius: 8px;
    background: color-mix(in srgb, var(--bg-card) 60%, transparent);
  }
  .v0-tile {
    width: 40px; height: 40px; flex-shrink: 0; border-radius: 4px;
    background: var(--bg-muted); display: grid; place-items: center;
  }
  .v0-thumb { width: 40px; height: 40px; flex-shrink: 0; border-radius: 4px; object-fit: cover; display: block; }
  .v0-name { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
             font-size: 11px; color: color-mix(in srgb, var(--text) 80%, transparent); }
  .v0-x { position: absolute; right: 4px; top: 4px; width: 16px; height: 16px; font-size: 10px; opacity: 0; }
  .v0-chip:hover .v0-x { opacity: 1; }

  /* ===== 方案 A · 双行信息卡 ===== */
  .va-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .va-card {
    position: relative; display: flex; align-items: center; gap: 10px;
    padding: 6px 12px 6px 6px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg-card);
    transition: border-color .16s, box-shadow .16s;
  }
  .va-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .va-tile {
    width: 42px; height: 42px; flex-shrink: 0; border-radius: 9px;
    display: grid; place-items: center;
  }
  .va-thumb { width: 42px; height: 42px; flex-shrink: 0; border-radius: 9px; object-fit: cover; display: block; }
  .va-name { max-width: 168px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
             font-size: 12px; font-weight: 500; color: var(--text); }
  .va-sub { margin-top: 2px; font-size: 11px; color: var(--text-soft); }
  .va-x {
    position: absolute; right: -6px; top: -6px; width: 18px; height: 18px;
    background: var(--bg-card); border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,.10);
    opacity: 0; transform: scale(.8);
  }
  .va-card:hover .va-x { opacity: 1; transform: scale(1); }
  .va-x:hover { background: var(--bg-muted); }

  /* ===== 方案 B · 紧凑胶囊 ===== */
  .vb-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .vb-pill {
    display: flex; align-items: center; gap: 6px;
    height: 30px; padding: 0 5px 0 9px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--bg-card);
    transition: border-color .16s, background .16s;
  }
  .vb-pill:hover { border-color: var(--border-strong); background: var(--bg-muted); }
  .vb-thumb { width: 18px; height: 18px; border-radius: 5px; object-fit: cover; display: block; }
  .vb-name { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
             font-size: 12px; color: var(--text); }
  .vb-ext { font-size: 12px; color: var(--text-faint); margin-left: -4px; }
  .vb-x { width: 18px; height: 18px; font-size: 11px; background: transparent; opacity: .5; }
  .vb-pill:hover .vb-x { opacity: 1; }

  /* ===== 方案 C · 竖版预览卡 ===== */
  .vc-row { display: flex; flex-wrap: wrap; gap: 10px; }
  .vc-card { width: 132px; }
  .vc-visual {
    position: relative; height: 80px; border-radius: 10px;
    border: 1px solid var(--border); overflow: hidden;
    display: grid; place-items: center;
    transition: border-color .16s;
  }
  .vc-card:hover .vc-visual { border-color: var(--border-strong); }
  .vc-visual img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .vc-ext {
    position: absolute; left: 6px; bottom: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .04em;
    color: #fff; background: rgba(0,0,0,.45);
    padding: 2px 6px; border-radius: 5px;
  }
  .vc-x {
    position: absolute; right: 5px; top: 5px; width: 20px; height: 20px;
    background: rgba(0,0,0,.45); color: #fff; opacity: 0;
  }
  .vc-card:hover .vc-x { opacity: 1; }
  .vc-x:hover { background: rgba(0,0,0,.65); color: #fff; }
  .vc-name {
    margin-top: 6px; font-size: 11px; color: var(--text); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-all;
  }
  .vc-sub { margin-top: 2px; font-size: 10px; color: var(--text-faint); }

  /* ===== 方案 D · 列表行 + 上传状态 ===== */
  .vd-list { display: flex; flex-direction: column; gap: 4px; }
  .vd-row {
    position: relative; display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 10px;
    transition: background .16s;
  }
  .vd-row:hover { background: var(--bg-muted); }
  .vd-tile {
    width: 32px; height: 32px; flex-shrink: 0; border-radius: 8px;
    display: grid; place-items: center;
  }
  .vd-thumb { width: 32px; height: 32px; flex-shrink: 0; border-radius: 8px; object-fit: cover; display: block; }
  .vd-main { flex: 1; min-width: 0; }
  .vd-top { display: flex; align-items: baseline; gap: 8px; }
  .vd-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
             font-size: 12px; font-weight: 500; color: var(--text); }
  .vd-size { flex-shrink: 0; font-size: 11px; color: var(--text-faint); }
  .vd-bar { margin-top: 5px; height: 3px; border-radius: 999px; background: var(--bg-muted); overflow: hidden; }
  .vd-row:hover .vd-bar { background: var(--bg-secondary); }
  .vd-bar i { display: block; height: 100%; border-radius: 999px; background: var(--brand); transition: width .3s; }
  .vd-err { margin-top: 3px; font-size: 11px; color: var(--destructive); }
  .vd-err a { color: inherit; font-weight: 600; text-decoration: underline; cursor: pointer; }
  .vd-pct { flex-shrink: 0; font-size: 11px; color: var(--text-soft); font-variant-numeric: tabular-nums; }
  .vd-check { flex-shrink: 0; color: var(--brand); display: grid; place-items: center; }
  .vd-x { width: 20px; height: 20px; font-size: 12px; background: transparent; opacity: 0; flex-shrink: 0; }
  .vd-row:hover .vd-x { opacity: 1; }
  .vd-x:hover { background: var(--bg-secondary); }

  /* ===== 方案 E · 瓷片网格 ===== */
  .ve-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .ve-tile {
    position: relative; width: 76px; height: 76px;
    border-radius: 12px; border: 1px solid var(--border); overflow: hidden;
    transition: border-color .16s;
  }
  .ve-tile:hover { border-color: var(--border-strong); }
  .ve-tile > img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ve-doc {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  }
  .ve-ext { font-size: 9px; font-weight: 700; letter-spacing: .05em; color: var(--text-soft); }
  .ve-scrim {
    position: absolute; inset: 0; background: rgba(0,0,0,.18);
    opacity: 0; transition: opacity .16s; pointer-events: none;
  }
  .ve-tile:hover .ve-scrim { opacity: 1; }
  .ve-x {
    position: absolute; right: 4px; top: 4px; width: 20px; height: 20px;
    background: rgba(0,0,0,.45); color: #fff; opacity: 0;
  }
  .ve-tile:hover .ve-x { opacity: 1; }
  .ve-x:hover { background: rgba(0,0,0,.65); color: #fff; }
  .ve-name-tip {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 14px 6px 4px; font-size: 9px; color: #fff;
    background: linear-gradient(transparent, rgba(0,0,0,.55));
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    opacity: 0; transition: opacity .16s; pointer-events: none;
  }
  .ve-tile:hover .ve-name-tip { opacity: 1; }

  /* ===== 方案 F · 叠层卡组 ===== */
  .vf-zone { overflow-x: auto; padding: 8px 2px 2px; }
  .vf-deck {
    position: relative; height: 52px;
    width: calc(170px + (var(--n) - 1) * 24px);
    transition: width .38s cubic-bezier(.22,1,.36,1);
  }
  .vf-card {
    position: absolute; left: 0; top: 0;
    width: 170px; height: 48px;
    display: flex; align-items: center; gap: 8px;
    padding: 0 10px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg-card);
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    transform: translateX(calc(var(--i) * 24px))
               rotate(calc((var(--i) - (var(--n) - 1) / 2) * 1.1deg));
    transform-origin: 50% 120%;
    transition: transform .38s cubic-bezier(.22,1,.36,1);
    z-index: calc(var(--i) + 1);
  }
  .vf-deck:hover { width: calc(var(--n) * 178px); }
  .vf-deck:hover .vf-card { transform: translateX(calc(var(--i) * 178px)) rotate(0deg); }
  .vf-thumb { width: 26px; height: 26px; border-radius: 7px; object-fit: cover; flex-shrink: 0; display: block; }
  .vf-meta { min-width: 0; }
  .vf-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
             font-size: 11px; font-weight: 500; color: var(--text); }
  .vf-sub { font-size: 10px; color: var(--text-faint); margin-top: 1px; }
  .vf-x {
    position: absolute; right: -6px; top: -6px; width: 18px; height: 18px;
    background: var(--bg-card); border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,.10);
    opacity: 0; transform: scale(.8);
  }
  .vf-deck:hover .vf-card:hover .vf-x { opacity: 1; transform: scale(1); }
  .vf-label { margin-top: 8px; font-size: 11px; color: var(--text-faint); }

  /* ===== Tweaks 面板 ===== */
  #tweaksBtn {
    position: fixed; right: 20px; bottom: 20px; z-index: 50;
    height: 34px; padding: 0 14px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--text-soft);
    font-size: 12px; font-weight: 600; cursor: pointer;
    box-shadow: var(--shadow-pop);
  }
  #tweaksPanel {
    position: fixed; right: 20px; bottom: 62px; z-index: 50;
    width: 232px; padding: 14px;
    border: 1px solid var(--border); border-radius: 14px;
    background: var(--bg-card); box-shadow: var(--shadow-pop);
  }
  #tweaksPanel[hidden] { display: none; }
  .tw-title { font-size: 12px; font-weight: 700; letter-spacing: .05em; color: var(--text-soft); margin-bottom: 12px; }
  .tw-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; font-size: 12px; }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button {
    border: 0; background: var(--bg-card); color: var(--text-soft);
    font-size: 12px; padding: 4px 10px; cursor: pointer;
  }
  .seg button.on { background: var(--bg-muted); color: var(--text); font-weight: 600; }
</style>
</head>
<body>
<div class="page">
  <div class="page-head">
    <h1>附件样式 · 设计方案</h1>
    <p>Composer 附件区 6 种方案 + 现状对照，全部放在还原的输入框壳里看上下文效果。
       文件图标与配色 token 与 app 源码同源。悬停各 chip 体验移除 / 展开交互；
       右下角 <span class="kbd">Tweaks</span> 可切换明暗与附件数量（4 → 8 看换行表现）。</p>
  </div>
  <main id="stage"></main>
</div>

<button id="tweaksBtn">Tweaks</button>
<div id="tweaksPanel" hidden>
  <div class="tw-title">TWEAKS</div>
  <div class="tw-row"><span>外观</span>
    <div class="seg" id="segTheme">
      <button data-v="light" class="on">亮</button><button data-v="dark">暗</button>
    </div>
  </div>
  <div class="tw-row"><span>附件数量</span>
    <div class="seg" id="segCount">
      <button data-v="4" class="on">4 个</button><button data-v="8">8 个</button>
    </div>
  </div>
</div>

function svgIcon(kind, size) {
  const paths = ICONS[kind] || ICONS.generic
  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48" aria-hidden="true">` +
    paths.map(p => `<path d="${p.d}" fill="${p.fill}"/>`).join('') + `</svg>`
}

/* 图标主色 → 极淡 tint，给图标底座上一点类型色（A/C/D/E 方案用） */
const TINT = {
  ppt: '#FF7043', excel: '#4CAF50', word: '#2196F3', pdf: '#E53935',
  archive: '#FFCA28', code: '#90A4AE', image: '#90CAF9', generic: '#90CAF9'
}
function tintBg(kind) {
  return `background: color-mix(in srgb, ${TINT[kind] || TINT.generic} 13%, transparent)`
}

/* ── 缩略图占位（内联 SVG data-URI，无外部请求）── */
function makeThumb(c1, c2) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160">` +
    `<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">` +
    `<stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs>` +
    `<rect width="160" height="160" fill="url(#g)"/>` +
    `<circle cx="118" cy="44" r="34" fill="rgba(255,255,255,.26)"/>` +
    `<rect x="18" y="94" width="90" height="48" rx="10" fill="rgba(255,255,255,.20)"/></svg>`
  return 'data:image/svg+xml,' + encodeURIComponent(svg)
}
const THUMB_INDIGO = makeThumb('#6366f1', '#a78bfa')   /* 对应截图里的 preview-v7.png */
const THUMB_TEAL   = makeThumb('#0d9488', '#34d399')

/* ── 示例文件（沿用截图里的真实文件名）── */
const BASE_FILES = [
  { name: 'stanford_university_20260712_presentation.pptx', size: '4.2 MB', kind: 'ppt' },
  { name: 'stanford_university_relayout_v3.pptx', size: '3.8 MB', kind: 'ppt' },
  { name: '个人月度支出记录.xlsx', size: '86 KB', kind: 'excel' },
  { name: 'preview-v7.png', size: '1.4 MB', kind: 'image', thumb: THUMB_INDIGO }
]
const MORE_FILES = [
  { name: '季度复盘报告_final.pdf', size: '2.1 MB', kind: 'pdf' },
  { name: '需求说明文档.docx', size: '312 KB', kind: 'word' },
  { name: 'screenshot-home.png', size: '980 KB', kind: 'image', thumb: THUMB_TEAL },
  { name: 'design-assets.zip', size: '5.6 MB', kind: 'archive' }
]

function extOf(name) {
  const dot = name.lastIndexOf('.')
  return dot > 0 ? name.slice(dot + 1).toUpperCase() : ''
}
function stem(name) {
  const dot = name.lastIndexOf('.')
  return dot > 0 ? name.slice(0, dot) : name
}
function visualOrTile(f, cls, tileCls, iconSize) {
  return f.thumb
    ? `<img class="${cls}" src="${f.thumb}" alt="">`
    : `<div class="${tileCls}" style="${tintBg(f.kind)}">${svgIcon(f.kind, iconSize)}</div>`
}

/* ── Composer 壳（只有 attach-zone 不同）── */
const IC = {
  plus: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 3.5v9M3.5 8h9"/></svg>',
  chevron: '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4.5l3 3 3-3"/></svg>',
  chat: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M2.5 3.5h11v8h-6l-3 2.5v-2.5h-2z"/></svg>',
  spark: '<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5l1.4 4.1L14 7l-4.6 1.4L8 12.5 6.6 8.4 2 7l4.6-1.4z"/></svg>',

  up: '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12.5v-9M4.5 7 8 3.5 11.5 7"/></svg>',
  check: '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.2 3L13 4.5"/></svg>'
}
function composerShell(attachHTML) {
  return `<div class="composer">
    <div class="attach-zone">${attachHTML}</div>
    <div class="field-row">
      <span class="ph">随便问点什么…</span>
      <span class="hints">↵ 发送 · ⇧↵ 换行 · / 命令 · @ 文件</span>
    </div>
    <div class="toolbar">
      <div class="tb-left">
        <button class="tb-circle" aria-label="添加附件">${IC.plus}</button>
        <button class="tb-pill">${IC.chat}<span>通用</span>${IC.chevron}</button>
      </div>
      <div class="tb-right">
        <span class="model">${IC.spark}<span>Sonnet 5</span>${IC.chevron}</span>
        <button class="tb-mic" aria-label="语音输入">${IC.mic}</button>
        <button class="send" aria-label="发送">${IC.up}</button>
      </div>
    </div>
  </div>`
}

/* ── 各方案的附件区渲染器 ── */
function renderV0(files) {
  return `<div class="v0-row">` + files.map(f => `
    <div class="v0-chip">
      ${f.thumb ? `<img class="v0-thumb" src="${f.thumb}" alt="">`
                : `<div class="v0-tile">${svgIcon(f.kind, 22)}</div>`}
      <span class="v0-name">${f.name}</span>
      <button class="chip-x v0-x" aria-label="移除附件">×</button>
    </div>`).join('') + `</div>`
}

function renderVA(files) {
  return `<div class="va-row">` + files.map(f => `
    <div class="va-card">
      ${visualOrTile(f, 'va-thumb', 'va-tile', 24)}
      <div class="va-meta">
        <div class="va-name">${f.name}</div>
        <div class="va-sub">${extOf(f.name)} · ${f.size}</div>
      </div>
      <button class="chip-x va-x" aria-label="移除附件">×</button>
    </div>`).join('') + `</div>`
}

function renderVB(files) {
  return `<div class="vb-row">` + files.map(f => `
    <div class="vb-pill">
      ${f.thumb ? `<img class="vb-thumb" src="${f.thumb}" alt="">` : svgIcon(f.kind, 15)}
      <span class="vb-name">${stem(f.name)}</span>
      <span class="vb-ext">.${extOf(f.name).toLowerCase()}</span>
      <button class="chip-x vb-x" aria-label="移除附件">×</button>
    </div>`).join('') + `</div>`
}

function renderVC(files) {
  return `<div class="vc-row">` + files.map(f => `
    <div class="vc-card">
      <div class="vc-visual" ${f.thumb ? '' : `style="${tintBg(f.kind)}"`}>
        ${f.thumb ? `<img src="${f.thumb}" alt="">` : svgIcon(f.kind, 34)}
        <span class="vc-ext">${extOf(f.name)}</span>
        <button class="chip-x vc-x" aria-label="移除附件">×</button>
      </div>
      <div class="vc-name">${f.name}</div>
      <div class="vc-sub">${f.size}</div>
    </div>`).join('') + `</div>`
}

function renderVD(files) {
  /* 用固定状态样片演示：第 2 个上传中、第 4 个失败，其余完成 */
  const states = files.map((f, i) =>
    i === 1 ? { type: 'uploading', pct: 64 } :
    i === 3 ? { type: 'error' } : { type: 'done' })
  return `<div class="vd-list">` + files.map((f, i) => {
    const st = states[i]
    return `<div class="vd-row">
      ${f.thumb ? `<img class="vd-thumb" src="${f.thumb}" alt="">`
                : `<div class="vd-tile" style="${tintBg(f.kind)}">${svgIcon(f.kind, 18)}</div>`}
      <div class="vd-main">
        <div class="vd-top">
          <span class="vd-name">${f.name}</span>
          <span class="vd-size">${f.size}</span>
        </div>
        ${st.type === 'uploading' ? `<div class="vd-bar"><i style="width:${st.pct}%"></i></div>` : ''}
        ${st.type === 'error' ? `<div class="vd-err">上传失败 · <a>重试</a></div>` : ''}
      </div>
      ${st.type === 'uploading' ? `<span class="vd-pct">${st.pct}%</span>` : ''}
      ${st.type === 'done' ? `<span class="vd-check">${IC.check}</span>` : ''}
      <button class="chip-x vd-x" aria-label="移除附件">×</button>
    </div>`
  }).join('') + `</div>`
}

function renderVE(files) {
  return `<div class="ve-row">` + files.map(f => `
    <div class="ve-tile">
      ${f.thumb ? `<img src="${f.thumb}" alt=""><div class="ve-scrim"></div>`
                : `<div class="ve-doc" style="${tintBg(f.kind)}">${svgIcon(f.kind, 26)}<span class="ve-ext">${extOf(f.name)}</span></div>`}
      <div class="ve-name-tip">${f.name}</div>
      <button class="chip-x ve-x" aria-label="移除附件">×</button>
    </div>`).join('') + `</div>`
}

function renderVF(files) {
  return `<div class="vf-zone">
    <div class="vf-deck" style="--n:${files.length}">` + files.map((f, i) => `
      <div class="vf-card" style="--i:${i}">
        ${f.thumb ? `<img class="vf-thumb" src="${f.thumb}" alt="">` : svgIcon(f.kind, 22)}
        <div class="vf-meta">
          <div class="vf-name">${f.name}</div>
          <div class="vf-sub">${f.size}</div>
        </div>
        <button class="chip-x vf-x" aria-label="移除附件">×</button>
      </div>`).join('') + `
    </div>
    <div class="vf-label">${files.length} 个附件 · 悬停展开</div>
  </div>`
}

/* ── 方案清单 ── */
const SECTIONS = [
  {
    tag: '对照', hot: false, title: '现状还原',
    desc: '当前线上样式的 1:1 还原，作为讨论基准。单行文件名 11px，图标坐灰色底座，悬停右上角出移除钮。',
    note: '现状的两个可改进点：① 文件名只有一行、无大小/类型信息，长名截断后区分度低；② 图标底座是无差别的灰色，类型色只靠图标本身。',
    render: renderV0
  },
  {

    desc: '保持横排卡片的骨架，加第二行「类型 · 大小」元信息；图标底座改用文件类型的极淡 tint；移除钮改为骑缝在卡片右上角外侧的圆钮（macOS 徽章式）。',
    note: '改动最小、与现有代码结构完全同构（只是 chip 内部加一行 + tint），风险最低的升级路径。悬停看边框加深 + 阴影浮起 + 移除钮弹出。',
    render: renderVA
  },
  {

    note: '适合把附件当「输入的一部分」而非「预览对象」的定位——轻、快、密度高。代价是图片没有缩略图（只有 18px 小缩略），预览诉求弱时才选它。',

    note: '预览面积最大、图文混排时最整齐（等宽网格）。文件名支持两行，长中文名和长英文名都放得下。代价是垂直空间占用最高。',
    render: renderVC

  {

    note: '大文件多、上传耗时明显的场景最实用——状态一目了然。附件少时略显隆重，可与 A/B 组合：上传中用行式，完成后折叠成 chip。',
    render: renderVD
  },
  {
    tag: '方案 E', hot: false, title: '瓷片网格',
    desc: '76px 正方瓷片：图片直接铺满（所见即所传），文档用 tint 底 + 图标 + 扩展名。悬停浮出文件名渐变条与移除钮。',
    note: '截图/图片为主的会话里最好看，横向密度也高。纯文档场景信息量偏低（名字要悬停才见），适合作为「图片多时自动切换」的形态。',
    render: renderVE

  {

    desc: '附件收拢成一叠微微扇开的卡片，几乎不占宽度；悬停整叠平滑展开成一排，逐卡可移除。移开后再收拢。',
    note: '解决「附件一多就把 composer 顶得很高」的问题——常态极省空间，交互有记忆点。风险：可发现性依赖悬停，触屏/无障碍需要点击展开的兜底。',
    render: renderVF
  }
]

/* ── 渲染 & Tweaks ── */
let fileCount = 4
function renderAll() {
  const files = fileCount === 8 ? BASE_FILES.concat(MORE_FILES) : BASE_FILES
  document.getElementById('stage').innerHTML = SECTIONS.map(s => `
    <section>
      <div class="sec-head">
        <span class="sec-tag${s.hot ? ' hot' : ''}">${s.tag}</span>
        <h2>${s.title}</h2>
      </div>
      <p class="sec-desc">${s.desc}</p>
      ${composerShell(s.render(files))}
      <p class="sec-note">${s.note}</p>
    </section>`).join('')
}

const tweaksBtn = document.getElementById('tweaksBtn')
const tweaksPanel = document.getElementById('tweaksPanel')
tweaksBtn.addEventListener('click', () => { tweaksPanel.hidden = !tweaksPanel.hidden })

function bindSeg(id, onPick) {
  const seg = document.getElementById(id)
  seg.addEventListener('click', (e) => {
    const btn = e.target.closest('button')
    if (!btn) return
    seg.querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn))
    onPick(btn.dataset.v)
  })
}
bindSeg('segTheme', v => { document.documentElement.dataset.theme = v === 'dark' ? 'dark' : '' })
bindSeg('segCount', v => { fileCount = Number(v); renderAll() })

/* 跟随系统初始明暗（app 默认行为一致），Tweaks 可覆盖 */
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.dataset.theme = 'dark'
  document.querySelectorAll('#segTheme button').forEach(b =>
    b.classList.toggle('on', b.dataset.v === 'dark'))
}

renderAll()
</script>
