<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成中 · 全卡背景柔光（ChatGPT 风中性灰白）</title>
<style>
  :root {
    --ink: #1a1a18; --ink-soft: #5f5f5b; --ink-mute: #9b9b96;
    --border: #ececeb; --radius: 16px;
    font-family: -apple-system, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
    letter-spacing: -0.01em; -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f0ef; color: var(--ink); min-height: 100vh; padding: 48px 32px 80px; }
  .head { text-align: center; margin-bottom: 8px; }
  .head h1 { font-size: 21px; font-weight: 700; }
  .head p { margin-top: 6px; font-size: 13px; color: var(--ink-mute); }

  .grid { margin: 36px auto 0; max-width: 1000px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; max-width: 460px; } }
  .variant { display: flex; flex-direction: column; gap: 14px; }
  .vlabel { display: flex; align-items: baseline; gap: 8px; padding-left: 4px; }
  .vlabel b { font-size: 14.5px; font-weight: 600; }
  .vlabel span { font-size: 12px; color: var(--ink-mute); }

  .panel {
    position: relative; background: #fff; border-radius: var(--radius);
    height: 540px; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(0,0,0,.05);
  }

  /* The card-wide soft-light layer — sits ABOVE the white card bg but BELOW
     content (z between). pointer-events-none. Greyscale only. */
  .softlight {
    position: absolute; inset: 0; border-radius: var(--radius);
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  /* content above the light */
  .panel-body, .bar { position: relative; z-index: 1; }

  .panel-body { flex: 1; overflow-y: auto; padding: 28px 28px 8px; }
  .panel h2 { font-size: 20px; font-weight: 700; }
  .panel .sub { margin-top: 4px; font-size: 13px; color: var(--ink-mute); }
  .q-num { margin-top: 26px; font-size: 13px; color: var(--ink-mute); }
  .q-title { margin-top: 4px; font-size: 17px; font-weight: 700; }
  .q-desc { margin-top: 4px; font-size: 14px; color: var(--ink-soft); }
  .q-kind { margin-top: 10px; font-size: 12.5px; color: var(--ink-mute); }
  .options { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; border: 1px solid var(--border); border-radius: 14px; padding: 13px 16px; background: rgba(255,255,255,.5); }
  .opt .dot { margin-top: 2px; width: 16px; height: 16px; border-radius: 999px; border: 1.5px solid var(--ink-mute); flex: none; }
  .opt .o-label { font-size: 14px; font-weight: 600; }
  .opt .o-desc { margin-top: 2px; font-size: 13px; color: var(--ink-soft); }
  .other { border: 1px solid var(--border); border-radius: 14px; padding: 13px 16px; font-size: 14px; color: var(--ink-mute); background: rgba(255,255,255,.5); }
  .bar { flex: none; display: flex; align-items: center; gap: 14px; border-top: 1px solid var(--border); padding: 16px 28px; }
  .btn-submit { background: var(--ink); color: #fff; border: none; border-radius: 999px; padding: 9px 20px; font-size: 13px; font-weight: 500; opacity: .45; cursor: default; }
  .bar .ai { font-size: 13px; color: var(--ink-mute); }
  .bar .gen { font-size: 12.5px; color: var(--ink-mute); display: inline-flex; align-items: center; gap: 7px; }
  .gen .pip { width: 7px; height: 7px; border-radius: 2px; background: var(--ink); }

  /* ── Soft-light blobs (greyscale). Two flavours, A subtler than B. ──── */
  .blob { position: absolute; border-radius: 999px; }

  /* A — 极淡，慢，几乎只在边缘游 */
  .vA .blob { width: 80%; aspect-ratio: 1; filter: blur(60px); }
  .vA .b1 { background: rgba(0,0,0,.045); }
  .vA .b2 { background: rgba(120,120,130,.05); }
  .vA .b3 { background: rgba(255,255,255,.6); mix-blend-mode: overlay; }

  /* B — 稍明显，光斑更亮一点，流动更大 */
  .vB .blob { width: 90%; aspect-ratio: 1; filter: blur(55px); }
  .vB .b1 { background: rgba(0,0,0,.06); }
  .vB .b2 { background: rgba(110,115,130,.07); }
  .vB .b3 { background: rgba(255,255,255,.75); mix-blend-mode: overlay; }
</style>
</head>
<body>
  <div class="head">
    <h1>生成中 · 全卡背景柔光（ChatGPT 风 · 中性灰白 · 无彩色）</h1>
    <p>柔光在整张卡片内部缓慢游走 + 呼吸，文字照常清晰。选 A（极淡）或 B（稍明显）。</p>
  </div>

  <div class="grid" id="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.js"></script>
<script>
  const { animate } = window.Motion;

  function panelHTML(cls) {
    return `
      <div class="panel ${cls}">
        <div class="softlight">
          <div class="blob b1"></div>
          <div class="blob b2"></div>
          <div class="blob b3"></div>
        </div>
        <div class="panel-body">
          <h2>请回答以下问题</h2>
          <div class="sub">问题</div>
          <div class="q-num">01</div>
          <div class="q-title">画布</div>
          <div class="q-desc">画布格式?</div>
          <div class="q-kind">单选</div>
          <div class="options">
            <div class="opt"><span class="dot"></span><span><span class="o-label">PPT 16:9</span><span class="o-desc">标准宽屏演示 1280x720，项目介绍首选。</span></span></div>
            <div class="opt"><span class="dot"></span><span><span class="o-label">PPT 4:3</span><span class="o-desc">传统投影比例 1024x768。</span></span></div>
            <div class="opt"><span class="dot"></span><span><span class="o-label">小红书 3:4</span><span class="o-desc">竖版社交卡片，适合手机。</span></span></div>
            <div class="other">其他（请填写）</div>
          </div>
        </div>
        <div class="bar">
          <button class="btn-submit">提交答案</button>
          <span class="ai">AI 自行决定</span>
          <span class="gen"><span class="pip"></span>AI 正在生成问题…</span>
        </div>
      </div>`;
  }

  document.getElementById('grid').innerHTML = `
    <div class="variant vA">
      <div class="vlabel"><b>A · 极淡柔光</b><span>几乎只觉气韵在动</span></div>
      ${panelHTML('vA')}
    </div>
    <div class="variant vB">
      <div class="vlabel"><b>B · 稍明显</b><span>光斑游走更可见</span></div>
      ${panelHTML('vB')}
    </div>`;

  // Drift each blob slowly on its own loop, plus a gentle whole-card breathe.
  // (Independent transforms x/y/scale → physics-friendly, interruptible.)
  function driftBlob(el, path, dur) {
    animate(el, path, { duration: dur, ease: "easeInOut", repeat: Infinity, repeatType: "mirror" });
  }
  document.querySelectorAll(".panel").forEach((panel) => {
    const [b1, b2, b3] = panel.querySelectorAll(".blob");
    // Positions in % of the card; blobs wander across it slowly.
    driftBlob(b1, { left: ["-20%", "30%", "-10%"], top: ["-15%", "50%", "70%"] }, 13);
    driftBlob(b2, { left: ["60%", "20%", "70%"], top: ["70%", "10%", "60%"] }, 16);
    driftBlob(b3, { left: ["40%", "-10%", "55%"], top: ["-10%", "60%", "20%"] }, 11);
    // Whole-card soft breathe via the softlight layer opacity.
    const light = panel.querySelector(".softlight");
    animate(light, { opacity: [0.7, 1, 0.7] }, { duration: 3.2, ease: "easeInOut", repeat: Infinity });

    // ── THE CARD ITSELF moves — a barely-there breathe (scale) + float (y),
    // so the whole panel feels "alive" while generating, not just its inner
    // light. Independent transforms (scale/y) so they compose & stay smooth.
    // Kept tiny (≤0.6% scale, ≤4px float) — at this size it reads as a living
    // pulse, not a wobble. Slightly different periods so they don't lock-step.
    animate(panel, { scale: [1, 1.006, 1] }, { duration: 3.6, ease: "easeInOut", repeat: Infinity });
    animate(panel, { y: [0, -4, 0] }, { duration: 4.4, ease: "easeInOut", repeat: Infinity });
  });

  document.querySelectorAll(".pip").forEach((pip) => {
    animate(pip, { opacity: [0.25, 1, 0.25] }, { duration: 1.3, ease: "easeInOut", repeat: Infinity });
  });
</script>
</body>
</html>
