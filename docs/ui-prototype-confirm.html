<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>确认设计方案 · UI 原型</title>
<!--
  Confirm page (Eight-Confirmations) UI prototype.
  A faithful, self-contained reproduction of the real CanvasConfirm component
  (apps/desktop/src/renderer/src/components/chat/CanvasConfirm.tsx) — design
  tokens, layout, and the two-tier flow are lifted from that source, not guessed.
  The 「视觉风格」picker shows the real generated preview thumbnails inlined as
  data-URIs; every other enum field stays as text chips, exactly as in the app.
  Tweaks (bottom-right) toggles tier / language / dark mode.
-->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  /* ---- design tokens, extracted from the real component's Tailwind classes ---- */
  :root {
    --bg: #ffffff;
    --fg: #1c2024;
    --muted: #6b7280;
    --border: #e6e8eb;
    --border-soft: rgba(230, 232, 235, 0.5);
    --card: rgba(252, 252, 253, 0.6);
    --input-bg: #ffffff;
    --accent: #16a34a;          /* emerald-600 — the real app's accent */
    --accent-fg: #ffffff;
    --accent-soft: rgba(22, 163, 74, 0.12);
    --accent-faint: rgba(22, 163, 74, 0.08);
    --accent-ring: rgba(22, 163, 74, 0.55);
    --amber-fg: #b45309;
    --amber-bg: rgba(251, 191, 36, 0.2);
    --shadow-bar: inset 0 1px 0 rgba(0, 0, 0, 0.06);
    --radius: 8px;
    color-scheme: light;
  }
  .dark {
    --bg: #16181c;
    --fg: #ebedf0;
    --muted: #9aa1ab;
    --border: #2a2d33;
    --border-soft: rgba(42, 45, 51, 0.6);
    --card: rgba(255, 255, 255, 0.03);
    --input-bg: #1c1f24;
    --accent: #22c55e;
    --accent-fg: #06210f;
    --accent-soft: rgba(34, 197, 94, 0.16);
    --accent-faint: rgba(34, 197, 94, 0.10);
    --accent-ring: rgba(34, 197, 94, 0.6);
    --amber-fg: #fbbf24;
    --shadow-bar: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in oklch, var(--accent) 6%, transparent), transparent 60%),
      var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
                 "Segoe UI", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px 96px;
    text-wrap: pretty;
  }
  /* The app panel: a fixed-width canvas-tab pane, like the right canvas in-app. */
  #app {
    width: 100%;
    max-width: 920px;
    min-height: calc(100vh - 128px);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 40px -16px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; border: 3px solid var(--bg); }
  .scroll { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  /* ---- Tweaks panel ---- */
  #tweaks-toggle {
    position: fixed; right: 20px; bottom: 20px; z-index: 50;
    height: 40px; padding: 0 16px; border-radius: 999px;
    background: var(--fg); color: var(--bg); border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; letter-spacing: 0.2px;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4);
    transition: transform .15s ease, opacity .15s ease;
  }
  #tweaks-toggle:hover { transform: translateY(-1px); }
  #tweaks {
    position: fixed; right: 20px; bottom: 72px; z-index: 50;
    width: 240px; padding: 16px; border-radius: 14px;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border);
    box-shadow: 0 20px 50px -16px rgba(0,0,0,0.4);
    display: none;
  }
  #tweaks.open { display: block; }
  #tweaks h4 { margin: 0 0 12px; font-size: 13px; font-weight: 700; }
  .tw-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 12px; }
  .tw-row .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tw-row .seg button {
    border: none; background: transparent; color: var(--muted);
    font-size: 12px; padding: 5px 10px; cursor: pointer;
  }
  .tw-row .seg button.on { background: var(--accent); color: var(--accent-fg); }
</style>
</head>
<body>
  <div id="app"></div>
  <button id="tweaks-toggle">Tweaks</button>
  <div id="tweaks">
    <h4>Tweaks</h4>
    <div class="tw-row"><span>层级</span>
      <span class="seg" data-group="tier">
        <button data-val="1">Tier 1 · 锚点</button>
        <button data-val="2" class="on">Tier 2 · 实现</button>
      </span>
    </div>
    <div class="tw-row"><span>语言</span>
      <span class="seg" data-group="lang">
        <button data-val="zh" class="on">中</button>
        <button data-val="en">EN</button>
      </span>
    </div>
    <div class="tw-row"><span>主题</span>
      <span class="seg" data-group="theme">
        <button data-val="light" class="on">浅</button>
        <button data-val="dark">深</button>
      </span>
    </div>
  </div>

/* ---- bilingual helpers (mirror of canvasConfirm.helpers.localized) ---- */
function loc(obj, base, lang) {
  if (!obj) return '';
  const k = base + '_' + lang;
  if (obj[k] != null) return obj[k];
  if (obj[base] != null) return obj[base];
  return obj[base + '_' + (lang === 'zh' ? 'en' : 'zh')] || '';
}
const optLabel = (o, lang) => loc(o, 'label', lang) || o.id;
const optDesc  = (o, lang) => loc(o, 'desc', lang);
const grpLabel = (g, lang) => loc(g, 'group', lang);

/* ====================== shared UI atoms ====================== */
function Section({ num, title, note, children }) {
  return (
    <div style={{ borderBottom: '1px solid var(--border-soft)', padding: '20px 0' }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:14 }}>
        <span style={{ display:'inline-flex', width:20, height:20, flex:'0 0 auto', alignItems:'center',
          justifyContent:'center', borderRadius:999, background:'var(--accent-soft)', color:'var(--accent)',
          fontSize:11, fontWeight:600 }}>{num}</span>
        <span style={{ fontSize:14, fontWeight:600 }}>{title}</span>
        {note && <span style={{ fontSize:11, color:'var(--muted)' }}>{note}</span>}
      </div>
      {children}
    </div>
  );
}
function SubLabel({ children }) {
  return <div style={{ marginBottom:6, fontSize:12, fontWeight:500, color:'var(--muted)' }}>{children}</div>;
}
function SubField({ label, children }) {
  return <div style={{ marginTop:14 }}><SubLabel>{label}</SubLabel>{children}</div>;
}

/* ---- canvas-format image cards (frame uses the real dim aspect ratio) ---- */
function CanvasField({ list, recommendedId, value, onChange, allowCustom, lang, t }) {
  const ratioOf = (dim) => {
    const m = String(dim||'').match(/(\d{2,5})\s*[×xX*]\s*(\d{2,5})/);
    return m ? (parseInt(m[1],10) + ' / ' + parseInt(m[2],10)) : '16 / 10';
  };
  // Uniform grid for order; a proportional "sheet" centered on each card's
  // stage keeps the shape = canvas cue. The sheet sizes by its real aspect
  // ratio under both a max-width (100%) and a max-height (the stage), so wide
  // formats fill width and stay short, tall formats grow within the stage.
  const STAGE_H = 112;
  const card = (o) => {
    const selected = o.id === value;
    const rec = o.id === recommendedId;
    const src = CANVAS_PREVIEWS[o.id];
    return (
      <button key={o.id} onClick={()=>onChange(o.id)} title={loc(o,'use',lang)} style={{
        display:'flex', flexDirection:'column', overflow:'hidden', textAlign:'left', cursor:'pointer',
        borderRadius:12, padding:0, background:'transparent',
        border:'1px solid ' + (selected ? 'var(--accent)' : 'var(--border)'),
        boxShadow: selected ? '0 0 0 1px var(--accent-ring)' : 'none', transition:'border-color .15s',
      }}>
        {/* stage: fixed-height tray, the sheet floats centered inside it */}
        <div style={{ position:'relative', height:STAGE_H, display:'flex', alignItems:'center',
          justifyContent:'center', padding:12,
          background: selected ? 'var(--accent-faint)' : 'var(--card)',
          backgroundImage:'radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0)',
          backgroundSize:'10px 10px' }}>
          <div style={{ aspectRatio:ratioOf(o.dim), maxWidth:'100%', maxHeight:STAGE_H-24,
            height: STAGE_H-24, borderRadius:4, overflow:'hidden',
            border:'1px solid var(--border)', background:'#fff',
            boxShadow:'0 2px 6px -2px rgba(0,0,0,0.25)' }}>
            {src
              ? <img src={src} alt={optLabel(o,lang)} loading="lazy" draggable="false"
                  style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
              : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center',
                  justifyContent:'center', fontSize:10, color:'var(--muted)' }}>{o.dim}</div>}
          </div>
          {rec && <span style={{ position:'absolute', left:8, top:8, borderRadius:999, padding:'2px 6px',
            fontSize:10, fontWeight:500, background:'rgba(251,191,36,0.92)', color:'#3b2c05',
            boxShadow:'0 1px 2px rgba(0,0,0,.2)' }}>★ {t.recommended}</span>}
        </div>
        {/* info row, identical height across all cards */}
        <div style={{ display:'flex', flexDirection:'column', gap:1, padding:'8px 10px',
          borderTop:'1px solid var(--border-soft)',
          background: selected ? 'var(--accent-faint)' : 'transparent' }}>
          <span style={{ fontSize:12, fontWeight:500, color: selected ? 'var(--accent)' : 'var(--fg)' }}>{optLabel(o,lang)}</span>
          {o.dim && <span style={{ fontSize:10.5, color:'var(--muted)' }}>{o.dim}</span>}
        </div>
      </button>
    );
  };
  const customCard = () => (
    <button key="__c__" style={{ display:'flex', flexDirection:'column', alignItems:'center',
      justifyContent:'center', gap:4, borderRadius:12, border:'2px dashed var(--border)',
      background:'var(--card)', color:'var(--muted)', fontSize:12, fontWeight:500, cursor:'pointer',
      padding:12 }}>
      {t.custom}
    </button>
  );
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(4, minmax(0,1fr))', gap:10 }}>
      {(list||[]).map(card)}
      {allowCustom && customCard()}
    </div>
  );
}

/* ---- enum chips (canvas / mode / icons / …) ---- */
function EnumField({ list, recommendedId, value, onChange, allowCustom, lang, t }) {
  const flat = useMemo(() => {
    if (!list || !list.length) return [];
    return list[0].items ? list.reduce((a,g)=>a.concat(g.items||[]),[]) : list;
  }, [list]);
  const grouped = !!(list && list[0] && list[0].items);

  const chip = (o) => {
    let label = optLabel(o, lang);
    if (o.dim) label += ' · ' + o.dim;
    const desc = optDesc(o, lang);
    if (desc) label += (lang==='zh'?'：':' — ') + desc;
    const selected = o.id === value;
    const rec = o.id === recommendedId;
    return (
      <button key={o.id} onClick={()=>onChange(o.id)} style={{
        display:'inline-flex', alignItems:'center', gap:6, textAlign:'left',
        border:'1px solid ' + (selected ? 'var(--accent)' : 'var(--border)'),
        background: selected ? 'var(--accent-soft)' : 'var(--card)',
        color: selected ? 'var(--accent)' : 'var(--fg)',
        borderRadius:8, padding:'7px 10px', fontSize:12, cursor:'pointer',
        transition:'background .15s, border-color .15s', lineHeight:1.4,
      }}>
        <span>{label}</span>
        {rec && <span style={badgeStyle}>★ {t.recommended}</span>}
      </button>
    );
  };
  const customChip = () => (
    <button key="__c__" style={{
      display:'inline-flex', alignItems:'center', gap:6,
      border:'1px solid var(--border)', background:'var(--card)', color:'var(--fg)',
      borderRadius:8, padding:'7px 10px', fontSize:12, cursor:'pointer' }}>
      {t.custom}
    </button>
  );

  if (grouped) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        {list.map((g,gi)=>(
          <div key={gi} style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {grpLabel(g,lang) && <div style={{ fontSize:11, fontWeight:500, color:'var(--muted)' }}>{grpLabel(g,lang)}</div>}
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>{(g.items||[]).map(chip)}</div>
          </div>
        ))}
        {allowCustom && <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>{customChip()}</div>}
      </div>
    );
  }
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
      {flat.map(chip)}
      {allowCustom && customChip()}
    </div>
  );
}
const badgeStyle = {
  flex:'0 0 auto', borderRadius:999, background:'var(--amber-bg)', color:'var(--amber-fg)',
  padding:'2px 6px', fontSize:10, fontWeight:500, whiteSpace:'nowrap',
};

/* ---- text input ---- */
function TextField({ value, onChange, placeholder }) {

}

          {rec && <span style={{ position:'absolute', left:6, top:6, borderRadius:999, padding:'2px 6px',

        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:2, padding:'6px 8px',

      gap:4, aspectRatio:'16/10', borderRadius:10, border:'2px dashed var(--border)', background:'var(--card)',
      color:'var(--muted)', fontSize:12, fontWeight:500, cursor:'pointer', textAlign:'center', padding:12 }}>

    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>

          <div style={grid}>{(g.items||[]).map(card)}</div>

/* ---- sticky StylePreview strip (ported from app.js renderStylePreview) ----
   A pinned bar at the top of Tier 2 that synthesizes the LIVE color + typography
   choice into one "overall impression" card, so the user sees the combined feel
   while scrolling color / icon / typography. Mirrors the original confirm_ui
   app.js: card bg = selected background, heading in heading font + primary at
   1.7x, body in body font + body_text, accent bar = accent, right chip = 2nd-bg
   tile with a 2nd-accent dot. "rough feel only" caveat stays in the UI font. */
function StylePreview({ colorName, typoName, lang, t }) {
  const PAL_FALLBACK = { background:'#ffffff', secondary_bg:'#f3f4f6', primary:'#1a3a6b',
    accent:'#1a3a6b', secondary_accent:'#1a3a6b', body_text:'#1d2430' };
  const c = COLOR_CANDS.find(x => loc(x,'name',lang) === colorName);
  const pal = (c && c.palette) ? c.palette : PAL_FALLBACK;
  const ty = TYPO_CANDS.find(x => loc(x,'name',lang) === typoName);
  const headStyle = (ty && ty.headStyle) || { fontWeight:700 };
  const bodyStyle = (ty && ty.bodyStyle) || {};
  const hex = (v, fb) => (v && /^#?[0-9a-fA-F]{3,6}$/.test(String(v))) ? v : fb;
  const bg   = hex(pal.background, '#ffffff');
  const sbg  = hex(pal.secondary_bg, bg);
  const pri  = hex(pal.primary, '#1a3a6b');
  const acc  = hex(pal.accent, pri);
  const sacc = hex(pal.secondary_accent, acc);
  const txt  = hex(pal.body_text, '#1d2430');
  const bodyPx = 18;

  return (
    <div style={{ position:'sticky', top:0, zIndex:5, background:'var(--bg)', padding:'10px 0 12px' }}>
      <div style={{ display:'flex', flexWrap:'wrap', alignItems:'baseline', gap:8, marginBottom:6 }}>
        <span style={{ fontSize:12.5, fontWeight:600, color:'var(--muted)' }}>{t.style_preview_label}</span>
        <span style={{ fontSize:11.5, color:'var(--muted)' }}>{t.style_preview_body}</span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:16, overflow:'hidden',
        border:'1px solid var(--border)', borderRadius:10, padding:'14px 18px',
        boxShadow:'0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -16px rgba(0,0,0,0.25)', background:bg }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontWeight:700, lineHeight:1.25, whiteSpace:'nowrap', overflow:'hidden',
            textOverflow:'ellipsis', color:pri, fontSize:Math.round(bodyPx*1.7) }}>
            <span style={headStyle}>{t.sample_cjk}</span>
            <span style={{ ...headStyle, marginLeft:10, opacity:0.92 }}>{t.sample_latin}</span>
          </div>
          <div style={{ display:'flex', alignItems:'stretch', gap:10, marginTop:6 }}>
            <span style={{ flex:'0 0 4px', borderRadius:2, background:acc }} />
            <div style={{ flex:1, minWidth:0, lineHeight:1.5, whiteSpace:'nowrap', overflow:'hidden',
              textOverflow:'ellipsis', color:txt, fontSize:bodyPx }}>
              <span style={bodyStyle}>{t.sample_cjk}</span>
              <span style={{ ...bodyStyle, marginLeft:10, opacity:0.92 }}>{t.sample_latin}</span>
            </div>
          </div>
        </div>
        <div style={{ flex:'none', display:'inline-flex', alignItems:'center', gap:8, padding:'7px 12px',
          borderRadius:8, border:'1px solid rgba(0,0,0,0.06)', background:sbg }}>
          <span style={{ width:12, height:12, borderRadius:'50%', background:sacc }} />
          <span style={{ fontSize:12.5, color:txt }}>{t.role_secondary_bg}</span>
        </div>
      </div>
    </div>
  );
}

/* ====================== root ====================== */
function App({ tier, lang, theme }) {
  const t = MSG[lang];
  const recOf = (list) => (list && list[0] && (list[0].items ? list[0].items[0].id : list[0].id));

  const [s, setS] = useState({
    canvas:'ppt169', audience:'', divergence:'', mode:'pyramid',
    visual_style:'memphis', delivery_purpose:'balanced',
    page_count:'', color:'方案 1', icons:'geometric-filled',
    typography:'方案 1', image_usage:'none', generation_mode:'continuous',
  });
  const set = (p)=>setS(v=>({ ...v, ...p }));

  const showT1 = tier === 1;
  const showT2 = tier === 2;
  let n = 0; const next = () => (++n);

  return (
    <React.Fragment>
      {/* topbar */}
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12,
        padding:'20px 24px 12px' }}>
        <div>
          <h2 style={{ margin:0, fontSize:18, fontWeight:700 }}>{t.page_title}</h2>
          <p style={{ margin:'6px 0 0', fontSize:12, color:'var(--muted)' }}>{t.topbar_hint}</p>
        </div>
        <span style={{ flex:'0 0 auto', borderRadius:6, border:'1px solid var(--border)', background:'var(--card)',
          padding:'5px 10px', fontSize:12, fontWeight:500 }}>{lang==='zh'?'EN':'中'}</span>
      </div>

      {/* scroll body */}
      <div className="scroll" style={{ flex:'1 1 auto', minHeight:0, overflowY:'auto', padding:'0 24px 16px' }}>
        {showT1 && <React.Fragment>
          <Section num={next()} title={t.sec_canvas}>
            <CanvasField list={CAT.canvas} recommendedId="ppt169" value={s.canvas}
              onChange={v=>set({canvas:v})} allowCustom lang={lang} t={t} />
          </Section>
          <Section num={next()} title={t.sec_audience}>
            <TextField value={s.audience} onChange={v=>set({audience:v})} placeholder={t.placeholder_audience} />
            <SubField label={t.sub_divergence}>
              <TextField value={s.divergence} onChange={v=>set({divergence:v})} placeholder={t.placeholder_divergence} />
            </SubField>
            <SubField label={t.delivery_purpose}>
              <EnumField list={CAT.delivery_purpose} recommendedId={recOf(CAT.delivery_purpose)}
                value={s.delivery_purpose} onChange={v=>set({delivery_purpose:v})} lang={lang} t={t} />
            </SubField>
          </Section>
          <Section num={next()} title={t.sec_style}>
            <SubLabel>{t.sub_mode}</SubLabel>
            <EnumField list={CAT.modes} recommendedId={recOf(CAT.modes)} value={s.mode}
              onChange={v=>set({mode:v})} allowCustom lang={lang} t={t} />
            <SubField label={t.sub_visual}>
              <VisualStyleField list={CAT.visual_styles} recommendedId="memphis"
                value={s.visual_style} onChange={v=>set({visual_style:v})} lang={lang} t={t} />
            </SubField>
          </Section>
        </React.Fragment>}

        {showT2 && <React.Fragment>
          <StylePreview colorName={s.color} typoName={s.typography} lang={lang} t={t} />
          <Section num={next()} title={t.sec_pages}>
            <TextField value={s.page_count} onChange={v=>set({page_count:v})} placeholder={t.placeholder_pages} />
          </Section>
          <Section num={next()} title={t.sec_color}>
            <ColorField cands={COLOR_CANDS} value={s.color} onChange={v=>set({color:v})} lang={lang} t={t} />
          </Section>
          <Section num={next()} title={t.sec_icons}>
            <EnumField list={CAT.icons} recommendedId={recOf(CAT.icons)} value={s.icons}
              onChange={v=>set({icons:v})} allowCustom lang={lang} t={t} />
          </Section>
          <Section num={next()} title={t.sec_type}>
            <TypographyField cands={TYPO_CANDS} value={s.typography} onChange={v=>set({typography:v})} lang={lang} t={t} />
          </Section>
          <Section num={next()} title={t.sec_images}>
            <EnumField list={CAT.image_usage} recommendedId={recOf(CAT.image_usage)} value={s.image_usage}
              onChange={v=>set({image_usage:v})} allowCustom lang={lang} t={t} />
          </Section>
          <Section num={next()} title={t.sec_mode} note={t.mode_continuous_desc}>
            <EnumField list={CAT.generation_mode} recommendedId={recOf(CAT.generation_mode)}
              value={s.generation_mode} onChange={v=>set({generation_mode:v})} lang={lang} t={t} />
          </Section>
        </React.Fragment>}
      </div>

      {/* action bar */}
      <div style={{ flex:'0 0 auto', display:'flex', alignItems:'center', justifyContent:'flex-end', gap:12,
        padding:'12px 24px', boxShadow:'var(--shadow-bar)' }}>
        <button style={{ borderRadius:6, border:'none', cursor:'pointer',
          background:'var(--accent)', color:'var(--accent-fg)', padding:'8px 18px',
          fontSize:13, fontWeight:600 }}>{tier===1 ? t.btn_next : t.btn_confirm}</button>
      </div>
    </React.Fragment>
  );
}

/* ====================== mount + Tweaks wiring ====================== */
const state = { tier: 2, lang: 'zh', theme: 'light' };
const root = ReactDOM.createRoot(document.getElementById('app'));
function render() {
  document.documentElement.classList.toggle('dark', state.theme === 'dark');
  root.render(<App tier={state.tier} lang={state.lang} theme={state.theme} />);
}
render();

document.getElementById('tweaks-toggle').addEventListener('click', () => {
  document.getElementById('tweaks').classList.toggle('open');
});
document.querySelectorAll('#tweaks .seg').forEach(seg => {
  const group = seg.dataset.group;
  seg.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      const v = btn.dataset.val;
      state[group] = group === 'tier' ? parseInt(v, 10) : v;
      render();
    });
  });
});
  </script>
</body>
</html>
