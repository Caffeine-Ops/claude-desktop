name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FUSION_CODE_VERSION: v2.1.90

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            fusion_asset: fusion-code-darwin-arm64
            fusion_target: apps/desktop/fusion-bin/fusion-code-cli
          - os: windows-latest
            platform: win
            fusion_asset: fusion-code-win32-x64.exe
            fusion_target: apps/desktop/fusion-bin/fusion-code-cli.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write env.json from secret
        shell: bash
        env:
          ENV_JSON: ${{ secrets.ENV_JSON }}
        run: |
          if [ -z "$ENV_JSON" ]; then
            echo "::error::ENV_JSON secret is empty. Configure it in Settings → Secrets → Actions."
            exit 1
          fi
          printf '%s' "$ENV_JSON" > env.json
          python -c "import json; json.load(open('env.json'))" \
            || { echo "::error::env.json is not valid JSON"; exit 1; }

      - name: Download fusion-code CLI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The desktop package (verify:fusion + electron-builder
          # extraResources) resolves fusion-bin/ relative to apps/desktop,
          # so the CLI must land there — NOT in the repo root. (Pre-monorepo
          # the app WAS the repo root; the path didn't move in this workflow.)
          mkdir -p apps/desktop/fusion-bin
          gh release download "$FUSION_CODE_VERSION" \
            --repo Caffeine-Ops/fusion-code-install \
            --pattern "${{ matrix.fusion_asset }}" \
            --dir apps/desktop/fusion-bin
          mv "apps/desktop/fusion-bin/${{ matrix.fusion_asset }}" "${{ matrix.fusion_target }}"
          if [ "${{ matrix.platform }}" != "win" ]; then
            chmod +x "${{ matrix.fusion_target }}"
          fi
          ls -la apps/desktop/fusion-bin/

      # Only typecheck the package this workflow actually ships: the
      # Electron app. Its tsconfig project-references pull in every
      # @open-design/* package it depends on, so their types get checked
      # transitively. We deliberately do NOT run the repo-wide
      # `bun run typecheck` here: it fans out to ALL workspaces including
      # @open-design/daemon, whose own `typecheck` script shells out to
      # `pnpm` — and this runner only has bun (oven-sh/setup-bun), so
      # daemon's step dies with `pnpm: command not found` (exit 127).
      # The daemon is a standalone service, not part of the desktop
      # bundle, so it has no business gating the desktop build.
      - name: Type check
        run: bun run --filter='@claude-desktop/desktop' typecheck

      # Use `dist:<platform>`, NOT `build:<platform>`. The desktop
      # `build:*` chain assumes apps/daemon/dist/cli.js and apps/web/out
      # already exist (its prebundle:daemon step only COPIES them) — true
      # locally where they linger from a previous build, but a clean CI
      # checkout has neither. `dist:*` runs `prebuild:resources` first to
      # build the daemon (tsc) and the web static export. The library
      # packages daemon/web import from `dist/` are already built by the
      # root postinstall (runs during `bun install`), so we don't repeat
      # them here.
      - name: Build (${{ matrix.platform }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run dist:${{ matrix.platform }}

      # Upload the installers straight to the GitHub Release instead of
      # staging them as Actions artifacts. Why: artifacts count against the
      # account's Actions storage quota (which we hit — a ~hundreds-of-MB
      # dmg + the win exe per run fills it fast), AND they were only ever a
      # hand-off to a separate release job that re-downloaded them. Release
      # assets don't count against that quota, so attaching directly here
      # removes both the quota failure and the artifact→download→release
      # round-trip. electron-builder writes to apps/desktop/dist/ (its
      # build.directories.output is relative to the package, not the repo
      # root). Both matrix jobs target the same tag; action-gh-release is
      # idempotent per tag — the first creates the release, the second
      # appends its files — so mac and win can publish in parallel.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.blockmap
            apps/desktop/dist/latest*.yml
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
