name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FUSION_CODE_VERSION: v2.1.90
  # Node version bundled INTO the app to run the daemon. Must match .nvmrc
  # (the version better-sqlite3 is compiled for, ABI 137) — see the
  # "Bundle Node runtime" step.
  BUNDLED_NODE_VERSION: v24.16.0
  # Standalone Python bundled INTO the app for the ppt-master skill (a Python
  # skill with native-extension deps: PyMuPDF/Pillow/numpy). python-build-
  # standalone (astral, what uv uses) ships relocatable, install_only tarballs.
  # PINNED to 3.12 deliberately: it has mature cp312 wheels for every dep, so
  # the per-user `pip install` hits prebuilt wheels instead of source-compiling
  # (the py3.14 hang — see the project's error log). The release tag is a date;
  # bump both together. Verified 20260510 carries 3.12.13 for BOTH mac-arm64
  # and win-x64 install_only.
  PYTHON_STANDALONE_TAG: '20260510'
  PYTHON_STANDALONE_VERSION: '3.12.13'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            fusion_asset: fusion-code-darwin-arm64
            fusion_target: apps/studio/fusion-bin/fusion-code-cli
            node_dist: darwin-arm64
            python_dist: aarch64-apple-darwin
          - os: windows-latest
            platform: win
            fusion_asset: fusion-code-win32-x64.exe
            fusion_target: apps/studio/fusion-bin/fusion-code-cli.exe
            node_dist: win-x64
            python_dist: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Pin Node to the version the daemon RUNS under (.nvmrc → 24, ABI 137).
      # Without this the runner uses the Node that ships with setup-bun (22,
      # ABI 127); `bun install` then compiles daemon's better-sqlite3 native
      # addon for ABI 127, prebundle copies that .node into the app, and at
      # runtime the daemon (spawned with Node 24) fails to dlopen it:
      #   "compiled against NODE_MODULE_VERSION 127 … requires 137"
      #   → ERR_DLOPEN_FAILED → daemon dies → settings/web /api all break.
      # Install-time Node MUST equal run-time Node for native addons.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Fail fast if the native addon's ABI doesn't match the daemon's
      # runtime Node (24 / ABI 137). The whole point of the Setup Node step
      # above is to make `bun install` compile better-sqlite3 for 137 — this
      # asserts it actually happened, so a mis-pinned runner can never ship a
      # package whose daemon dies with ERR_DLOPEN_FAILED at the user's machine.
      - name: Verify better-sqlite3 ABI matches daemon runtime
        run: |
          node -e "
            const { createRequire } = require('node:module');
            const req = createRequire(require('node:path').resolve('apps/daemon/package.json'));
            req('better-sqlite3');
            const abi = process.versions.modules;
            console.log('node ' + process.version + ' — better-sqlite3 ABI ' + abi);
            if (abi !== '137') {
              console.error('::error::better-sqlite3 ABI is ' + abi + ', expected 137 (Node 24). Daemon will fail to dlopen at runtime.');
              process.exit(1);
            }
          "

      - name: Write env.json from secret
        shell: bash
        env:
          ENV_JSON: ${{ secrets.ENV_JSON }}
        run: |
          if [ -z "$ENV_JSON" ]; then
            echo "::error::ENV_JSON secret is empty. Configure it in Settings → Secrets → Actions."
            exit 1
          fi
          # MUST write to apps/studio/env.json, NOT the repo root. Two reasons:
          #   1. electron-builder's `files: ["env.json"]` is relative to the
          #      package dir (apps/studio), so a repo-root env.json never gets
          #      packed into the asar → loadEnv finds nothing in prod → every
          #      env.json-backed feature (gpt-image-2 OPENAI_API_KEY, fusion-code
          #      ANTHROPIC_* gateway) silently degrades.
          #   2. loadEnv's packaged candidate is <asar>/env.json, fed by exactly
          #      this packed copy.
          # The monorepo move left this writing to the old repo-root location;
          # see [[2026-05-25-monorepo打包CI逐层路径未从根迁到appsdesktop]].
          printf '%s' "$ENV_JSON" > apps/studio/env.json
          python -c "import json; json.load(open('apps/studio/env.json'))" \
            || { echo "::error::env.json is not valid JSON"; exit 1; }

      - name: Download fusion-code CLI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The desktop package (verify:fusion + electron-builder
          # extraResources) resolves fusion-bin/ relative to apps/studio,
          # so the CLI must land there — NOT in the repo root. (Pre-monorepo
          # the app WAS the repo root; the path didn't move in this workflow.)
          set -euo pipefail
          mkdir -p apps/studio/fusion-bin
          gh release download "$FUSION_CODE_VERSION" \
            --repo Caffeine-Ops/fusion-code-install \
            --pattern "${{ matrix.fusion_asset }}" \
            --dir apps/studio/fusion-bin
          mv "apps/studio/fusion-bin/${{ matrix.fusion_asset }}" "${{ matrix.fusion_target }}"
          if [ "${{ matrix.platform }}" != "win" ]; then
            chmod +x "${{ matrix.fusion_target }}"
          fi
          ls -la apps/studio/fusion-bin/

          # Integrity gate, RIGHT HERE next to the download — do not wait for the
          # build step's verify:fusion. The CLI is a bun --compile single-file
          # binary (~177MB); `gh release download` can leave a TRUNCATED file on
          # a flaky fetch, and a half-download is otherwise invisible (it's still
          # a valid-looking Mach-O/PE). On macOS a truncated binary spawns with
          # error -88; on Windows it spawns then dies with "exit code 1 / cli
          # exited before first init" — both shipped to users before this gate
          # existed. We assert the on-disk size equals the size GitHub recorded
          # for the asset (its authoritative byte count), so a partial fetch
          # fails the build here instead of silently entering the package.
          # See errors/2026-05-23-fusion-code-cli截断致spawn-88.md.
          expected=$(gh release view "$FUSION_CODE_VERSION" \
            --repo Caffeine-Ops/fusion-code-install \
            --json assets \
            --jq ".assets[] | select(.name == \"${{ matrix.fusion_asset }}\") | .size")
          actual=$(wc -c < "${{ matrix.fusion_target }}" | tr -d '[:space:]')
          echo "fusion-code asset: expected=$expected actual=$actual bytes"
          if [ -z "$expected" ]; then
            echo "::error::Could not read expected size for asset ${{ matrix.fusion_asset }} from release $FUSION_CODE_VERSION"
            exit 1
          fi
          if [ "$expected" != "$actual" ]; then
            echo "::error::fusion-code download is truncated: expected $expected bytes, got $actual. Re-run the job."
            exit 1
          fi

      # Bundle a standalone Node 24 (ABI 137) INTO the app so the daemon runs
      # against the exact ABI its better-sqlite3 was compiled for — never the
      # user's machine Node (uncontrollable; Windows users often have Node 22 =
      # ABI 127 on PATH → ERR_DLOPEN_FAILED). resolveNodeBin() picks
      # <resources>/node-runtime/node[.exe] in prod. Only the single `node`
      # binary is kept (npm/corepack/headers dropped) to keep the size down.
      - name: Bundle Node runtime
        shell: bash
        run: |
          set -euo pipefail
          ver="$BUNDLED_NODE_VERSION"
          dist="${{ matrix.node_dist }}"
          dest="apps/studio/node-runtime/${{ matrix.platform }}"
          mkdir -p "$dest"
          if [ "${{ matrix.platform }}" = "win" ]; then
            url="https://nodejs.org/dist/${ver}/node-${ver}-${dist}.zip"
            curl -fsSL "$url" -o node.zip
            unzip -q node.zip
            cp "node-${ver}-${dist}/node.exe" "$dest/node.exe"
          else
            url="https://nodejs.org/dist/${ver}/node-${ver}-${dist}.tar.gz"
            curl -fsSL "$url" -o node.tar.gz
            tar -xzf node.tar.gz
            cp "node-${ver}-${dist}/bin/node" "$dest/node"
            chmod +x "$dest/node"
          fi
          ls -la "$dest"
          # Assert the bundled Node's ABI is 137 (Node 24) — the daemon's
          # better-sqlite3 is compiled for exactly this.
          abi=$("$dest"/node* -e "process.stdout.write(process.versions.modules)")
          echo "bundled node ABI: $abi"
          if [ "$abi" != "137" ]; then
            echo "::error::Bundled Node ABI is $abi, expected 137"
            exit 1
          fi

      # Bundle a standalone Python 3.12 INTO the app for the ppt-master skill.
      # python-build-standalone install_only tarballs are relocatable (a top
      # `python/` dir holding bin/python3 + lib/) — we drop that dir's CONTENTS
      # into python-runtime/<platform>/ so the interpreter lands at
      # python-runtime/<platform>/bin/python3 (mac) / python-runtime/<platform>/
      # python.exe (win) — matching resolveBundledPythonHome() in cliDetect.ts.
      # The skill's bin/ensure-python.sh uses this as the base to build a
      # per-user venv at ~/.ppt-master/venv on first run. Not run directly here.
      - name: Bundle Python runtime
        shell: bash
        run: |
          set -euo pipefail
          tag="$PYTHON_STANDALONE_TAG"
          ver="$PYTHON_STANDALONE_VERSION"
          dist="${{ matrix.python_dist }}"
          dest="apps/studio/python-runtime/${{ matrix.platform }}"
          asset="cpython-${ver}+${tag}-${dist}-install_only.tar.gz"
          url="https://github.com/astral-sh/python-build-standalone/releases/download/${tag}/${asset}"
          mkdir -p "$dest"
          echo "Downloading $url"
          curl -fsSL "$url" -o python.tar.gz
          # tarball has a single top-level `python/` dir; strip it so its
          # contents (bin/, lib/, …) land directly in $dest.
          tar -xzf python.tar.gz --strip-components=1 -C "$dest"
          if [ "${{ matrix.platform }}" = "win" ]; then
            py="$dest/python.exe"
          else
            py="$dest/bin/python3"
          fi
          ls -la "$dest"
          # Assert the bundled interpreter runs and is the pinned 3.12 — a wrong
          # version would let the user's first-run pip hit the py3.14 no-wheel
          # source-compile hang we pin 3.12 specifically to avoid.
          got=$("$py" -c 'import sys;print("%d.%d"%sys.version_info[:2])')
          echo "bundled python: $got"
          if [ "$got" != "3.12" ]; then
            echo "::error::Bundled Python is $got, expected 3.12"
            exit 1
          fi

      # kb-model 下载暂时跳过（2026-07-06）：runner 上对 huggingface.co 的请求被
      # 一个会返回非法 URL 的 resolve-cache 层污染（node/bun 直跑皆同样报
      # ERR_INVALID_URL，问题在 CI 环境本身，非脚本 runtime 选择），导致
      # "Prepare kb-model" 必现失败、挡住整条发布链。KB 语义检索代码对模型缺失
      # 有正式设计的降级路径（kbSemanticSearch.ts 顶部注释：worker 收不到 ready
      # 会永久走 BM25 关键词检索，不崩溃），故先跳过让构建放行，后续查清 CI 环境
      # 的网络层问题后再恢复本步骤 + build:mac/win/linux 里的 prebundle:kb-model
      # && verify:kb-model 调用。

      # Only typecheck the package this workflow actually ships: the
      # Electron app. Its tsconfig project-references pull in every
      # @open-design/* package it depends on, so their types get checked
      # transitively. We deliberately do NOT run the repo-wide
      # `bun run typecheck` here: it fans out to ALL workspaces including
      # @open-design/daemon, whose own `typecheck` script shells out to
      # `pnpm` — and this runner only has bun (oven-sh/setup-bun), so
      # daemon's step dies with `pnpm: command not found` (exit 127).
      # The daemon is a standalone service, not part of the desktop
      # bundle, so it has no business gating the desktop build.
      - name: Type check
        run: bun run --filter='@claude-desktop/studio' typecheck

      # bun test 与 typecheck 并列做质量门：写方案 skill 化把方法论外置成
      # skills/proposal-writer 的模板文件，其正确性由快照（逐字节）与契约测试
      # 守护——CI 不跑 test 的话这道门只存在于开发者本机自觉，改坏模板的提交能
      # 一路发进 Release。Windows runner 上模板/快照的行尾一致性由仓库根
      # .gitattributes（skills/**、*.snap 钉 eol=lf）保证。
      - name: Unit tests
        run: bun run --filter='@claude-desktop/studio' test

      # scripts/ (the kb-sync manifest publisher, run manually on the server —
      # not part of the desktop app bundle) has its own bun:test suite. It
      # isn't under apps/studio so the filter above never touches it; without
      # this step a broken manifest.ts could ship straight to the release
      # workflow with zero CI signal.
      - name: Scripts tests
        run: bun test scripts/

      # Use `dist:<platform>`, NOT `build:<platform>`. The desktop
      # `build:*` chain assumes apps/daemon/dist/cli.js and apps/studio/out
      # already exist (its prebundle:daemon step only COPIES them) — true
      # locally where they linger from a previous build, but a clean CI
      # checkout has neither. `dist:*` runs `prebuild:resources` first to
      # build the daemon (tsc) and the studio static export (apps/web was
      # physically retired in Phase 4). The library packages daemon/studio
      # import from `dist/` are already built by the root postinstall (runs
      # during `bun install`), so we don't repeat them here.
      # mac 证书：把 base64 secret 解码成真实 .p12 文件，让 CSC_LINK 指向
      # **文件路径**而非 base64 字符串（2026-07-05 起，v0.0.18 踩坑后）。
      # 为什么不直接把 base64 塞给 CSC_LINK：electron-builder 25.x 的
      # codeSign/codesign.js 判「这是 base64 还是路径」靠三选一——有
      # `data:...;base64,` 前缀 / 长度>2048 / 以 `=` 结尾。GitHub secret 在
      # 存取/复制中一旦末尾被裁掉 `=` 且长度判定边缘，就三条全不中 → 被当
      # 成相对路径 → `<cwd>/apps/studio/<base64> doesn't exist`（v0.0.18 mac
      # job 连炸三轮实锤）。解成文件走 codesign.js 第一个分支（statOrNull
      # 文件存在检查），彻底绕开脆弱的 base64 嗅探。诊断输出（长度/大小/
      # openssl 能否识别）帮判 secret 到底是被截断还是密码错——值本身不打印。
      - name: Decode signing certificate (mac)
        if: matrix.platform == 'mac'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$MAC_CSC_LINK" ]; then
            echo "::warning::MAC_CSC_LINK 为空，跳过签名（mac 自动更新将不可用）"
            echo "CSC_FILE=" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "base64 长度: ${#MAC_CSC_LINK}"
          # 去掉可能混入的空白/换行再解码（tr -d '\n\r '），最稳。
          printf '%s' "$MAC_CSC_LINK" | tr -d '\n\r ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "解码后 .p12 大小: $(stat -f%z "$RUNNER_TEMP/cert.p12") bytes"
          # 密码校验：用 macOS 自带的 `security import` 试导入到一个**临时钥匙串**，
          # 成功即证明 base64 完整 + 密码正确。为什么不用 openssl：
          #   - runner 的 `openssl` 是 macOS 的 LibreSSL，不认 `-legacy` 参数
          #     （`Unrecognized flag legacy`，v0.0.18 第六轮实锤）；
          #   - 且 LibreSSL/OpenSSL 对 Apple 老算法 p12（RC2）支持不一，靠它判
          #     密码本就脆。
          # 而 electron-builder 真正签名走的**正是** `security import`，用它自检
          # = 用签名同一套工具预演，最贴真、零第三方差异。临时钥匙串用完即删，
          # 不污染 runner 的 login 钥匙串。
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="ci-temp-$RANDOM"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          if security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MAC_CSC_KEY_PASSWORD" -T /usr/bin/codesign 2>&1; then
            echo "✓ 证书导入成功（base64 完整 + 密码正确）"
            security find-identity -v -p codesigning "$KEYCHAIN" | grep -i "Developer ID" || true
          else
            echo "::error::证书导入失败——base64 被截断，或 MAC_CSC_KEY_PASSWORD 与导出时设的密码不一致"
            security delete-keychain "$KEYCHAIN" 2>/dev/null || true
            exit 1
          fi
          # 自检用的临时钥匙串删掉——electron-builder 会自己再建它需要的钥匙串。
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true
          echo "CSC_FILE=$RUNNER_TEMP/cert.p12" >> "$GITHUB_ENV"

      # mac 签名 + 公证（自动更新的硬前提，2026-07-05 起）：
      #   - CSC_LINK 指向上一步解码出的 .p12 **文件路径**（win 拿空串跳过——
      #     CSC_LINK 是 electron-builder 跨平台通用签名 env，win 侧看到 mac
      #     证书会误当 Windows 代码签名证书解析，报 `WIN_CSC_LINK is not
      #     correct`，v0.0.18 win job 实锤；Windows 本就不签名，首装仅
      #     SmartScreen 警告，不挡自动更新）。
      #   - APPLE_* 只在 mac 注入：三者齐全时 electron-builder 自动走
      #     notarytool 公证（无需在 build 配置里声明 notarize；缺任一则跳过）。
      #   - CSC_IDENTITY_AUTO_DISCOVERY：**mac 必须 true**（默认），win 才 false。
      #     2026-07-05 血泪：曾对两平台都设 'false'，本意只想禁「从 runner 钥匙串
      #     瞎捞证书」，但在 electron-builder 25.x 它会**连带禁掉整个签名身份
      #     发现流程——包括从 CSC_LINK 导入**。结果 mac job 全绿却打印
      #     `skipped macOS application code signing … CSC_IDENTITY_AUTO_DISCOVERY
      #     =false`，出的是**未签名未公证**的包（v0.0.18 第八轮实锤：自检导入
      #     证书成功、真打包却跳过签名）。mac 设 true 让它正常走 CSC_LINK →
      #     导证书 → codesign → notarytool 公证；win 无证书，false 防它徒劳搜索。
      - name: Build (${{ matrix.platform }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.platform == 'mac' && 'true' || 'false' }}
          CSC_LINK: ${{ matrix.platform == 'mac' && env.CSC_FILE || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 提高文件描述符上限：mac 签名时 @electron/osx-sign **递归遍历**整个
        # .app 内容并 open 每个文件，而本包 prebundled/ 有 1.7 万文件（含
        # 1.3 万 svg 图标，经 extraResources 散放进 .app/Contents/Resources），
        # 并发句柄撞爆上限 → `EMFILE: too many open files`（v0.0.18 第九~十一轮
        # 实锤：证书/签名都对，纯栽在句柄数）。
        # 关键：**裸 `ulimit -n` 提不上去**——macOS 软上限受**硬上限**约束，
        # runner 默认硬上限也不高。必须先 `launchctl limit maxfiles` 提系统级
        # 硬上限，`ulimit` 的软上限才抬得起来（第九/十轮只做 ulimit 无效的真因）。
        # signIgnore 也试过无效：它只过滤「顶层 .app 要不要签」，拦不到 osx-sign
        # 递归内部对每个子文件的 open。
        # ⚠️ 两处平台适配：
        #   1) shell: bash——win runner 默认 PowerShell，不认 `if [ ]`/`ulimit`
        #      语法；显式 bash 让两平台走同一套（win 用自带 git-bash）。
        #   2) ulimit/launchctl 用 matrix.platform 条件只在 mac 跑：win 上
        #      `ulimit` 不存在，裸写报 `ulimit is not recognized` 把 win job
        #      带崩（v0.0.18 第十一轮 win regression 实锤——win 本来一直能过）。
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            sudo launchctl limit maxfiles 262144 524288 || true
            ulimit -n 262144 || ulimit -n unlimited || true
            echo "ulimit -n = $(ulimit -n)"
          fi
          bun run dist:${{ matrix.platform }}

      # Upload the installers straight to the GitHub Release instead of
      # staging them as Actions artifacts. Why: artifacts count against the
      # account's Actions storage quota (which we hit — a ~hundreds-of-MB
      # dmg + the win exe per run fills it fast), AND they were only ever a
      # hand-off to a separate release job that re-downloaded them. Release
      # assets don't count against that quota, so attaching directly here
      # removes both the quota failure and the artifact→download→release
      # round-trip. electron-builder writes to apps/studio/dist/ (its
      # build.directories.output is relative to the package, not the repo
      # root). Both matrix jobs target the same tag; action-gh-release is
      # idempotent per tag — the first creates the release, the second
      # appends its files — so mac and win can publish in parallel.
      #
      # 发布目标是独立的**公开** release 仓（自动更新方案 A，2026-07-05）：
      # 代码仓保持私有，只有安装包公开——electron-updater 按包内
      # app-update.yml（= studio package.json build.publish）匿名拉取该仓的
      # latest*.yml + 安装包，*.blockmap 支撑差分下载。因此：
      #   - repository 必须与 build.publish 的 owner/repo 一致；
      #   - GITHUB_TOKEN 只对本仓有效，跨仓发布必须用 PAT secret
      #     RELEASE_REPO_TOKEN（fine-grained：目标仓 Contents read/write）。
      #     secret 缺失时本步会失败——发版链路宁可红也不要静默发错地方。
      #   - tag 会打在目标仓的默认分支上（目标仓只有 README，无所谓指哪）。
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          repository: Caffeine-Ops/claude-desktop-releases
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          files: |
            apps/studio/dist/*.dmg
            apps/studio/dist/*.zip
            apps/studio/dist/*.exe
            apps/studio/dist/*.blockmap
