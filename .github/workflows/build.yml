name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FUSION_CODE_VERSION: v2.1.87

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            fusion_asset: fusion-code-darwin-arm64
            fusion_target: fusion-bin/fusion-code-cli
          - os: windows-latest
            platform: win
            fusion_asset: fusion-code-win32-x64.exe
            fusion_target: fusion-bin/fusion-code-cli.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write env.json from secret
        shell: bash
        env:
          ENV_JSON: ${{ secrets.ENV_JSON }}
        run: |
          if [ -z "$ENV_JSON" ]; then
            echo "::error::ENV_JSON secret is empty. Configure it in Settings → Secrets → Actions."
            exit 1
          fi
          printf '%s' "$ENV_JSON" > env.json
          python -c "import json; json.load(open('env.json'))" \
            || { echo "::error::env.json is not valid JSON"; exit 1; }

      - name: Download fusion-code CLI
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p fusion-bin
          gh release download "$FUSION_CODE_VERSION" \
            --repo Caffeine-Ops/fusion-code-install \
            --pattern "${{ matrix.fusion_asset }}" \
            --dir fusion-bin
          mv "fusion-bin/${{ matrix.fusion_asset }}" "${{ matrix.fusion_target }}"
          if [ "${{ matrix.platform }}" != "win" ]; then
            chmod +x "${{ matrix.fusion_target }}"
          fi
          ls -la fusion-bin/

      - name: Type check
        run: bun run typecheck

      - name: Build (${{ matrix.platform }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build:${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
